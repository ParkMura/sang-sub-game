    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const rect = canvas.getBoundingClientRect();
      const cssWidth = Math.max(1, Math.round(rect.width));
      const cssHeight = Math.max(1, Math.round(rect.height));
      width = Math.floor(cssWidth * dpr);
      height = Math.floor(cssHeight * dpr);
      scale = dpr;
      canvas.width = width;
      canvas.height = height;
      lightCanvas.width = width;
      lightCanvas.height = height;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      width = cssWidth;
      height = cssHeight;
    }

    function loadImage(src) {
      return new Promise((resolve) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = () => {
          console.warn("Failed to load", src);
          resolve(null);
        };
        image.src = src;
      });
    }

    async function loadAssets() {
      const entries = Object.entries(assetList);
      let done = 0;
      for (const [name, src] of entries) {
        assets[name] = await loadImage(src);
        done++;
        loading.textContent = "Loading SANG SUB... " + done + "/" + entries.length;
      }
      loading.style.display = "none";
    }

    function ensureAudio() {
      // 첫 터치/클릭 시 풀스크린 (주소창 숨기기)
      if (!document.fullscreenElement) {
        const el = document.documentElement;
        if (el.requestFullscreen) el.requestFullscreen({ navigationUI: "hide" }).catch(() => {});
        else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      }
      if (audioReady) {
        if (!noirGain) startNoirBgm();
        unlockAudio();
        return;
      }
      audioReady = true;
      try {
        sfx.playerGun = makeAudio(audioSampleSources.playerGun, 0.28);
        sfx.enemyGun = makeAudio(audioSampleSources.enemyGun, 0.2);
        sfx.flamer = makeAudio(audioSampleSources.flamer, 0.08);
        sfx.death = makeAudio(audioSampleSources.death, 0.18);
      } catch (error) {
        console.warn("Audio init failed", error);
      }
      startNoirBgm();
      loadAudioBuffers();
      unlockAudio();
    }

    function detectMobileDevice() {
      try {
        const params = new URLSearchParams(window.location.search || "");
        if (params.get("mobile") === "1") return true;
        if (params.get("mobile") === "0") return false;
      } catch (error) {}
      const touchPoints = navigator.maxTouchPoints || navigator.msMaxTouchPoints || 0;
      if (touchPoints <= 0) return false;
      const ua = navigator.userAgent || "";
      const mobileUa = /Android|iPhone|iPad|iPod|Mobile|Windows Phone/i.test(ua);
      const compactTouch = Math.min(window.innerWidth || 9999, window.innerHeight || 9999) <= 820;
      const coarse = !window.matchMedia || window.matchMedia("(hover: none) and (pointer: coarse)").matches;
      return mobileUa && compactTouch && coarse;
    }

    function makeAudio(src, volume) {
      const audio = new Audio(src);
      audio.preload = "auto";
      audio.volume = volume;
      return audio;
    }

    function playSfx(name, rate = 1) {
      unlockAudio();
      if (isMobile && playProceduralSfx(name, rate)) return;
      const sound = sfx[name];
      if (playBufferSfx(name, rate)) return;
      if (!sound) return;
      try {
        const clone = sound.cloneNode();
        clone.volume = sound.volume;
        clone.playbackRate = rate;
        clone.play().catch(() => {});
      } catch (error) {
        // Sound is optional; gameplay should never fail because of audio.
      }
    }

    function loadAudioBuffers() {
      if (!audioCtx || !window.fetch) return;
      for (const [name, src] of Object.entries(audioSampleSources)) {
        if (audioBuffers[name] || audioBuffers[name + "Loading"]) continue;
        audioBuffers[name + "Loading"] = true;
        fetch(src)
          .then((response) => response.arrayBuffer())
          .then((data) => audioCtx.decodeAudioData(data))
          .then((buffer) => {
            audioBuffers[name] = buffer;
          })
          .catch(() => {
            audioBuffers[name + "Failed"] = true;
          });
      }
    }

    function playBufferSfx(name, rate = 1) {
      try {
        const buffer = audioBuffers[name];
        if (!audioCtx || !buffer || audioCtx.state === "suspended") return false;
        const source = audioCtx.createBufferSource();
        const gain = audioCtx.createGain();
        source.buffer = buffer;
        source.playbackRate.value = rate;
        const volume = name === "playerGun" ? 0.32 : name === "enemyGun" ? 0.24 : name === "death" ? 0.22 : 0.14;
        gain.gain.setValueAtTime(volume, audioCtx.currentTime);
        source.connect(gain);
        gain.connect(audioCtx.destination);
        source.start(audioCtx.currentTime);
        return true;
      } catch (error) {
        return false;
      }
    }

    function getNoiseBuffer(duration = 0.25) {
      if (!audioCtx) return null;
      const key = Math.round(duration * 1000);
      if (noiseBuffers[key]) return noiseBuffers[key];
      const length = Math.max(1, Math.floor(audioCtx.sampleRate * duration));
      const buffer = audioCtx.createBuffer(1, length, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      let last = 0;
      for (let i = 0; i < length; i++) {
        const white = Math.random() * 2 - 1;
        last = last * 0.72 + white * 0.28;
        data[i] = last;
      }
      noiseBuffers[key] = buffer;
      return buffer;
    }

    function playNoiseLayer({ duration, volume, type = "bandpass", frequency = 900, q = 1.4, start = 0, end = 0.0001 }) {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const source = audioCtx.createBufferSource();
      const filter = audioCtx.createBiquadFilter();
      const gain = audioCtx.createGain();
      source.buffer = getNoiseBuffer(duration);
      filter.type = type;
      filter.frequency.setValueAtTime(frequency, now);
      filter.Q.setValueAtTime(q, now);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(volume, now + 0.006);
      gain.gain.exponentialRampToValueAtTime(Math.max(0.0001, end), now + duration);
      source.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);
      source.start(now + start);
      source.stop(now + start + duration);
    }

    function playToneLayer({ type = "sine", startFreq, endFreq, duration, volume, delay = 0 }) {
      if (!audioCtx) return;
      const now = audioCtx.currentTime + delay;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(startFreq, now);
      osc.frequency.exponentialRampToValueAtTime(Math.max(20, endFreq), now + duration);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(volume, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + duration + 0.02);
    }

    function playProceduralSfx(name, rate = 1) {
      try {
        if (!audioCtx) return false;
        if (audioCtx.state === "suspended" && audioCtx.resume) {
          audioCtx.resume().then(() => playProceduralSfx(name, rate)).catch(() => {});
          return true;
        }
        if (name === "playerGun") {
          playNoiseLayer({ duration: 0.075, volume: 0.24, type: "bandpass", frequency: 1750 * rate, q: 0.9 });
          playNoiseLayer({ duration: 0.045, volume: 0.12, type: "highpass", frequency: 3200 * rate, q: 0.8 });
          playToneLayer({ type: "square", startFreq: 140 * rate, endFreq: 58 * rate, duration: 0.105, volume: 0.12 });
          return true;
        }
        if (name === "enemyGun") {
          playNoiseLayer({ duration: 0.09, volume: 0.18, type: "bandpass", frequency: 1250 * rate, q: 1 });
          playToneLayer({ type: "square", startFreq: 110 * rate, endFreq: 44 * rate, duration: 0.11, volume: 0.09 });
          return true;
        }
        if (name === "flamer") {
          playNoiseLayer({ duration: 0.34, volume: 0.2, type: "lowpass", frequency: 520, q: 0.7 });
          playToneLayer({ type: "sawtooth", startFreq: 92 * rate, endFreq: 35, duration: 0.28, volume: 0.09 });
          return true;
        }
        if (name === "death") {
          playNoiseLayer({ duration: 0.22, volume: 0.1, type: "bandpass", frequency: 520, q: 1.5 });
          playToneLayer({ type: "triangle", startFreq: 230 * rate, endFreq: 65, duration: 0.36, volume: 0.12 });
          return true;
        }
        return false;
      } catch (error) {
        return false;
      }
    }

    function afterAudioResume(callback) {
      try {
        if (!audioCtx) return;
        if (audioCtx.state === "suspended" && audioCtx.resume) {
          const resumed = audioCtx.resume();
          if (resumed && resumed.then) {
            resumed.then(callback).catch(() => {});
            return;
          }
        }
        callback();
      } catch (error) {}
    }

    function playSynthSfx(name, rate = 1) {
      try {
        if (!audioCtx) return;
        if (audioCtx.state === "suspended" && audioCtx.resume) {
          audioCtx.resume().then(() => playSynthSfx(name, rate)).catch(() => {});
          return;
        }
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        let type = "square";
        let start = 420;
        let end = 110;
        let volume = 0.055;
        let duration = 0.1;
        if (name === "playerGun") {
          type = "sawtooth";
          start = 620;
          end = 165;
          volume = 0.055;
          duration = 0.085;
        } else if (name === "enemyGun") {
          start = 370;
          end = 125;
          volume = 0.048;
          duration = 0.11;
        } else if (name === "flamer") {
          type = "sawtooth";
          start = 115;
          end = 36;
          volume = 0.105;
          duration = 0.24;
        } else if (name === "death") {
          type = "triangle";
          start = 210;
          end = 62;
          volume = 0.085;
          duration = 0.28;
        }
        osc.type = type;
        osc.frequency.setValueAtTime(start * rate, now);
        osc.frequency.exponentialRampToValueAtTime(Math.max(20, end * rate), now + duration);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(volume, now + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + duration + 0.02);
      } catch (error) {}
    }

    function unlockAudio() {
      try {
        if (audioCtx && audioCtx.state === "suspended" && audioCtx.resume) audioCtx.resume();
        if (audioCtx) {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start(audioCtx.currentTime);
          osc.stop(audioCtx.currentTime + 0.03);
        }
        for (const sound of Object.values(sfx)) {
          if (!sound || sound.__unlocked) continue;
          sound.__unlocked = true;
          const oldMuted = sound.muted;
          sound.muted = true;
          sound.currentTime = 0;
          const played = sound.play();
          if (played && played.then) {
            played.then(() => {
              sound.pause();
              sound.currentTime = 0;
              sound.muted = oldMuted;
            }).catch(() => {
              sound.muted = oldMuted;
              sound.__unlocked = false;
            });
          } else {
            sound.pause();
            sound.currentTime = 0;
            sound.muted = oldMuted;
          }
        }
      } catch (error) {}
    }

    function playParkLogoSound() {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!audioCtx && Ctx) {
        audioCtx = new Ctx();
      }
      if (!audioCtx) return;
      if (audioCtx.state === "suspended" && audioCtx.resume) {
        audioCtx.resume().then(() => playParkLogoSound()).catch(() => {});
        return;
      }
      const now = audioCtx.currentTime;
      playSynthSfx("flamer", 1.85);
      const impacts = [0.52, 1.08, 1.64, 2.2];
      for (const [i, offset] of impacts.entries()) {
        const osc = audioCtx.createOscillator();
        const grind = audioCtx.createOscillator();
        const servo = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const grindGain = audioCtx.createGain();
        const servoGain = audioCtx.createGain();
        osc.type = "sawtooth";
        grind.type = "square";
        servo.type = "triangle";
        osc.frequency.setValueAtTime(78 - i * 5, now + offset);
        osc.frequency.exponentialRampToValueAtTime(24, now + offset + 0.36);
        grind.frequency.setValueAtTime(360 + i * 42, now + offset);
        grind.frequency.exponentialRampToValueAtTime(74, now + offset + 0.2);
        servo.frequency.setValueAtTime(760 - i * 60, now + offset - 0.07);
        servo.frequency.exponentialRampToValueAtTime(190, now + offset + 0.1);
        gain.gain.setValueAtTime(0.0001, now + offset);
        gain.gain.exponentialRampToValueAtTime(0.26, now + offset + 0.008);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + offset + 0.42);
        grindGain.gain.setValueAtTime(0.0001, now + offset);
        grindGain.gain.exponentialRampToValueAtTime(0.12, now + offset + 0.008);
        grindGain.gain.exponentialRampToValueAtTime(0.0001, now + offset + 0.24);
        servoGain.gain.setValueAtTime(0.0001, now + offset - 0.07);
        servoGain.gain.exponentialRampToValueAtTime(0.065, now + offset - 0.02);
        servoGain.gain.exponentialRampToValueAtTime(0.0001, now + offset + 0.14);
        osc.connect(gain);
        grind.connect(grindGain);
        servo.connect(servoGain);
        gain.connect(audioCtx.destination);
        grindGain.connect(audioCtx.destination);
        servoGain.connect(audioCtx.destination);
        osc.start(now + offset);
        grind.start(now + offset);
        servo.start(now + offset - 0.07);
        osc.stop(now + offset + 0.44);
        grind.stop(now + offset + 0.26);
        servo.stop(now + offset + 0.15);
      }
      playParkVoiceCue(now + 2.65);
    }

    function playParkVoiceCue(when) {
      try {
        if (window.speechSynthesis && window.SpeechSynthesisUtterance) {
          const utterance = new SpeechSynthesisUtterance("박가");
          utterance.lang = "ko-KR";
          utterance.rate = 0.82;
          utterance.pitch = 0.45;
          utterance.volume = 0.9;
          setTimeout(() => window.speechSynthesis.speak(utterance), Math.max(0, (when - audioCtx.currentTime) * 1000));
        }
      } catch (error) {}
      try {
        if (window.speechSynthesis && window.SpeechSynthesisUtterance) {
          setTimeout(() => {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance("\ubc15\uac00");
            utterance.lang = "ko-KR";
            utterance.rate = 0.82;
            utterance.pitch = 0.45;
            utterance.volume = 1;
            window.speechSynthesis.speak(utterance);
          }, Math.max(0, (when - audioCtx.currentTime) * 1000));
        }
      } catch (error) {}
      const syllables = [0, 0.28];
      for (const [i, offset] of syllables.entries()) {
        const osc = audioCtx.createOscillator();
        const mod = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const modGain = audioCtx.createGain();
        osc.type = "sawtooth";
        mod.type = "triangle";
        osc.frequency.setValueAtTime(i === 0 ? 142 : 118, when + offset);
        osc.frequency.exponentialRampToValueAtTime(i === 0 ? 82 : 74, when + offset + 0.18);
        mod.frequency.setValueAtTime(i === 0 ? 58 : 46, when + offset);
        gain.gain.setValueAtTime(0.0001, when + offset);
        gain.gain.exponentialRampToValueAtTime(0.11, when + offset + 0.025);
        gain.gain.exponentialRampToValueAtTime(0.0001, when + offset + 0.22);
        modGain.gain.value = 0.028;
        mod.connect(modGain);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        modGain.connect(audioCtx.destination);
        osc.start(when + offset);
        mod.start(when + offset);
        osc.stop(when + offset + 0.24);
        mod.stop(when + offset + 0.24);
      }
    }

    function startNoirBgm() {
      if (!audioCtx) {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return;
        audioCtx = new Ctx();
      }
      if (audioCtx.state === "suspended" && audioCtx.resume) {
        audioCtx.resume().then(() => startNoirBgm()).catch(() => {});
        return;
      }
      if (noirGain) {
        if (!noirPulseTimer) startNoirPulse();
        return;
      }
      noirGain = audioCtx.createGain();
      noirGain.gain.setValueAtTime(0.07, audioCtx.currentTime);
      noirGain.connect(audioCtx.destination);
      const notes = [55, 82.41, 110];
      for (const [i, freq] of notes.entries()) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = i === 0 ? "sine" : "triangle";
        osc.frequency.value = freq;
        gain.gain.value = i === 0 ? 0.56 : 0.18;
        osc.connect(gain);
        gain.connect(noirGain);
        osc.start();
      }
      startNoirPulse();
    }

    function startNoirPulse() {
      if (noirPulseTimer || !audioCtx) return;
      const pulse = () => {
        if (!audioCtx || audioCtx.state === "suspended") return;
        if (isMobile) {
          playNoiseLayer({ duration: 0.42, volume: 0.018, type: "lowpass", frequency: 360, q: 0.5 });
        }
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = "triangle";
        osc.frequency.setValueAtTime(146.83, now);
        osc.frequency.exponentialRampToValueAtTime(98, now + 0.42);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.045, now + 0.04);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.55);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + 0.58);
      };
      pulse();
      noirPulseTimer = setInterval(pulse, 4200);
    }

      addFixture(1620, 800, 12, 72, Math.PI/2, 175, 0.98); // 동쪽 도어 옆

    function loadSavedMap() {
      try {
        const raw = localStorage.getItem("sangsub.map.v1");
        if (!raw) return null;
        const data = JSON.parse(raw);
        if (!data || !Array.isArray(data.walls) || !Array.isArray(data.doors)) return null;
        return data;
      } catch (error) {
        console.warn("Failed to load saved map", error);
        return null;
      }
    }

    function saveCurrentMap() {
      const data = serializeMapData();
      try {
        localStorage.setItem("sangsub.map.v1", JSON.stringify(data));
        mapTool.status = "Map saved.";
        mapTool.statusTime = 2.5;
        return true;
      } catch (error) {
        mapTool.status = "Save failed: browser storage unavailable.";
        mapTool.statusTime = 3;
        return false;
      }
    }

    function clearSavedMap() {
      try {
        localStorage.removeItem("sangsub.map.v1");
      } catch (error) {
        console.warn("Failed to clear saved map", error);
      }
      walls.length = 0;
      doors.length = 0;
      props.length = 0;
      fixtures.length = 0;
      buildDefaultMapOnly();
      fitMapToolCamera();
      mapTool.status = "Default map restored.";
      mapTool.statusTime = 2.5;
    }

    function buildDefaultMapOnly() {
      usingCustomMap = false;
      const savedLoader = localStorage.getItem("sangsub.map.v1");
      try {
        localStorage.removeItem("sangsub.map.v1");
        buildFacilityMap();
      } finally {
        if (savedLoader) localStorage.setItem("sangsub.map.v1", savedLoader);
      }
    }

    function serializeMapData() {
      return {
        version: 1,
        world: { w: world.w, h: world.h },
        walls: walls.map(({ x, y, w, h }) => ({ x, y, w, h })),
        doors: doors.map(({ x, y, w, h, axis }) => ({ x, y, w, h, axis })),
        fixtures: fixtures.map(({ x, y, w, h, angle, radius, energy }) => ({ x, y, w, h, angle, radius, energy })),
        props: props.map(({ x, y, type, s, a }) => ({ x, y, type, s, a }))
      };
    }

    function applyMapData(data) {
      walls.length = 0;
      doors.length = 0;
      fixtures.length = 0;
      props.length = 0;
      for (const wall of data.walls || []) {
        if (validRect(wall)) walls.push({ x: wall.x, y: wall.y, w: wall.w, h: wall.h });
      }
      for (const door of data.doors || []) {
        if (validRect(door) && (door.axis === "h" || door.axis === "v")) {
        doors.push({ x: door.x, y: door.y, w: door.w, h: door.h, axis: door.axis, open: 0, target: 0, range: 34 });
        }
      }
      for (const fixture of data.fixtures || []) {
        if (validRect(fixture)) {
          fixtures.push({
            x: fixture.x,
            y: fixture.y,
            w: fixture.w,
            h: fixture.h,
            angle: Number.isFinite(fixture.angle) ? fixture.angle : 0,
            radius: Number.isFinite(fixture.radius) ? fixture.radius : 180,
            energy: Number.isFinite(fixture.energy) ? fixture.energy : 1
          });
        }
      }
      for (const prop of data.props || []) {
        if (Number.isFinite(prop.x) && Number.isFinite(prop.y)) {
          props.push({
            x: prop.x,
            y: prop.y,
            type: prop.type === "rock" ? "rock" : "crate",
            s: Number.isFinite(prop.s) ? prop.s : 1,
            a: Number.isFinite(prop.a) ? prop.a : 0
          });
        }
      }
    }

    function validRect(rect) {
      return Number.isFinite(rect.x) && Number.isFinite(rect.y) && Number.isFinite(rect.w) && Number.isFinite(rect.h) && rect.w > 0 && rect.h > 0;
    }

    function addWall(x, y, w, h) {
      walls.push({ x, y, w, h });
    }

    function addDoor(x, y, w, h, axis) {
      const door = { x, y, w, h, axis, open: 0, target: 0, range: 34 };
      if (doorTouchesBlockedCorner(door)) return;
      doors.push(door);
    }

    function doorTouchesBlockedCorner(door) {
      for (const wall of walls) {
        if (door.axis === "v" && wall.w > wall.h && rectOverlap(door, wall)) return true;
        if (door.axis === "h" && wall.h > wall.w && rectOverlap(door, wall)) return true;
      }
      return false;
    }

    function downloadMapJson() {
      const json = JSON.stringify(serializeMapData(), null, 2);
      const blob = new Blob([json], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "sang-sub-map.json";
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      return json;
    }

    function addFixture(x, y, w, h, angle, radius, energy) {
      fixtures.push({ x, y, w, h, angle, radius, energy });
    }

    function addRandomProp() {
      for (let tries = 0; tries < 80; tries++) {
        const prop = {
          x: 140 + Math.random() * (world.w - 280),
          y: 140 + Math.random() * (world.h - 280),
          type: Math.random() < 0.72 ? "crate" : "rock",
          s: 0.55 + Math.random() * 0.55,
          a: Math.random() * Math.PI * 2
        };
        if (canPlaceProp(prop)) {
          props.push(prop);
          return;
        }
      }
    }

    function canPlaceProp(prop) {
      const rect = propCollisionRect(prop);
      if (circleRect(player.x, player.y, player.r + 80, rect)) return false;
      for (const wall of walls) {
        if (rectOverlap(rect, wall)) return false;
      }
      for (const door of doors) {
        if (rectOverlap(rect, { x: door.x - 28, y: door.y - 28, w: door.w + 56, h: door.h + 56 })) return false;
      }
      for (const existing of props) {
        if (rectOverlap(rect, propCollisionRect(existing))) return false;
      }
      return true;
    }

    function chooseEnemyKind(nearPlayer) {
      const roll = Math.random();
      if (nearPlayer) {
        if (roll < 0.48) return "melee";
        if (roll < 0.78) return "shooter";
        return "flamer";
      }
      if (roll < 0.42) return "melee";
      if (roll < 0.72) return "shooter";
      return "flamer";
    }

    function enemyMaxHp(kind, fast) {
      if (kind === "melee") return fast ? 95 : 100 + wave * 4;
      if (kind === "flamer") return fast ? 90 : 100 + wave * 3;
      return fast ? 90 : 100 + wave * 3;
    }

    function enemySpeed(kind, fast) {
      if (kind === "melee") return fast ? (178 + wave * 5) * 0.8 : (126 + wave * 4) * 0.8;
      if (kind === "flamer") return fast ? (116 + wave * 3) * 0.8 : (78 + wave * 2) * 0.8;
      return fast ? (128 + wave * 3) * 0.8 : (72 + wave * 2) * 0.8;
    }

    function spawnEnemy() {
      const rooms = [
        [90, 90, 520, 520],
        [820, 240, 520, 360],
        [1460, 140, 560, 470],
        [260, 780, 520, 420],
        [880, 840, 450, 420],
        [1480, 820, 520, 450]
      ];
      const fast = Math.random() < Math.min(0.35, wave * 0.035);
      const kind = chooseEnemyKind(false);
      const r = fast ? 18 : 24;
      const maxHp = enemyMaxHp(kind, fast);
      const pos = findFreeSpawn(rooms, r);
      if (!pos) return;
      enemies.push({
        x: pos.x,
        y: pos.y,
        r,
        collisionR: fast ? 14 : 18,
        hp: maxHp,
        maxHp,
        speed: enemySpeed(kind, fast),
        bite: 0,
        shoot: 0.55 + Math.random() * 1.15,
        kind,
        fast,
        alert: 0,
        lastSeenX: pos.x,
        lastSeenY: pos.y,
        wanderAngle: Math.random() * Math.PI * 2,
        wanderTimer: 0.4 + Math.random() * 1.2,
        wobble: Math.random() * 10
      });
    }

    function spawnEnemyNearPlayer() {
      const fast = Math.random() < 0.25;
      const kind = chooseEnemyKind(true);
      const r = fast ? 18 : 24;
      const maxHp = enemyMaxHp(kind, fast);
      let pos = null;
      for (let tries = 0; tries < 80; tries++) {
        const a = Math.random() * Math.PI * 2;
        const d = 280 + Math.random() * 260;
        const x = clamp(player.x + Math.cos(a) * d, 80, world.w - 80);
        const y = clamp(player.y + Math.sin(a) * d, 80, world.h - 80);
        if (isSpawnFree(x, y, r)) {
          pos = { x, y };
          break;
        }
      }
      if (!pos) {
        spawnEnemy();
        return;
      }
      enemies.push({
        x: pos.x,
        y: pos.y,
        r,
        collisionR: fast ? 14 : 18,
        hp: maxHp,
        maxHp,
        speed: enemySpeed(kind, fast),
        bite: 0,
        shoot: 0.55 + Math.random() * 1.15,
        kind,
        fast,
        alert: 0,
        lastSeenX: pos.x,
        lastSeenY: pos.y,
        wanderAngle: Math.random() * Math.PI * 2,
        wanderTimer: 0.4 + Math.random() * 1.2,
        wobble: Math.random() * 10
      });
    }

    function findFreeSpawn(rooms, r) {
      for (let tries = 0; tries < 120; tries++) {
        const room = rooms[Math.floor(Math.random() * rooms.length)];
        const x = room[0] + 40 + Math.random() * Math.max(1, room[2] - 80);
        const y = room[1] + 40 + Math.random() * Math.max(1, room[3] - 80);
        if (isSpawnFree(x, y, r)) return { x, y };
      }
      return null;
    }

    function isSpawnFree(x, y, r) {
      const cr = Math.max(12, r - 6);
      if (hitsSolid(x, y, cr + 8)) return false;
      if (dist2(x, y, player.x, player.y) < 150 * 150) return false;
      for (const e of enemies) {
        if (dist2(x, y, e.x, e.y) < (cr + collisionRadius(e) + 28) * (cr + collisionRadius(e) + 28)) return false;
      }
      return true;
    }

    function fire() {
      if (shootCooldown > 0) return;
      const dx = Math.cos(player.angle);
      const dy = Math.sin(player.angle);
      const sx = player.x + dx * 34;
      const sy = player.y + dy * 34;

      if (currentWeapon === 0) {
        // 소총 - 단발 레이캐스트, 데미지 44, 35발 / 1.5초 재장전
        if (rifleReloadTimer > 0) return;
        if (rifleAmmo <= 0) { rifleReloadTimer = RIFLE_RELOAD_TIME; return; }
        rifleAmmo--;
        if (rifleAmmo <= 0) rifleReloadTimer = RIFLE_RELOAD_TIME;
        shootCooldown = 0.11;
        playSfx("playerGun", 0.94 + Math.random() * 0.08);
        const hit = raycastShot(sx, sy, dx, dy, 980);
        tracers.push({ x1: sx, y1: sy, x2: hit.x, y2: hit.y, life: 0.09, maxLife: 0.09 });
        if (hit.enemy) { hit.enemy.hp -= Math.round(44 * (playerChar.id === 3 ? 0.8 : 1) * (rageActive ? 2 : 1)); burst(hit.x, hit.y, "#9f2a24", 5); skillEnergy = Math.min(1, skillEnergy + 0.125); }
        else if (hit.solid) { burst(hit.x, hit.y, "#f4efe8", 5); hitWallCorner(hit.x, hit.y, 0.25, 28); }
        else applyTBHit(hit, Math.round(44 * (rageActive ? 2 : 1)));
        flashes.push({ x: sx + dx * 18, y: sy + dy * 18, angle: player.angle, life: 0.075, maxLife: 0.075 });
        for (let i = 0; i < 4; i++) {
          particles.push({ x: sx, y: sy,
            vx: Math.cos(player.angle + (Math.random() - 0.5) * 0.7) * (80 + Math.random() * 180),
            vy: Math.sin(player.angle + (Math.random() - 0.5) * 0.7) * (80 + Math.random() * 180),
            life: 0.14 + Math.random() * 0.12, color: "#ffd776", r: 2 + Math.random() * 3 });
        }
        shake = Math.max(shake, 4); recoilAmt = 1.0;

      } else if (currentWeapon === 1) {
        // 산탄총 - 5발 산탄, 데미지 57, 피해반경 55px, 2발 / 1초 재장전
        if (shotgunReloadTimer > 0) return;
        if (shotgunAmmo <= 0) { shotgunReloadTimer = SHOTGUN_RELOAD_TIME; return; }
        shotgunAmmo--;
        if (shotgunAmmo <= 0) shotgunReloadTimer = SHOTGUN_RELOAD_TIME;
        shootCooldown = 0.55;
        playSfx("playerGun", 0.82 + Math.random() * 0.08);
        const SHOTGUN_RANGE = 204; // 157 * 1.3
        const splashHits = [];
        for (let p = -2; p <= 2; p++) {
          const spread = p * 0.12 + (Math.random() - 0.5) * 0.06;
          const pdx = Math.cos(player.angle + spread);
          const pdy = Math.sin(player.angle + spread);
          const hit = raycastShot(sx, sy, pdx, pdy, SHOTGUN_RANGE);
          tracers.push({ x1: sx, y1: sy, x2: hit.x, y2: hit.y, life: 0.07, maxLife: 0.07 });
          if (hit.enemy) {
            const hitDist = Math.hypot(hit.x - sx, hit.y - sy);
            const dmg = Math.max(30, Math.round(300 - 270 * (hitDist / SHOTGUN_RANGE)));
            hit.enemy.hp -= dmg;
            burst(hit.x, hit.y, "#9f2a24", 4);
            skillEnergy = Math.min(1, skillEnergy + 0.125);
          }
          else if (hit.solid) { burst(hit.x, hit.y, "#f4efe8", 3); hitWallCorner(hit.x, hit.y, 1.0, 40); }
          else { const hd2=Math.hypot(hit.x-sx,hit.y-sy); applyTBHit(hit, Math.max(30,Math.round(300-270*(hd2/SHOTGUN_RANGE)))); }
          splashHits.push({ x: hit.x, y: hit.y });
        }
        // 피해 반경 스플래시 (벽 사이에 없는 적만)
        const splashR = 55;
        const splashedEnemies = new Set();
        for (const sh of splashHits) {
          for (const e of enemies) {
            if (!splashedEnemies.has(e) && Math.hypot(e.x - sh.x, e.y - sh.y) < splashR + e.r) {
              const sDx = e.x - sh.x, sDy = e.y - sh.y;
              const sDist = Math.hypot(sDx, sDy) || 1;
              const splashRay = raycastShot(sh.x, sh.y, sDx / sDist, sDy / sDist, sDist);
              if (splashRay.solid) continue;
              splashedEnemies.add(e);
              e.hp -= 20;
              burst(sh.x, sh.y, "#ff8040", 2);
            }
          }
        }
        flashes.push({ x: sx + dx * 14, y: sy + dy * 14, angle: player.angle, life: 0.1, maxLife: 0.1 });
        for (let i = 0; i < 8; i++) {
          particles.push({ x: sx, y: sy,
            vx: Math.cos(player.angle + (Math.random() - 0.5) * 1.1) * (100 + Math.random() * 220),
            vy: Math.sin(player.angle + (Math.random() - 0.5) * 1.1) * (100 + Math.random() * 220),
            life: 0.12 + Math.random() * 0.1, color: "#ffd776", r: 2 + Math.random() * 2.5 });
        }
        shake = Math.max(shake, 8); recoilAmt = 1.0;

      } else if (currentWeapon === 2) {
        // 마취총 - 투사체 발사, 데미지 22 + 슬로우, 5발 / 1.5초 재장전

        taserAmmo--;
        if (taserAmmo <= 0) taserReloadTimer = TASER_RELOAD_TIME;
        shootCooldown = 0.3;
        playSfx("playerGun", 0.72 + Math.random() * 0.06);
        const bspeed = 420;
        taserBullets.push({ x: sx, y: sy, vx: dx * bspeed, vy: dy * bspeed, life: 0.7, r: 6 });
        for (let i = 0; i < 3; i++) {
          particles.push({ x: sx, y: sy,
            vx: Math.cos(player.angle + (Math.random() - 0.5) * 0.5) * (60 + Math.random() * 100),
            vy: Math.sin(player.angle + (Math.random() - 0.5) * 0.5) * (60 + Math.random() * 100),
            life: 0.1 + Math.random() * 0.08, color: "#88ccff", r: 3 + Math.random() * 2 });
        }
        shake = Math.max(shake, 2);
      } else if (currentWeapon === 4) {
        // 권총 - 기관총 50% 속도/데미지/70% 사거리
        if (pistolReloadTimer > 0) return;
        if (pistolAmmo <= 0) { pistolReloadTimer = PISTOL_RELOAD_TIME; return; }
        pistolAmmo--;
        if (pistolAmmo <= 0) pistolReloadTimer = PISTOL_RELOAD_TIME;
        shootCooldown = 0.22;
        playSfx("playerGun", 0.88 + Math.random() * 0.08);
        const hitP = raycastShot(sx, sy, dx, dy, 686);
        tracers.push({ x1: sx, y1: sy, x2: hitP.x, y2: hitP.y, life: 0.09, maxLife: 0.09 });
        if (hitP.enemy) { hitP.enemy.hp -= 22 * (rageActive ? 2 : 1); burst(hitP.x, hitP.y, "#9f2a24", 4); skillEnergy = Math.min(1, skillEnergy + 0.1); }
        else if (hitP.solid) { burst(hitP.x, hitP.y, "#f4efe8", 3); }
        else applyTBHit(hitP, 22 * (rageActive ? 2 : 1));
        flashes.push({ x: sx + dx * 16, y: sy + dy * 16, angle: player.angle, life: 0.06, maxLife: 0.06 });
        shake = Math.max(shake, 2); recoilAmt = 0.7;
      } else if (currentWeapon === 5) {
        // 저격총 - 데미지 150, 사거리 1960 (기관총 2배)
        if (sniperReloadTimer > 0) return;
        if (sniperAmmo <= 0) { sniperReloadTimer = SNIPER_RELOAD_TIME; return; }
        sniperAmmo--;
        if (sniperAmmo <= 0) sniperReloadTimer = SNIPER_RELOAD_TIME;
        shootCooldown = 0.5;
        playSfx("playerGun", 1.3 + Math.random() * 0.05);

        else applyTBHit(hitS, 150 * (rageActive ? 2 : 1));
        flashes.push({ x: sx + dx * 22, y: sy + dy * 22, angle: player.angle, life: 0.12, maxLife: 0.12 });
        shake = Math.max(shake, 6); recoilAmt = 1.5;

        else if (hitHP.solid) { burst(hitHP.x, hitHP.y, "#f4efe8", 4); }

    function fireSniperAt(tx, ty) {
      if (sniperReloadTimer > 0) return;
      if (sniperAmmo <= 0) { sniperReloadTimer = SNIPER_RELOAD_TIME; return; }
      sniperAmmo--;
      if (sniperAmmo <= 0) sniperReloadTimer = SNIPER_RELOAD_TIME;
      playSfx("playerGun", 1.3 + Math.random() * 0.05);
      const pdx = tx - player.x, pdy = ty - player.y;
      const pd = Math.hypot(pdx, pdy) || 1;
      const dirX = pdx / pd, dirY = pdy / pd;
      const sx = player.x + dirX * 34, sy = player.y + dirY * 34;
      // raycastShot으로 벽 관통 방지
      const hit = raycastShot(sx, sy, dirX, dirY, 1960);
      tracers.push({ x1: sx, y1: sy, x2: hit.x, y2: hit.y, life: 0.25, maxLife: 0.25 });
      flashes.push({ x: sx, y: sy, angle: Math.atan2(pdy, pdx), life: 0.12, maxLife: 0.12 });
      player.angle = Math.atan2(pdy, pdx);
      shake = Math.max(shake, 6); recoilAmt = 1.5;
      if (hit.enemy) {
        const dmg = 150 * (rageActive ? 2 : 1);
        hit.enemy.hp -= dmg;
        burst(hit.x, hit.y, "#ff4000", 10);
        skillEnergy = Math.min(1, skillEnergy + 0.5);
        speechBubbles.push({ text: "HIT!", life: 1.3, maxLife: 1.3, screen: true });
      } else if (hit.solid) {
        burst(hit.x, hit.y, "#f4efe8", 6); hitWallCorner(hit.x, hit.y, 0.5, 50);
        speechBubbles.push({ text: "MISS", life: 0.9, maxLife: 0.9, screen: true });
      } else {
        applyTBHit(hit, 150 * (rageActive ? 2 : 1));
        speechBubbles.push({ text: hit.aiPlayer || hit.facility || hit.crate ? "HIT!" : "MISS", life: 0.9, maxLife: 0.9, screen: true });
      }
    }

    function throwBomb(target) {
      if (bombCooldown > 0) return;
      bombCooldown = 0.72;
      const dx = target.x - player.x;
      const dy = target.y - player.y;
      const d = Math.hypot(dx, dy) || 1;
      const range = 140;
      const tx = clamp(player.x + dx / d * range, 70, world.w - 70);
      const ty = clamp(player.y + dy / d * range, 70, world.h - 70);

      if (playerChar.bombType === "c4") {
        if (c4List.length >= 3) {
          speechBubbles.push({ x: player.x, y: player.y - 40, text: "C4 MAX (3)", life: 1.0, maxLife: 1.0, screen: true });
          return;
        }
        c4List.push({ x: tx, y: ty, r: 11, placed: true });
        speechBubbles.push({ x: player.x, y: player.y - 38, text: `C4 SET [${c4List.length}/3]`, life: 0.8, maxLife: 0.8, screen: true });
        return;
      }

      bombs.push({
        x: player.x + Math.cos(player.angle) * 28,
        y: player.y + Math.sin(player.angle) * 28,
        sx: player.x, sy: player.y, tx, ty,
        life: 0.48, maxLife: 0.48, r: 13
      });
    }

    function detonateC4() {
      if (c4List.length === 0) return;
      for (const c4 of c4List) explodeBomb({ x: c4.x, y: c4.y, hostile: false });
      c4List.length = 0;
      c4AimShakeCount = 0;
      speechBubbles.push({ x: player.x, y: player.y - 40, text: "BOOM!", life: 1.0, maxLife: 1.0, screen: true });
    }

    function activateSkill() {
      if (skillEnergy < 1 || skillActive || missileCharging) return;
      const st = playerChar.skillType;
      if (st === "stun_aura") {
        // MEDIC: 주변 적 마취 (산탄총 사거리 30% = 118px)
        const stunR = 392 * 0.3;
        for (const e of enemies) {
          if (Math.hypot(e.x - player.x, e.y - player.y) < stunR) {
            e.slowTimer = 3.0;
            burst(e.x, e.y, "#88ccff", 8);
          }
        }
        skillEnergy = 0;
        speechBubbles.push({ x: player.x, y: player.y - 40, text: "STUN AURA!", life: 1.5, maxLife: 1.5, screen: true });
      } else if (st === "homing_missiles") {
        // BULL: 유도 미사일 6발 — 플레이어 주변 궤도 공전 후 적 추적
        skillEnergy = 0;
        for (let i = 0; i < 6; i++) {
          const orbitAngle = (i / 6) * Math.PI * 2; // 초기 공전 각도 (60도 간격)
          homingMissiles.push({
            x: player.x + Math.cos(orbitAngle) * 50,
            y: player.y + Math.sin(orbitAngle) * 50,
            vx: 0, vy: 0,
            orbitAngle: orbitAngle,   // 공전 각도 (매 프레임 증가)
            orbitRadius: 50,          // 공전 반경 (서서히 커짐)
            sinePhase: i * (Math.PI * 2 / 6),
            sineFreq: 1.8 + Math.random() * 0.4,
            orbitTime: 0.6,           // 0.6초 공전 후 유도 발사
            life: 14.0,
            delay: 0,
          });
        }
        shake = Math.max(shake, 4);
        speechBubbles.push({ text: "LOCK ON!", life: 1.2, maxLife: 1.2, screen: true });
      } else if (st === "drone_laser") {
        // VIPER: 캐릭터 등뒤 → 가까운 적 4명 머리 위로 순차 비행 → 레이저
        skillEnergy = 0;
        const sorted = enemies.slice().sort((a, b) =>
          Math.hypot(a.x - player.x, a.y - player.y) - Math.hypot(b.x - player.x, b.y - player.y)
        );
        const targets = sorted.slice(0, Math.min(4, sorted.length));
        const bx = player.x - Math.cos(player.angle) * 44;
        const by = player.y - Math.sin(player.angle) * 44;
        targets.forEach((e, i) => {
          drones.push({
            target: e,
            x: bx, y: by,
            startX: bx, startY: by,
            phase: "waiting",   // waiting → flying → hovering → firing → done
            waitTimer: i * 0.2,
            flyProgress: 0,
            flyDuration: 0.5,
            hoverTimer: 0.5,
            laserTimer: 0,
            doneTimer: 0.35,
          });
        });
        shake = Math.max(shake, 5);
        speechBubbles.push({ text: "DRONE STRIKE!", life: 1.2, maxLife: 1.2, screen: true });
      } else {
        // HAWK: 발칸포 스킬
        skillActive = true; skillTimer = 3.0; shootCooldown = 0;
        skillEnergy = 0;
      }
    }

    function fireMissile() {
      if (!missileCharging) return;
      missileCharging = false;
      skillEnergy = 0;
      const spd = 620;
      missileActive = {
        x: player.x + missileAimX * 40,
        y: player.y + missileAimY * 40,
        vx: missileAimX * spd,
        vy: missileAimY * spd,
        life: 3.5
      };
      speechBubbles.push({ x: player.x, y: player.y - 40, text: "MISSILE!", life: 1.0, maxLife: 1.0, screen: true });
      shake = Math.max(shake, 6);
    }

    function explodeMortar(x, y) {
      // 수류탄 2배 반경/데미지
      const radius = 440;
      if (pointInsideSolid(x, y)) { addFizzle(x, y); return; }
      addBlastLight(x, y, radius);
      playSfx("flamer", 0.8);
      burstVisible(x, y, "#ffe880", 28, radius);
      for (const enemy of enemies) {
        const d = Math.hypot(enemy.x - x, enemy.y - y);
        if (d <= radius && hasExplosionLineOfSight(x, y, enemy.x, enemy.y, d)) {
          enemy.hp -= (360 * (1 - d / radius) + 180) * (rageActive ? 2 : 1);
          burst(enemy.x, enemy.y, "#ffcc44", 6);
        }
      }
      shake = Math.max(shake, 10);
    }

    function explodeMissile(x, y) {
      // 수류탄 10배 반경/데미지
      const radius = 1100;
      if (pointInsideSolid(x, y)) x = clamp(x, 50, world.w - 50), y = clamp(y, 50, world.h - 50);
      addBlastLight(x, y, radius);
      playSfx("flamer", 1.2);
      burstVisible(x, y, "#40c8ff", 60, radius);
      for (const enemy of enemies) {
        const d = Math.hypot(enemy.x - x, enemy.y - y);
        if (d <= radius && hasExplosionLineOfSight(x, y, enemy.x, enemy.y, d)) {
          enemy.hp -= (1800 * (1 - d / radius) + 900) * (rageActive ? 2 : 1);
          burst(enemy.x, enemy.y, "#80e8ff", 10);
        }
      }
      shake = Math.max(shake, 18);
      speechBubbles.push({ x, y: y - 60, text: "MASSIVE IMPACT!", life: 2.0, maxLife: 2.0, screen: false });
    }

    function throwEnemyBomb(enemy, target) {
      const dx = target.x - enemy.x;
      const dy = target.y - enemy.y;
      const d = Math.hypot(dx, dy) || 1;
      const range = Math.min(190, d);
      bombs.push({
        x: enemy.x,
        y: enemy.y,
        sx: enemy.x,
        sy: enemy.y,
        tx: clamp(enemy.x + dx / d * range, 70, world.w - 70),
        ty: clamp(enemy.y + dy / d * range, 70, world.h - 70),
        life: 0.52,
        maxLife: 0.52,
        r: 13,
        hostile: true
      });
    }

    function explodeBomb(bomb) {
      const radius = 220;
      if (pointInsideSolid(bomb.x, bomb.y)) {
        addFizzle(bomb.x, bomb.y);
        shake = Math.max(shake, 3);
        return;
      }
      addBlastLight(bomb.x, bomb.y, radius);
      playSfx("flamer", 0.72);
      burstVisible(bomb.x, bomb.y, "#ffe4b0", 34, radius);
      if (bomb.hostile) {
        const pd = Math.hypot(player.x - bomb.x, player.y - bomb.y);
        if (pd <= radius && hasExplosionLineOfSight(bomb.x, bomb.y, player.x, player.y, pd) && player.invuln <= 0) {
          player.hp -= 34 * (1 - pd / radius) + 16;
          player.invuln = 0.22;
          burst(player.x, player.y, "#9a1d18", 12);
          if (player.hp <= 0) {
            player.hp = 0;
            state = "dead";
            gameOverTimer = 0;
          }
        }
        shake = Math.max(shake, 12);
        return;
      }
      for (const enemy of enemies) {
        const d = Math.hypot(enemy.x - bomb.x, enemy.y - bomb.y);
        if (d <= radius && hasExplosionLineOfSight(bomb.x, bomb.y, enemy.x, enemy.y, d)) {
          enemy.hp -= 180 * (1 - d / radius) + 90;
          burst(enemy.x, enemy.y, "#d8e8ff", 6);
        }
      }
      shake = Math.max(shake, 12);
    }

    function addBlastLight(x, y, radius) {
      blastLights.push({
        x,
        y,
        life: 0.34,
        maxLife: 0.34,
        radius
      });
    }

    function addFizzle(x, y) {
      fizzles.push({
        x,
        y,
        life: 0.2,
        maxLife: 0.2,
        angle: Math.random() * Math.PI * 2
      });
      for (let i = 0; i < 12; i++) {
        const a = Math.random() * Math.PI * 2;
        const s = 55 + Math.random() * 105;
        particles.push({
          x,
          y,
          vx: Math.cos(a) * s,
          vy: Math.sin(a) * s,
          life: 0.08 + Math.random() * 0.12,
          color: Math.random() < 0.5 ? "#b9b2a6" : "#ffbf72",
          r: 1.6 + Math.random() * 2.6,
          solidStop: true
        });
      }
    }

    function hasExplosionLineOfSight(x1, y1, x2, y2, distance) {
      return hasLineOfSight(x1, y1, x2, y2, distance);
    }

    function hasLineOfSight(x1, y1, x2, y2, distance) {
      const dx = (x2 - x1) / (distance || 1);
      const dy = (y2 - y1) / (distance || 1);
      for (const rect of explosionBlockers()) {
        const t = rayRect(x1, y1, dx, dy, rect);
        if (t !== null && t > 3 && t < distance - 8) return false;
      }
      return true;
    }

    function explosionBlockers() {
      const blockers = walls.slice();
      for (const door of doors) {
        if (door.open >= 0.72) continue;
        for (const rect of doorCollisionRects(door)) blockers.push(rect);
      }
      for (const prop of props) {
        if (propBlocksMovement(prop)) blockers.push(propCollisionRect(prop));
      }
      return blockers;
    }

    function pointInsideSolid(x, y) {
      for (const rect of explosionBlockers()) {
        if (x >= rect.x && x <= rect.x + rect.w && y >= rect.y && y <= rect.y + rect.h) return true;
      }
      return false;
    }

    function hasLOS(x1, y1, x2, y2) {
      const dx = x2 - x1, dy = y2 - y1;
      const dist = Math.hypot(dx, dy);
      if (dist < 1) return true;
      const steps = Math.ceil(dist / 10);
      const ix = dx / steps, iy = dy / steps;
      for (let i = 1; i < steps; i++) {
        if (pointInsideSolid(x1 + ix * i, y1 + iy * i)) return false;
      }
      return true;
    }

    function hitWallCorner(hitX, hitY, dmgAmt, nearRadius) {
      for (const wall of walls) {
        const cs = Math.min(wall.w, wall.h) * 0.3;
        const corners = [
          { cx: wall.x, cy: wall.y, idx: 0 },
          { cx: wall.x + wall.w, cy: wall.y, idx: 1 },
          { cx: wall.x, cy: wall.y + wall.h, idx: 2 },
          { cx: wall.x + wall.w, cy: wall.y + wall.h, idx: 3 }
        ];
        for (const c of corners) {
          if (Math.hypot(hitX - c.cx, hitY - c.cy) < nearRadius) {
            if (!wallCornerDmg.has(wall)) wallCornerDmg.set(wall, [0, 0, 0, 0]);
            const d = wallCornerDmg.get(wall);
            d[c.idx] = Math.min(1, d[c.idx] + dmgAmt);
          }
        }
      }
    }

    function rayBlockDistance(x, y, dx, dy, maxDist) {
      let best = maxDist;
      for (const rect of explosionBlockers()) {
        const t = rayRect(x, y, dx, dy, rect);
        if (t !== null && t > 2 && t < best) best = Math.max(0, t - 2);
      }
      return best;
    }

    function visibilityPoints(x, y, radius, steps) {
      const points = [];
      for (let i = 0; i < steps; i++) {
        const a = (i / steps) * Math.PI * 2;
        const d = rayBlockDistance(x, y, Math.cos(a), Math.sin(a), radius);
        points.push({ x: x + Math.cos(a) * d, y: y + Math.sin(a) * d });
      }
      return points;
    }

    function updateIdleRaid(dt, playerMoved, acted) {
      if (!specialForcesEnabled) {
        idleRaidTimer = 0;
        idleRaidWarned = false;
        raidWarningActive = false;
        return;
      }
      idleRaidCooldown = Math.max(0, idleRaidCooldown - dt);
      const drift = Math.hypot(player.x - lastIdleX, player.y - lastIdleY);
      if (playerMoved < 1.2 && drift < 10 && !acted) {
        idleRaidTimer += dt;
      } else {
        idleRaidTimer = 0;
        idleRaidWarned = false;
        raidWarningActive = false;
        lastIdleX = player.x;
        lastIdleY = player.y;
      }
      if (idleRaidTimer >= 5 && !idleRaidWarned && idleRaidCooldown <= 0) {
        idleRaidWarned = true;
        raidWarningActive = true;
        raidAlarmTimer = 0;
        addScreenWarning("SPECIAL FORCES INBOUND - MOVE");
      }
      if (idleRaidTimer >= 10 && idleRaidCooldown <= 0) {
        if (spawnIdleRaid()) {
          idleRaidTimer = 0;
          idleRaidWarned = false;
          raidWarningActive = false;
          idleRaidCooldown = 22;
          lastIdleX = player.x;
          lastIdleY = player.y;
        }
      }
    }

    function updateRaidWarningEffects(dt) {
      if (!raidWarningActive) return;
      raidWarningPulse += dt * 8.5;
      raidAlarmTimer -= dt;
      if (raidAlarmTimer <= 0) {
        raidAlarmTimer = 0.58;
        playRaidAlarm();
      }
    }

    function spawnIdleRaid() {
      const spots = findRaidSpawnSpots();
      if (spots.length < 4) return false;
      const squad = [
        { kind: "shooter", leader: true, hold: 1.75, text: "MOVE", delay: 0 },
        { kind: "melee", hold: 0.55, text: "ROGER 1", delay: 0.52 },
        { kind: "shooter", hold: 0.95, text: "ROGER 2", delay: 0.92 },
        { kind: "flamer", hold: 1.35, text: "ROGER 3", delay: 1.32 }
      ];
      for (let i = 0; i < squad.length; i++) {
        const spec = squad[i];
        const fast = false;
        const r = spec.leader ? 27 : 24;
        const maxHp = spec.leader ? 105 + wave * 5 : enemyMaxHp(spec.kind, fast);
        const enemy = {
          x: spots[i].x,
          y: spots[i].y,
          r,
          collisionR: spec.leader ? 20 : 18,
          hp: maxHp,
          maxHp,
          speed: spec.leader ? 82 + wave * 2 : enemySpeed(spec.kind, fast) + 16,
          bite: 0,
          shoot: 0.35 + i * 0.15,
          kind: spec.kind,
          fast,
          alert: 8,
          lastSeenX: player.x,
          lastSeenY: player.y,
          wanderAngle: Math.random() * Math.PI * 2,
          wanderTimer: 0.4 + Math.random() * 0.8,
          wobble: Math.random() * 10,
          raidHold: spec.hold + 1.15,
          raidLeader: !!spec.leader,
          raidAggressive: true,
          raidBombThrown: false,
          dropTime: 1.15 + i * 0.08,
          dropMax: 1.15 + i * 0.08,
          dropHeight: 210 + i * 18
        };
        enemies.push(enemy);
        addSpeechBubble(enemy, spec.text, spec.delay + enemy.dropMax);
      }
      return true;
    }

    function findRaidSpawnSpots() {
      const spots = [];
      const baseAngles = [0, Math.PI / 2, Math.PI, Math.PI * 1.5];
      for (const base of baseAngles) {
        const spot = findRaidSpotNearAngle(base, spots);
        if (spot) spots.push(spot);
      }
      if (spots.length >= 4) return spots;
      for (let i = 0; i < 40 && spots.length < 4; i++) {
        const spot = findRaidSpotNearAngle(Math.random() * Math.PI * 2, spots);
        if (spot) spots.push(spot);
      }
      return spots;
    }

    function findRaidSpotNearAngle(angle, existing) {
      for (let offset = 0; offset < 9; offset++) {
        const a = angle + (offset - 4) * 0.18;
        for (const radius of [230, 290, 360, 440, 520]) {
          const x = clamp(player.x + Math.cos(a) * radius, 80, world.w - 80);
          const y = clamp(player.y + Math.sin(a) * radius, 80, world.h - 80);
          const d = Math.hypot(x - player.x, y - player.y);
          if (d < 180) continue;
          if (hasLineOfSight(player.x, player.y, x, y, d)) continue;
          if (!isSpawnFree(x, y, 24)) continue;
          if (existing.some((spot) => dist2(spot.x, spot.y, x, y) < 90 * 90)) continue;
          return { x, y };
        }
      }
      return null;
    }

    function update(dt) {
      if (state === "intro") {
        if (!introStarted) return;
        introTimer += dt;
        if (!introSoundStarted) {
          introSoundStarted = true;
          playParkLogoSound();
        }
        if (introTimer >= 5) {
          state = "menu";
          gameOverTimer = 0;
        }
        return;
      }
      if (state === "maptool") {
        mapTool.statusTime = Math.max(0, mapTool.statusTime - dt);
        return;
      }
      if (state === "lobby") return;
      if (state === "teamselect") return;
      if (state !== "play") {
        gameOverTimer += dt;
        return;
      }
      // 클라이언트 모드: 로컬 예측 이동 + 입력 전송 + 원격 플레이어 보간
      if (mp.role === "client") {
        // 로컬 이동 예측 (즉각 반응, 서버 보정은 applyRemoteState에서)
        let mx = 0, my = 0;
        if (keys.has("KeyW") || keys.has("ArrowUp")) my--;
        if (keys.has("KeyS") || keys.has("ArrowDown")) my++;
        if (keys.has("KeyA") || keys.has("ArrowLeft")) mx--;
        if (keys.has("KeyD") || keys.has("ArrowRight")) mx++;
        if (isMobile) { mx += mobileControls.moveX; my += mobileControls.moveY; }
        const cmag = Math.hypot(mx, my);
        if (cmag > 0.01) { mx /= cmag; my /= cmag; moveCircle(player, mx * 106 * dt, my * 106 * dt); }
        player.isMoving = cmag > 0.01;
        if (player.isMoving) player.walkTime += dt; else player.walkTime *= 0.88;
        // 원격 플레이어(1P/호스트) 부드러운 보간
        if (remotePlayerTarget) {
          if (!remotePlayer) remotePlayer = { ...remotePlayerTarget };
          const lf = Math.min(1, dt * 14);
          remotePlayer.x += (remotePlayerTarget.x - remotePlayer.x) * lf;
          remotePlayer.y += (remotePlayerTarget.y - remotePlayer.y) * lf;
          remotePlayer.angle = remotePlayerTarget.angle;
          remotePlayer.hp = remotePlayerTarget.hp;
          remotePlayer.isMoving = remotePlayerTarget.isMoving;
          if (remotePlayer.isMoving) remotePlayer.walkTime = (remotePlayer.walkTime || 0) + dt;
          else remotePlayer.walkTime = (remotePlayer.walkTime || 0) * 0.88;
        }
        // 적 wobble 애니메이션 (로컬)
        for (const e of enemies) e.wobble = (e.wobble || 0) + dt * 8;
        let cAimTarget;
        if (isMobile) {
          if (mobileControls.shoot && mobileControls.aimDeflection > 0) {
            cAimTarget = mobileAimWorldTarget();
            player.angle = Math.atan2(cAimTarget.y - player.y, cAimTarget.x - player.x);
          } else {
            const cMovMag = Math.hypot(mobileControls.moveX, mobileControls.moveY);
            if (cMovMag > 0.1) player.angle = Math.atan2(mobileControls.moveY, mobileControls.moveX);
            cAimTarget = { x: player.x + Math.cos(player.angle) * 200, y: player.y + Math.sin(player.angle) * 200 };
          }
        } else {
          cAimTarget = screenToWorld(mouse.x, mouse.y);
          player.angle = Math.atan2(cAimTarget.y - player.y, cAimTarget.x - player.x);
        }
        updateCamera(dt, cAimTarget);
        sendInputToHost();
        if (isMobile && mobileControls.swap) {
          const weps2 = [playerChar.primaryW, playerChar.secondaryW];
          const idx2 = weps2.indexOf(currentWeapon);
          currentWeapon = weps2[(idx2 + 1) % weps2.length];
          mobileControls.swap = false;
        }
        return;
      }

      shootCooldown -= dt;
      bombCooldown -= dt;
      spawnTimer -= dt;
      if (rifleReloadTimer > 0) { rifleReloadTimer -= dt; if (rifleReloadTimer <= 0) { rifleReloadTimer = 0; rifleAmmo = RIFLE_MAX_AMMO; } }
      if (shotgunReloadTimer > 0) { shotgunReloadTimer -= dt; if (shotgunReloadTimer <= 0) { shotgunReloadTimer = 0; shotgunAmmo = SHOTGUN_MAX_AMMO; } }
      if (taserReloadTimer > 0) { taserReloadTimer -= dt; if (taserReloadTimer <= 0) { taserReloadTimer = 0; taserAmmo = TASER_MAX_AMMO; } }
      if (pistolReloadTimer > 0) { pistolReloadTimer -= dt; if (pistolReloadTimer <= 0) { pistolReloadTimer = 0; pistolAmmo = PISTOL_MAX_AMMO; } }
      if (sniperReloadTimer > 0) { sniperReloadTimer -= dt; if (sniperReloadTimer <= 0) { sniperReloadTimer = 0; sniperAmmo = SNIPER_MAX_AMMO; } }
      if (heavyPistolReloadTimer > 0) { heavyPistolReloadTimer -= dt; if (heavyPistolReloadTimer <= 0) { heavyPistolReloadTimer = 0; heavyPistolAmmo = HEAVY_PISTOL_MAX_AMMO; } }
      player.invuln -= dt;
      player.dodge -= dt;
      updateRaidWarningEffects(dt);
      if (spawnTimer <= 0) {
        spawnTimer = Math.max(0.35, 1.25 - wave * 0.045);
        if (gameMode !== "teambattle" && enemies.length < 18 + wave * 2) spawnEnemy();
      }
      wave = 1 + Math.floor(kills / 12);

      let mx = 0;
      let my = 0;
      if (keys.has("KeyW") || keys.has("ArrowUp")) my--;
      if (keys.has("KeyS") || keys.has("ArrowDown")) my++;
      if (keys.has("KeyA") || keys.has("ArrowLeft")) mx--;
      if (keys.has("KeyD") || keys.has("ArrowRight")) mx++;
      if (isMobile) {
        mx += mobileControls.moveX;
        my += mobileControls.moveY;
      }
      const mag = Math.hypot(mx, my) || 1;
      mx /= mag;
      my /= mag;

      const sprint = keys.has("ShiftLeft") || keys.has("ShiftRight");
      let speed = sprint && player.stamina > 0 ? 160 : 106;
      speed *= playerChar.speedMult * (rageActive ? 1.2 : 1);
      if (sprint && (mx || my)) player.stamina = Math.max(0, player.stamina - dt * 35);
      else player.stamina = Math.min(100, player.stamina + dt * 22);
      if ((keys.has("Space") || (isMobile && mobileControls.dodge)) && player.stamina > 25 && player.dodge <= 0 && (mx || my)) {
        player.dodge = 0.22;
        player.invuln = 0.28;
        player.stamina -= 25;

      }
      if (player.dodge > 0) speed = 520;
      if (skillActive || missileCharging) speed = 0;

      const beforePlayerX = player.x;
      const beforePlayerY = player.y;
      moveCircle(player, mx * speed * dt, my * speed * dt);
      player.moveX = mx;
      player.moveY = my;
      player.isMoving = Math.hypot(player.x - beforePlayerX, player.y - beforePlayerY) > 0.35;
      if (player.isMoving) { player.walkTime += dt; stationaryTimer = 0; autoGatling = false; }
      else { player.walkTime *= 0.88; stationaryTimer = 0; autoGatling = false; }
      if (recoilAmt > 0) recoilAmt = Math.max(0, recoilAmt - dt * 16);
      updateDoors(dt);
      updateIdleRaid(dt, Math.hypot(player.x - beforePlayerX, player.y - beforePlayerY), mouse.down || mouse.right || keys.has("KeyQ"));

      const worldMouse = screenToWorld(mouse.x, mouse.y);
      let aimTarget = currentAimTarget(worldMouse);
      player.angle = Math.atan2(aimTarget.y - player.y, aimTarget.x - player.x);
      updateCamera(dt, isMobile ? aimTarget : worldMouse);
      if (isMobile) {
        if (mobileControls.shoot && mobileControls.aimDeflection > 0) {
          // AIM 조이스틱 조작 중: AIM 방향 우선
          aimTarget = mobileAimWorldTarget();
          player.angle = Math.atan2(aimTarget.y - player.y, aimTarget.x - player.x);
        } else {
          // AIM 없음: 이동 방향으로 총구 방향
          const movMag = Math.hypot(mobileControls.moveX, mobileControls.moveY);
          if (movMag > 0.1) {
            player.angle = Math.atan2(mobileControls.moveY, mobileControls.moveX);
          }
          // 이동도 없으면 마지막 angle 유지

      }
      updateAimRay(aimTarget);
      // Host: 플레이어2 업데이트
      if (mp.role === "host" && player2 && mp.connected) {
        const m2 = Math.hypot(p2Input.mx, p2Input.my);
        if (m2 > 0.01) {

        } else {

          player2.walkTime = (player2.walkTime || 0) * 0.88;
        }
        player2.angle = p2Input.angle;
        player2.invuln = Math.max(0, (player2.invuln || 0) - dt);
        player2.shootCooldown = Math.max(0, (player2.shootCooldown || 0) - dt);
        if (p2Input.shoot && player2.shootCooldown <= 0) {
          const dx2 = Math.cos(player2.angle), dy2 = Math.sin(player2.angle);
          const sx2 = player2.x + dx2 * 34, sy2 = player2.y + dy2 * 34;
          const hit2 = raycastShot(sx2, sy2, dx2, dy2, 980);
          tracers.push({ x1: sx2, y1: sy2, x2: hit2.x, y2: hit2.y, life: 0.09, maxLife: 0.09 });
          if (hit2.enemy) { hit2.enemy.hp -= 44; burst(hit2.x, hit2.y, "#c8e7a0", 5); skillEnergy = Math.min(1, skillEnergy + 0.125); }
          else if (hit2.solid) burst(hit2.x, hit2.y, "#f4efe8", 3);
          player2.shootCooldown = 0.11;
        }
        mp.stateTimer -= dt;
        if (mp.stateTimer <= 0) {
          mp.stateTimer = 0.033;
          sendStateToClient();
        }
      }
      if (skillActive) {
        skillTimer -= dt;
        if (skillTimer <= 0) { skillActive = false; skillEnergy = 0; }
        shootCooldown -= dt;
        if (shootCooldown <= 0) {
          shootCooldown = 0.055;
          for (let s = -3; s <= 3; s++) {
            const a = player.angle + s * 0.22 + (Math.random() - 0.5) * 0.12;
            const dx = Math.cos(a), dy = Math.sin(a);
            const sx = player.x + dx * 34, sy = player.y + dy * 34;
            const hit = raycastShot(sx, sy, dx, dy, 1200);
            tracers.push({ x1: sx, y1: sy, x2: hit.x, y2: hit.y, life: 0.07, maxLife: 0.07 });
            if (hit.enemy) { hit.enemy.hp -= 28; burst(hit.x, hit.y, "#9f2a24", 4); }
            else if (hit.solid) burst(hit.x, hit.y, "#f4efe8", 3);
          }
          flashes.push({ x: player.x + Math.cos(player.angle) * 20, y: player.y + Math.sin(player.angle) * 20, angle: player.angle, life: 0.06, maxLife: 0.06 });
          playSfx("playerGun", 0.9 + Math.random() * 0.1);
          recoilAmt = 1.0; shake = Math.max(shake, 3);

      } else {
        const mobileFireRifle = isMobile && currentWeapon === 0 && mobileControls.aimAtEdge;

      }
      // 자동 개틀링: 1초 이상 정지하면 자동 속사
      if (autoGatling && !skillActive) {

          const ga = player.angle + (Math.random() - 0.5) * 0.06;

          if (hit.enemy) { hit.enemy.hp -= 22; burst(hit.x, hit.y, "#ffa040", 3); skillEnergy = Math.min(1, skillEnergy + 0.05); }
          else if (hit.solid) burst(hit.x, hit.y, "#f4efe8", 2);
          flashes.push({ x: gsx + gdx * 12, y: gsy + gdy * 12, angle: player.angle, life: 0.05, maxLife: 0.05 });
          playSfx("playerGun", 0.5 + Math.random() * 0.15);
          recoilAmt = 0.8; shake = Math.max(shake, 2);
        }
      }
      if (!skillActive && !missileCharging && (mouse.right || keys.has("KeyQ"))) throwBomb(aimTarget);

      // C4 위아래 흔들기 감지 (BULL 전용)
      if (playerChar.bombType === "c4" && c4List.length > 0) {
        const aimY = isMobile ? mobileControls.aimKnobY : 0;
        if (Math.abs(aimY - c4AimShakePrev) > 0.35 && Math.sign(aimY) !== Math.sign(c4AimShakePrev) && c4AimShakePrev !== 0) {

      }

      // 스킬 발동: E키 (PC) / AIM 위아래 3번 (모바일) — 전 캐릭터 통일
      if (keys.has("KeyE") && skillEnergy >= 1 && !skillActive && !missileCharging) {

      }
      if (isMobile) {
        // AIM 좌우상하 마구 흔들기(1초 내 5회 방향 전환) → 스킬 발동 (전 캐릭터 통일)
        const threshold = 0.25;
        const aimDx = mobileControls.aimDeflection > threshold ? mobileControls.aimDirX : 0;
        const aimDy = mobileControls.aimDeflection > threshold ? mobileControls.aimDirY : 0;
        if (mobileControls.shoot && (aimDx !== 0 || aimDy !== 0)) {

          if (aimDy !== 0 && Math.sign(aimDy) !== Math.sign(skillAimShakePrevY) && skillAimShakePrevY !== 0) reversed = true;
          if (reversed) {

        } else if (!mobileControls.shoot) {

      mobileControls.prevAimDeflection = mobileControls.aimDeflection;
      // 남성 캐릭터 분노 상태: HP 급감 시 자동 발동 (2초 2배 능력)
      if (playerChar.gender === "male") {
        if (!rageActive && player.hp < ragePrevHp - 20 && player.hp > 0) {

          speechBubbles.push({ x: player.x, y: player.y - 40, text: "RAGE!", life: 1.2, maxLife: 1.2, screen: true });

          if (rageTimer <= 0) { rageActive = false; rageTimer = 0; }
        }
      }
      // MEDIC 힐 오라: 정지 시 자가치유 초당 10% HP + 주변 아군 힐
      if (playerChar.gender === "female") {
        const healR = 392 * 0.3; // 산탄총 사거리의 30%
        if (!player.isMoving) {
          healAuraTimer += dt;
          if (healAuraTimer >= 1.0) {

            const maxHp = Math.round(100 * playerChar.hpMult);
            player.hp = Math.min(maxHp, player.hp + Math.round(maxHp * 0.1));
          }
        } else { healAuraTimer = 0; }
        // 주변 아군 힐 (멀티플레이어)
        const ally = (mp.role === "host" && player2) ? player2 : (mp.role === "client" && remotePlayer ? remotePlayer : null);
        if (ally && Math.hypot(ally.x - player.x, ally.y - player.y) < healR) {
          if (!healAuraTimer._allyHealTimer) healAuraTimer._allyHealTimer = 0;
          healAuraTimer._allyHealTimer = (healAuraTimer._allyHealTimer || 0) + dt;
          if (healAuraTimer._allyHealTimer >= 1.0) {
            healAuraTimer._allyHealTimer = 0;
            ally.hp = Math.min(100, (ally.hp || 0) + 10);
          }
        }
      } else { healAuraTimer = 0; }
      mobileControls.bomb = false;
      if (mobileControls.swap) {
        const weps = [playerChar.primaryW, playerChar.secondaryW];
        const idx = weps.indexOf(currentWeapon);
        currentWeapon = weps[(idx + 1) % weps.length];
        mobileControls.swap = false;
      }

      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.x += b.vx * dt;
        b.y += b.vy * dt;
        b.life -= dt;
        if (b.life <= 0 || b.x < 0 || b.x > world.w || b.y < 0 || b.y > world.h) { bullets.splice(i, 1); continue; }
        // 팀배틀: 시설 피격 판정 (플레이어 총알만)
        if (gameMode === "teambattle" && b.fromPlayer) {
          let hitFac = false;
          for (const fac of facilities) {
            if (fac.team === playerTeam) continue;
            if (b.x >= fac.x && b.x <= fac.x + fac.w && b.y >= fac.y && b.y <= fac.y + fac.h) {
              fac.hp -= b.dmg || 20;
              burst(b.x, b.y, fac.team === 1 ? "#ff8844" : "#4488ff", 5);
              bullets.splice(i, 1); hitFac = true; break;
            }
          }
          if (hitFac) continue;
          // 크레이트 피격 판정
          let hitCrate = false;
          for (const cr of crates) {
            if (cr.dead) continue;
            if (b.x >= cr.x - cr.w/2 && b.x <= cr.x + cr.w/2 && b.y >= cr.y - cr.h/2 && b.y <= cr.y + cr.h/2) {
              cr.hp -= b.dmg || 20;
              if (cr.hp <= 0) { cr.dead = true; pickups.push({ x: cr.x, y: cr.y, r: 17, type: "heal", life: 8, pulse: 0 }); }
              bullets.splice(i, 1); hitCrate = true; break;
            }
          }
          if (hitCrate) continue;
        }
      }
      for (let i = taserBullets.length - 1; i >= 0; i--) {
        const tb = taserBullets[i];
        tb.x += tb.vx * dt;
        tb.y += tb.vy * dt;
        tb.life -= dt;
        if (tb.life <= 0 || tb.x < 0 || tb.x > world.w || tb.y < 0 || tb.y > world.h || pointInsideSolid(tb.x, tb.y)) {
          if (tb.life > 0 && (tb.x >= 0 && tb.x <= world.w && tb.y >= 0 && tb.y <= world.h)) burst(tb.x, tb.y, "#88ccff", 4);
          taserBullets.splice(i, 1);
        }
      }
      // 유도 미사일 업데이트 (BULL 스킬)
      // 유도 미사일 업데이트 (BULL 스킬)
      for (let i = homingMissiles.length - 1; i >= 0; i--) {
        const hm = homingMissiles[i];
        hm.life -= dt;
        if (hm.life <= 0) { homingMissiles.splice(i, 1); continue; }

        const HOMING_SPD = 640; // 유도 단계 속도 (px/s)

        if (hm.orbitTime === undefined) hm.orbitTime = 0;
        if (hm.orbitTime > 0) {
          // ── 공전 단계: 플레이어 주변 바람개비 회전 ──
          hm.orbitTime -= dt;
          hm.orbitAngle += 14.4 * dt; // rad/s 회전
          hm.orbitRadius = Math.min((hm.orbitRadius || 50) + 10 * dt, 120);
          // 중심은 플레이어를 계속 따라감
          hm.x = player.x + Math.cos(hm.orbitAngle) * hm.orbitRadius;
          hm.y = player.y + Math.sin(hm.orbitAngle) * hm.orbitRadius;
          // vx/vy는 렌더링 방향(접선)용
          const tangent = hm.orbitAngle + Math.PI / 2;
          hm.vx = Math.cos(tangent) * HOMING_SPD;
          hm.vy = Math.sin(tangent) * HOMING_SPD;
          // 공전 중 적에 닿으면 폭발 (벽 충돌 검사는 제외)
          let orbitHit = false;
          for (let j = enemies.length - 1; j >= 0; j--) {
            const e = enemies[j];
            if (Math.hypot(e.x - hm.x, e.y - hm.y) < (e.r || 22) + 4) {
              e.hp -= 150 * (rageActive ? 2 : 1);
              skillEnergy = Math.min(1, skillEnergy + 0.1);
              burst(hm.x, hm.y, "#ff8800", 10);
              burst(hm.x, hm.y, "#ffdd00", 7);
              shake = Math.max(shake, 3);
              orbitHit = true; break;
            }
          }
          if (orbitHit) { homingMissiles.splice(i, 1); continue; }
        } else {
          // ── 유도 단계: 플레이어에게 가장 가까운 적으로 수렴 ──
          let bestEnemy = null, bestDist = Infinity;
          for (const e of enemies) {
            const d = Math.hypot(e.x - player.x, e.y - player.y);
            if (d < bestDist) { bestDist = d; bestEnemy = e; }
          }
          if (bestEnemy) {
            const tdx = bestEnemy.x - hm.x, tdy = bestEnemy.y - hm.y;
            const td = Math.hypot(tdx, tdy) || 1;
            hm.vx += ((tdx / td) * HOMING_SPD - hm.vx) * Math.min(1, dt * 4.0);
            hm.vy += ((tdy / td) * HOMING_SPD - hm.vy) * Math.min(1, dt * 4.0);
          }
          // S자 진동
          hm.sinePhase += dt * hm.sineFreq * Math.PI * 2;
          const len2 = Math.hypot(hm.vx, hm.vy) || 1;
          const nx2 = -hm.vy / len2, ny2 = hm.vx / len2;
          hm.vx += nx2 * Math.sin(hm.sinePhase) * 40 * dt;
          hm.vy += ny2 * Math.sin(hm.sinePhase) * 40 * dt;
          // 속도 정규화
          const sp2 = Math.hypot(hm.vx, hm.vy) || 1;
          hm.vx = (hm.vx / sp2) * HOMING_SPD;
          hm.vy = (hm.vy / sp2) * HOMING_SPD;
          hm.x += hm.vx * dt;
          hm.y += hm.vy * dt;
          // 유도 중 충돌 판정 (벽 포함)
          let hit = false;
          for (let j = enemies.length - 1; j >= 0; j--) {
            const e = enemies[j];
            if (Math.hypot(e.x - hm.x, e.y - hm.y) < (e.r || 22) + 4) {
              e.hp -= 150 * (rageActive ? 2 : 1);
              skillEnergy = Math.min(1, skillEnergy + 0.1);
              burst(hm.x, hm.y, "#ff8800", 10);
              burst(hm.x, hm.y, "#ffdd00", 7);
              burst(hm.x, hm.y, "#ff4400", 5);
              shake = Math.max(shake, 3);
              hit = true; break;
            }
          }
          if (!hit && pointInsideSolid(hm.x, hm.y)) {
            burst(hm.x, hm.y, "#ff6600", 6); hit = true;
          }
          if (hit) { homingMissiles.splice(i, 1); continue; }
        }
      }
      // 미사일 업데이트 (구 VIPER 스킬 — 호환성 유지)
      if (missileActive) {
        missileActive.x += missileActive.vx * dt;
        missileActive.y += missileActive.vy * dt;
        missileActive.life -= dt;
        if (missileActive.life <= 0 || pointInsideSolid(missileActive.x, missileActive.y)) {
          explodeMissile(missileActive.x, missileActive.y);
          missileActive = null;
        }
      }
      // 드론 업데이트 (VIPER 스킬)
      for (let i = drones.length - 1; i >= 0; i--) {
        const dr = drones[i];
        if (dr.phase === "waiting") {
          dr.waitTimer -= dt;
          if (dr.waitTimer <= 0) dr.phase = "flying";
        } else if (dr.phase === "flying") {
          dr.flyProgress = Math.min(1, dr.flyProgress + dt / dr.flyDuration);
          const ease = 1 - Math.pow(1 - dr.flyProgress, 3);
          const tx = dr.target.x, ty = dr.target.y - 64;
          dr.x = dr.startX + (tx - dr.startX) * ease;
          dr.y = dr.startY + (ty - dr.startY) * ease;
          if (dr.flyProgress >= 1) dr.phase = "hovering";
        } else if (dr.phase === "hovering") {
          dr.x += (dr.target.x - dr.x) * Math.min(1, dt * 6);
          dr.y += (dr.target.y - 64 - dr.y) * Math.min(1, dt * 6);
          dr.hoverTimer -= dt;
          if (dr.hoverTimer <= 0) {
            dr.phase = "firing";
            dr.laserTimer = 0.4;
            if (enemies.includes(dr.target)) {
              dr.target.hp -= 200 * (rageActive ? 2 : 1);
              skillEnergy = Math.min(1, skillEnergy + 0.15);
              groundBurns.push({ x: dr.target.x, y: dr.target.y, life: 2.2, maxLife: 2.2 });
              burst(dr.x, dr.target.y, "#00ffcc", 8);
              burst(dr.x, dr.target.y, "#ffffff", 5);
              shake = Math.max(shake, 3);
            }
          }
        } else if (dr.phase === "firing") {
          dr.x += (dr.target.x - dr.x) * Math.min(1, dt * 6);
          dr.y += (dr.target.y - 64 - dr.y) * Math.min(1, dt * 6);
          dr.laserTimer -= dt;
          if (dr.laserTimer <= 0) dr.phase = "done";
        } else if (dr.phase === "done") {
          dr.doneTimer -= dt;
          if (dr.doneTimer <= 0) { drones.splice(i, 1); continue; }
        }
      }
      // 바닥 그을음 업데이트
      for (let i = groundBurns.length - 1; i >= 0; i--) {
        groundBurns[i].life -= dt;
        if (groundBurns[i].life <= 0) groundBurns.splice(i, 1);
      }
      for (let i = bombs.length - 1; i >= 0; i--) {
        const b = bombs[i];
        b.life -= dt;
        const t = 1 - Math.max(0, b.life / b.maxLife);
        const ease = 1 - Math.pow(1 - t, 2);
        b.x = b.sx + (b.tx - b.sx) * ease;
        b.y = b.sy + (b.ty - b.sy) * ease;
        if (b.life <= 0) {
          explodeBomb(b);
          bombs.splice(i, 1);
        }
      }

      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        e.wobble += dt * 8;
        if ((e.slowTimer || 0) > 0) e.slowTimer -= dt;
        if (e.dropTime > 0) {
          e.dropTime -= dt;
          continue;
        }
        if (e.raidHold > 0) {
          e.raidHold -= dt;
          continue;
        }
        if (e.raidLeader && !e.raidBombThrown) {
          throwEnemyBomb(e, { x: player.x, y: player.y });
          e.raidBombThrown = true;
        }
        const dx = player.x - e.x;
        const dy = player.y - e.y;
        const d = Math.hypot(dx, dy) || 1;
        const seesPlayer = e.raidAggressive || (d < 720 && hasLineOfSight(e.x, e.y, player.x, player.y, d));
        if (seesPlayer) {
          e.alert = 5.5;
          e.lastSeenX = player.x;
          e.lastSeenY = player.y;
        } else {
          e.alert = Math.max(0, (e.alert || 0) - dt);
        }
        if (!e.raidAggressive && !seesPlayer && e.alert <= 0) {
          updateEnemyPatrol(e, dt);
          continue;
        }
        const contact = e.r + player.r + 8;
        const orbitDamping = clamp((d - contact) / 160, 0, 1);
        const sway = Math.sin(e.wobble) * 0.16 * orbitDamping;
        const preferred = e.kind === "shooter" ? 300 : (e.kind === "flamer" ? 230 : contact);
        const keepsRange = e.kind === "shooter" || e.kind === "flamer";
        const targetX = seesPlayer ? player.x : e.lastSeenX;
        const targetY = seesPlayer ? player.y : e.lastSeenY;
        const raidPathTarget = e.raidAggressive && !hasLineOfSight(e.x, e.y, player.x, player.y, d) ? raidMoveTarget(e) : null;
        const actualTargetX = raidPathTarget ? raidPathTarget.x : targetX;
        const actualTargetY = raidPathTarget ? raidPathTarget.y : targetY;
        const tdx = actualTargetX - e.x;
        const tdy = actualTargetY - e.y;
        const td = Math.hypot(tdx, tdy) || 1;
        const advance = seesPlayer && keepsRange && d < preferred ? -0.55 : (td > preferred || !seesPlayer ? 1 : 0.18);
        const desiredX = tdx / td * advance + -tdy / td * sway;
        const desiredY = tdy / td * advance + tdx / td * sway;
        moveEnemySmart(e, desiredX, desiredY, tdx / td, tdy / td, td, dt);
        if (!seesPlayer && td < 42) e.alert = Math.min(e.alert, 0.7);
        e.bite -= dt;
        e.shoot -= dt;
        const hasShotLine = d < 720 && hasLineOfSight(e.x, e.y, player.x, player.y, d);
        if (e.kind === "shooter" && e.shoot <= 0 && d < 620 && hasShotLine) {
          enemyFire(e, dx / d, dy / d);
          e.shoot = e.fast ? 1.25 + Math.random() * 0.8 : 1.65 + Math.random() * 1.1;
        } else if (e.kind === "flamer" && e.shoot <= 0 && d > 72 && d < 285 && hasShotLine) {
          enemyFlame(e, dx / d, dy / d);
          e.shoot = e.fast ? 0.85 + Math.random() * 0.35 : 1.05 + Math.random() * 0.5;
        }

        for (let j = bullets.length - 1; j >= 0; j--) {
          const b = bullets[j];
          if (dist2(e.x, e.y, b.x, b.y) < (e.r + b.r) * (e.r + b.r)) {
            e.hp -= 34;
            bullets.splice(j, 1);
            burst(b.x, b.y, "#c8e7a0", 8);
            break;
          }
        }
        for (let j = taserBullets.length - 1; j >= 0; j--) {
          const tb = taserBullets[j];
          if (dist2(e.x, e.y, tb.x, tb.y) < (e.r + tb.r) * (e.r + tb.r)) {
            e.hp -= 22;
            e.slowTimer = 2.5;
            taserBullets.splice(j, 1);
            burst(tb.x, tb.y, "#88ccff", 10);
            skillEnergy = Math.min(1, skillEnergy + 0.125);
            break;
          }
        }

        if (d < collisionRadius(e) + collisionRadius(player) + 12 && e.bite <= 0 && player.invuln <= 0) {
          e.bite = 0.55;
          player.hp -= e.fast ? 9 : 14;
          player.invuln = 0.18;
          burst(player.x, player.y, "#9a1d18", 10);
          shake = Math.max(shake, 10);
          if (player.hp <= 0) {
            player.hp = 0;
            state = "dead";
            gameOverTimer = 0;
          }
        }
        if (mp.role === "host" && player2 && player2.hp > 0) {
          const dp2 = Math.hypot(player2.x - e.x, player2.y - e.y);
          if (dp2 < collisionRadius(e) + 15 + 12 && e.bite <= 0 && (player2.invuln || 0) <= 0) {
            e.bite = 0.55;
            player2.hp -= e.fast ? 9 : 14;
            player2.invuln = 0.18;
            if (player2.hp <= 0) player2.hp = 0;
          }
        }

        if (e.hp <= 0) {
          burst(e.x, e.y, "#75a64b", 16);
          addCorpse(e);
          maybeDropPotion(e.x, e.y);
          addKillLight(e.x, e.y);
          enemies.splice(i, 1);
          kills++;
          skillEnergy = Math.min(1, skillEnergy + 0.125);
        }
      }

      // ─── AI 플레이어 업데이트 ────────────────────────────────
      if (gameMode === "teambattle") {
        tbTimer += dt;
        updateAiPlayers(dt);
        if (tbOnlineMode) {
          if (mp.role === "tbhost") {
            updateTBNetPlayers(dt);
            mp.stateTimer = (mp.stateTimer||0) + dt;
            if (mp.stateTimer >= 0.05) { mp.stateTimer = 0; sendTBState(); }
          } else if (mp.role === "tbclient") {
            sendTBInput();
          }
        }
        updateFacilities(dt);
        checkTeamBattleWin();
      }

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.life -= dt;
        p.vx *= Math.pow(0.04, dt);
        p.vy *= Math.pow(0.04, dt);
        if (p.solidStop && pointInsideSolid(p.x, p.y)) p.life = 0;
        if (p.life <= 0) particles.splice(i, 1);
      }
      updatePickups(dt);
      updateSpeechBubbles(dt);
      for (let i = flashes.length - 1; i >= 0; i--) {
        flashes[i].life -= dt;
        if (flashes[i].life <= 0) flashes.splice(i, 1);
      }
      for (let i = tracers.length - 1; i >= 0; i--) {
        tracers[i].life -= dt;
        if (tracers[i].life <= 0) tracers.splice(i, 1);
      }
      for (let i = enemyTracers.length - 1; i >= 0; i--) {
        enemyTracers[i].life -= dt;
        if (enemyTracers[i].life <= 0) enemyTracers.splice(i, 1);
      }
      for (let i = flameBursts.length - 1; i >= 0; i--) {
        flameBursts[i].life -= dt;
        if (flameBursts[i].life <= 0) flameBursts.splice(i, 1);
      }
      for (let i = killLights.length - 1; i >= 0; i--) {

      }
      for (let i = blastLights.length - 1; i >= 0; i--) {

      for (let i = fizzles.length - 1; i >= 0; i--) {
