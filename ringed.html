        mp.peer = new Peer("sangsub-tb-" + mp.roomCode, { debug: 0 });
        mp.peer.on("open", () => { mp.status = "대기 중…"; });
        mp.peer.on("error", err => { mp.status = "오류: " + (err.type || err); });
        mp.peer.on("connection", conn => {
          if (mp.conns.length >= 7) { conn.close(); return; }
          const cid = mp.conns.length + 1;
          mp.conns.push({ conn, id: cid });
          mp.inputMap[cid] = { mx:0, my:0, angle:0, shoot:false, bomb:false, skill:false };
          conn.on("open", () => {
            conn.send({ type:"tbwelcome", id: cid });
            broadcastTBLobby();
          });
          conn.on("data", d => {
            if (!d) return;
            if (d.type === "tbpick") {
              tbLobbyPlayers = tbLobbyPlayers.filter(p => p.id !== d.id);
              tbLobbyPlayers.push({ id: d.id, charIdx: d.charIdx, team: d.team });
              broadcastTBLobby();
            } else if (d.type === "tbinput") {
              mp.inputMap[d.id] = d;
            }
          });
          conn.on("close", () => {
            mp.conns = mp.conns.filter(c => c.id !== cid);
            tbLobbyPlayers = tbLobbyPlayers.filter(p => p.id !== cid);
            broadcastTBLobby();
          });
        });
      } catch(e) { mp.status = "PeerJS 오류 — 인터넷 확인"; }
    }

    function joinTBRoom(code) {
      mp.status = "연결 중…";
      try {
        mp.peer = new Peer({ debug: 0 });
        mp.peer.on("open", () => {
          const conn = mp.peer.connect("sangsub-tb-" + code, { reliable: true, serialization: "json" });
          mp.conn = conn;
          conn.on("open", () => { mp.connected = true; mp.status = "연결됨!"; });
          conn.on("data", d => {
            if (!d) return;
            if (d.type === "tbwelcome") {
              myNetId = d.id; mp.role = "tbclient"; mp.status = "로비 대기 중";
              // 바로 내 선택 전송
              sendMyTBPick();
            } else if (d.type === "tblobby") {
              tbLobbyPlayers = d.players;
            } else if (d.type === "tbstart") {
              applyTBStart(d);
            } else if (d.type === "tbstate") {
              applyTBNetState(d);
            }
          });
          conn.on("close", () => { mp.connected = false; mp.status = "연결 끊김"; });
          conn.on("error", err => { mp.status = "연결 오류: " + (err.type||err); });
        });
        mp.peer.on("error", err => { mp.status = "오류: " + (err.type||err); });
      } catch(e) { mp.status = "PeerJS 오류 — 인터넷 확인"; }
    }

    function sendMyTBPick() {
      if (!mp.conn || !mp.connected) return;
      try { mp.conn.send({ type:"tbpick", id:myNetId, charIdx:tbLobbyMyChar, team:tbLobbyMyTeam }); } catch(e) {}
    }

    function broadcastTBLobby() {
      const all = [{ id:0, charIdx:tbLobbyMyChar, team:tbLobbyMyTeam }, ...tbLobbyPlayers];
      mp.conns.forEach(c => { try { c.conn.send({ type:"tblobby", players: all }); } catch(e) {} });
      tbLobbyPlayers = tbLobbyPlayers.filter(p => mp.conns.some(c => c.id === p.id));
    }

    function startTBOnlineGame() {
      // HOST: 팀별 인간 플레이어 정리
      gameMode = "teambattle"; tbOnlineMode = true; myNetId = 0;
      // 호스트 선택
      playerChar = CHAR_DEFS[tbLobbyMyChar];
      playerTeam = tbLobbyMyTeam < 0 ? 0 : tbLobbyMyTeam;
      ensureAudio();
      resetWorld();
      buildTeamBattleMap();

      // 시설물 & 초기 배치
      facilities.length = 0;
      facilities.push({ x:50, y:600, w:200, h:400, hp:3000, maxHp:3000, team:0 });
      facilities.push({ x:world.w-250, y:600, w:200, h:400, hp:3000, maxHp:3000, team:1 });
      teamBattleWon = null; tbTimer = 0;

      // 호스트 플레이어 위치
      player.hp = playerChar.tbHp;
      if (playerTeam === 0) { player.x = 300; player.y = world.h/2; player.angle = 0; }
      else { player.x = world.w-300; player.y = world.h/2; player.angle = Math.PI; }

      // 접속 클라이언트를 tbNetPlayers로 등록
      tbNetPlayers.length = 0;
      for (const c of mp.conns) {
        const pick = tbLobbyPlayers.find(p => p.id === c.id) || { charIdx:0, team:0 };
        const ch = CHAR_DEFS[pick.charIdx];
        const t = pick.team < 0 ? 0 : pick.team;
        const sx = t===0 ? 300 : world.w-300;
        tbNetPlayers.push({
          id: c.id, charIdx: pick.charIdx, team: t,
          x: sx + (Math.random()-0.5)*80, y: world.h/2 + (tbNetPlayers.length-3)*90,
          angle: t===0?0:Math.PI, hp: ch.tbHp, maxHp: ch.tbHp, alive: true,
          walkTime:0, isMoving:false, shootCd:0,
        });
      }

      // AI로 각 팀 4명 채우기
      setupAiPlayersOnline();
      setupCrates();
      enemies.length = 0;
      state = "play";

      // 클라이언트들에게 시작 알림
      const startData = {
        type:"tbstart",
        hostCharIdx: playerChar.id, hostTeam: playerTeam,
        netPlayers: tbNetPlayers.map(p=>({ id:p.id, charIdx:p.charIdx, team:p.team, x:p.x, y:p.y })),
        facilities: facilities.map(f=>({ team:f.team, x:f.x, y:f.y, w:f.w, h:f.h, hp:f.hp, maxHp:f.maxHp })),
      };
      mp.conns.forEach(c => { try { c.conn.send(startData); } catch(e) {} });
    }

    function setupAiPlayersOnline() {
      aiPlayers.length = 0;
      // 팀별 인간 수 계산
      const hCount = [0, 0];
      hCount[playerTeam]++;
      for (const np of tbNetPlayers) hCount[np.team]++;
      const offsets = [{dx:0,dy:-160},{dx:-90,dy:0},{dx:0,dy:160},{dx:90,dy:0}];
      for (let t = 0; t < 2; t++) {
        const needed = Math.max(0, 4 - hCount[t]);
        const startX = t===0 ? 320 : world.w-320;
        let count = 0;
        for (let ci = 0; ci < CHAR_DEFS.length && count < needed; ci++) {
          const ch = CHAR_DEFS[ci];
          const o = offsets[count];
          aiPlayers.push({ team:t, charIdx:ci, x:startX+o.dx, y:world.h/2+o.dy,
            hp:ch.tbHp, maxHp:ch.tbHp, angle:t===0?0:Math.PI, speed:170*ch.speedMult,
            shootCd:Math.random()*1.2, walkTime:0, isMoving:false,
            alive:true, col:ch.col, build:ch.build, name:ch.name });
          count++;
        }
      }
    }

    function sendTBState() {
      if (!mp.conns.length) return;
      const d = {
        type:"tbstate",
        host:{ x:player.x, y:player.y, angle:player.angle, hp:player.hp, isMoving:player.isMoving },
        netPlayers: tbNetPlayers.map(p=>({ id:p.id, x:p.x, y:p.y, angle:p.angle, hp:p.hp, alive:p.alive, isMoving:p.isMoving })),
        aiPlayers: aiPlayers.map(a=>({ team:a.team, charIdx:a.charIdx, x:a.x, y:a.y, angle:a.angle, hp:a.hp, alive:a.alive, isMoving:a.isMoving })),
        facilities: facilities.map(f=>({ team:f.team, hp:f.hp })),
        crates: crates.map(c=>({ x:c.x, y:c.y, hp:c.hp, dead:c.dead })),
        teamBattleWon, pickups: pickups.map(p=>({ x:p.x, y:p.y, r:p.r, type:p.type, life:p.life })),
      };
      mp.conns.forEach(c => { try { c.conn.send(d); } catch(e) {} });
    }

    function sendTBInput() {
      if (!mp.conn || !mp.connected) return;
      let mx=0, my=0;
      if (keys.has("KeyW")||keys.has("ArrowUp"))    my--;
      if (keys.has("KeyS")||keys.has("ArrowDown"))  my++;
      if (keys.has("KeyA")||keys.has("ArrowLeft"))  mx--;
      if (keys.has("KeyD")||keys.has("ArrowRight")) mx++;
      if (isMobile && mobileControls.stickDir) { mx=mobileControls.stickDir.x; my=mobileControls.stickDir.y; }
      const mag=Math.hypot(mx,my); if (mag>0.01){mx/=mag;my/=mag;}
      const shoot=mouse.down||(isMobile&&(mobileControls.aimAtEdge||(mobileControls.shoot&&currentWeapon===0)));
      try { mp.conn.send({ type:"tbinput", id:myNetId, mx, my, angle:player.angle, shoot, bomb:keys.has("KeyQ"), skill:keys.has("KeyE") }); } catch(e) {}
    }

    function applyTBStart(d) {
      gameMode = "teambattle"; tbOnlineMode = true;
      playerChar = CHAR_DEFS[d.myCharIdx !== undefined ? d.myCharIdx : tbLobbyMyChar];
      playerTeam = d.myTeam !== undefined ? d.myTeam : tbLobbyMyTeam;
      if (playerTeam < 0) playerTeam = 0;
      const myEntry = d.netPlayers.find(p => p.id === myNetId);
      ensureAudio();
      resetWorld(); buildTeamBattleMap();
      facilities.length = 0;
      if (d.facilities) d.facilities.forEach(f => facilities.push({...f}));
      else {
        facilities.push({ x:50, y:600, w:200, h:400, hp:3000, maxHp:3000, team:0 });
        facilities.push({ x:world.w-250, y:600, w:200, h:400, hp:3000, maxHp:3000, team:1 });
      }
      teamBattleWon = null; tbTimer = 0;
      player.hp = playerChar.tbHp;
      if (myEntry) { player.x = myEntry.x; player.y = myEntry.y; }
      else if (playerTeam===0) { player.x=300; player.y=world.h/2; }
      else { player.x=world.w-300; player.y=world.h/2; }
      player.angle = playerTeam===0 ? 0 : Math.PI;
      remoteNetPlayers.length = 0;
      d.netPlayers.forEach(p => {
        if (p.id === myNetId) return; // 나는 player로 처리
        const ch = CHAR_DEFS[p.charIdx||0];
        remoteNetPlayers.push({ id:p.id, charIdx:p.charIdx, team:p.team, x:p.x, y:p.y,
          angle:p.angle||0, hp:ch.tbHp, maxHp:ch.tbHp, alive:true, isMoving:false, walkTime:0 });
      });
      // 호스트도 원격 플레이어로 추가
      const hostCh = CHAR_DEFS[d.hostCharIdx||0];
      remoteNetPlayers.push({ id:0, charIdx:d.hostCharIdx||0, team:d.hostTeam||0,
        x:d.hostTeam===0?300:world.w-300, y:world.h/2, angle:d.hostTeam===0?0:Math.PI,
        hp:hostCh.tbHp, maxHp:hostCh.tbHp, alive:true, isMoving:false, walkTime:0 });
      setupCrates(); enemies.length = 0;
      state = "play";
    }

    function applyTBNetState(d) {
      if (gameMode !== "teambattle") return;
      // 원격 플레이어 상태 업데이트
      const hostRp = remoteNetPlayers.find(p => p.id === 0);
      if (hostRp && d.host) Object.assign(hostRp, d.host, { id:0 });
      if (d.netPlayers) d.netPlayers.forEach(ns => {
        if (ns.id === myNetId) {
          // 내 HP는 호스트 권위
          player.hp = ns.hp;
          if (!ns.alive && player.hp <= 0) { player.hp = 0; if (state==="play") state="dead"; }
          return;
        }
        const rp = remoteNetPlayers.find(p => p.id === ns.id);
        if (rp) Object.assign(rp, ns);
      });
      // AI 상태
      if (d.aiPlayers) d.aiPlayers.forEach((as, i) => {
        if (i < aiPlayers.length) Object.assign(aiPlayers[i], as);
      });
      // 시설 HP
      if (d.facilities) d.facilities.forEach(fs => {
        const fac = facilities.find(f => f.team === fs.team);
        if (fac) fac.hp = fs.hp;
      });
      // 상자
      if (d.crates) d.crates.forEach((cs, i) => {
        if (i < crates.length) { crates[i].hp = cs.hp; crates[i].dead = cs.dead; }
      });
      if (d.teamBattleWon !== undefined) teamBattleWon = d.teamBattleWon;
    }

    function updateTBNetPlayers(dt) {
      // HOST: 각 클라이언트 입력을 적용하여 netPlayer 이동/사격 처리
      for (const np of tbNetPlayers) {
        if (!np.alive) continue;
        const inp = mp.inputMap[np.id] || { mx:0, my:0, angle:0, shoot:false };
        np.angle = inp.angle;
        const spd = 200 * (CHAR_DEFS[np.charIdx]?.speedMult || 1);
        if (Math.abs(inp.mx)+Math.abs(inp.my) > 0.05) {
          const mag = Math.hypot(inp.mx, inp.my)||1;
          np.x += inp.mx/mag * spd * dt; np.y += inp.my/mag * spd * dt;
          np.x = Math.max(60,Math.min(world.w-60,np.x));
          np.y = Math.max(60,Math.min(world.h-60,np.y));
          np.walkTime += dt; np.isMoving = true;
        } else { np.isMoving = false; }
        // 총격 처리
        np.shootCd = (np.shootCd||0) - dt;
        if (inp.shoot && np.shootCd <= 0) {
          np.shootCd = 0.12;
          const ch = CHAR_DEFS[np.charIdx];
          const dmg = 44;
          const dx = Math.cos(np.angle), dy = Math.sin(np.angle);
          const hit = raycastShot(np.x, np.y, dx, dy, 980);
          if (hit.enemy) { hit.enemy.hp -= dmg; if (hit.enemy.hp<=0){hit.enemy.hp=0;hit.enemy.alive=false;} }
          else applyTBHit(hit, dmg);
          // 플레이어(호스트) 피격
          const pdist = distToSegment(player.x,player.y, np.x,np.y, np.x+dx*980,np.y+dy*980);
          if (pdist < 22 && np.team !== playerTeam && player.invuln<=0) {
            player.hp -= dmg; if (player.hp<=0){player.hp=0; state="dead";}
          }
        }
      }
    }

    function drawRemoteNetPlayer(rp) {
      if (!rp.alive) return;
      const ch = CHAR_DEFS[rp.charIdx || 0];
      const isAlly = (rp.team === playerTeam);
      const pc = ch.col;
      ctx.save();
      ctx.translate(rp.x, rp.y); ctx.rotate(rp.angle);
      const g = ctx.createRadialGradient(0,0,0,0,0,30);
      g.addColorStop(0, isAlly?"rgba(60,140,255,0.2)":"rgba(255,60,60,0.2)");
      g.addColorStop(1,"rgba(0,0,0,0)");
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,30,0,Math.PI*2); ctx.fill();
      drawMarineSoldier(24, rp.walkTime||0, rp.isMoving||false, { dark:pc.body, mid:pc.light, light:pc.light, red:pc.visor }, false, false, 0);
      // 팀 링 + 인간 플레이어 표시 (별표)
      ctx.strokeStyle = isAlly?"rgba(80,200,255,0.85)":"rgba(255,80,80,0.85)";
      ctx.lineWidth = 2.5; ctx.beginPath(); ctx.arc(0,0,27,0,Math.PI*2); ctx.stroke();
      ctx.restore();
      const hpF = Math.max(0, rp.hp / rp.maxHp), bw = 44, ly = rp.y-34;
      ctx.save();
      ctx.fillStyle="rgba(0,0,0,0.75)"; ctx.fillRect(rp.x-bw/2,ly,bw,5);
      ctx.fillStyle=isAlly?"#44ffcc":"#ff4444"; ctx.fillRect(rp.x-bw/2,ly,bw*hpF,5);
      ctx.strokeStyle=isAlly?"#88ffee":"#ff9999"; ctx.lineWidth=0.8; ctx.strokeRect(rp.x-bw/2,ly,bw,5);
      ctx.fillStyle=isAlly?"#aaeeff":"#ffcccc"; ctx.font="bold 8px monospace"; ctx.textAlign="center";
      ctx.fillText("★" + ch.name, rp.x, ly-3);
      ctx.restore();
    }

    function distToSegment(px,py,ax,ay,bx,by){
      const dx=bx-ax,dy=by-ay,l2=dx*dx+dy*dy;
      if(l2===0) return Math.hypot(px-ax,py-ay);
      const t=Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/l2));
      return Math.hypot(px-(ax+t*dx),py-(ay+t*dy));
    }

    function inRect(x, y, rect) {

    function handleLobbyClick(x, y) {
      if (!mp.role) {
        const rects = lobbyButtonRects();
        if (inRect(x, y, rects.host)) { initHost(); return true; }
        if (inRect(x, y, rects.join)) { mp.role = "client"; mp.status = ""; return true; }
        if (inRect(x, y, rects.back)) { state = "menu"; resetMp(); return true; }
      } else if (mp.role === "host") {
        const rects = lobbyButtonRects();
        if (inRect(x, y, rects.back)) { state = "menu"; resetMp(); return true; }
      } else if (mp.role === "client" && !mp.connected) {
        const padStartY = height * 0.61;
        const btnSize = Math.min(58, width * 0.1);
        const padGap = Math.min(16, width * 0.024);
        const padW = btnSize * 3 + padGap * 2;
        const padX = width / 2 - padW / 2;
        const nums = ["1","2","3","4","5","6","7","8","9","","0","⌫"];
        for (let i = 0; i < 12; i++) {
          if (!nums[i]) continue;
          const col = i % 3, row = Math.floor(i / 3);
          const bx = padX + col * (btnSize + padGap);
          const by = padStartY + row * (btnSize + padGap);
          if (x >= bx && x <= bx + btnSize && y >= by && y <= by + btnSize) {
            if (nums[i] === "⌫") {
              mp.codeInput = mp.codeInput.slice(0, -1);
            } else if (mp.codeInput.length < 4) {
              mp.codeInput += nums[i];
              if (mp.codeInput.length === 4) connectClient(mp.codeInput);
            }
            return true;
          }
        }
        const rects = lobbyButtonRects();
        if (inRect(x, y, rects.back)) { state = "menu"; resetMp(); return true; }
      }
      return false;
    }

    function resetMp() {
      if (mp.peer) { try { mp.peer.destroy(); } catch(e) {} mp.peer = null; }
      mp.role = null; mp.conn = null; mp.roomCode = null;
      mp.connected = false; mp.codeInput = ""; mp.status = "";
      player2 = null; remotePlayer = null; remotePlayerTarget = null;
      p2Input = { mx: 0, my: 0, angle: 0, shoot: false };
    }

    function initHost() {
      mp.role = "host";
      mp.roomCode = String(Math.floor(1000 + Math.random() * 9000));
      mp.status = "대기 중...";
      try {
        mp.peer = new Peer("sangsub-" + mp.roomCode, { debug: 0 });
        mp.peer.on("open", () => { mp.status = "대기 중..."; });
        mp.peer.on("error", (err) => { mp.status = "오류: " + (err.type || err); });
        mp.peer.on("connection", (conn) => {
          mp.conn = conn;
          conn.on("open", () => {
            player2 = { x: 700, y: 450, r: 24, collisionR: 15, hp: 100, stamina: 100, angle: 0, moveX: 0, moveY: 0, isMoving: false, invuln: 0, dodge: 0, shootCooldown: 0 };
            mp.connected = true;
            mp.stateTimer = 0;
            startGame();
          });
          conn.on("data", (data) => { if (data && data.type === "input") p2Input = data; });
          conn.on("close", () => { mp.connected = false; mp.status = "연결 끊김"; });
        });
      } catch(e) { mp.status = "PeerJS 오류 - 인터넷 확인"; }
    }

    function connectClient(code) {
      mp.status = "연결 중...";
      try {
        mp.peer = new Peer({ debug: 0 });
        mp.peer.on("open", () => {
          const conn = mp.peer.connect("sangsub-" + code, { reliable: true, serialization: "json" });
          mp.conn = conn;
          conn.on("open", () => {
            mp.connected = true;
            mp.status = "연결됨! 호스트 대기 중...";
          });
          conn.on("data", (data) => { if (data && data.type === "state") applyRemoteState(data); });
          conn.on("close", () => { mp.connected = false; });
          conn.on("error", (err) => { mp.status = "연결 오류: " + (err.type || err); });
        });
        mp.peer.on("error", (err) => { mp.status = "오류: " + (err.type || err); });
      } catch(e) { mp.status = "PeerJS 오류 - 인터넷 확인"; }
    }

    function sendStateToClient() {
      if (!mp.conn || !mp.connected) return;
      try {
        mp.conn.send({
          type: "state",
          p1: { x: player.x, y: player.y, angle: player.angle, hp: player.hp, isMoving: player.isMoving },
          p2: player2 ? { x: player2.x, y: player2.y, angle: player2.angle, hp: player2.hp, isMoving: player2.isMoving } : null,
          kills, wave, skillEnergy,
          enemies: enemies.map(e => ({ x: e.x, y: e.y, r: e.r, kind: e.kind, hp: e.hp, maxHp: e.maxHp, fast: !!e.fast })),
          bullets: bullets.map(b => ({ x: b.x, y: b.y, r: b.r || 5 })),
          tracers: tracers.map(t => ({ x1: t.x1, y1: t.y1, x2: t.x2, y2: t.y2, life: t.life, maxLife: t.maxLife })),
        });
      } catch(e) {}
    }

    function sendInputToHost() {
      if (!mp.conn || !mp.connected) return;
      let mx = 0, my = 0;
      if (keys.has("KeyW") || keys.has("ArrowUp")) my--;
      if (keys.has("KeyS") || keys.has("ArrowDown")) my++;
      if (keys.has("KeyA") || keys.has("ArrowLeft")) mx--;
      if (keys.has("KeyD") || keys.has("ArrowRight")) mx++;
      if (isMobile) { mx += mobileControls.moveX; my += mobileControls.moveY; }
      const mag = Math.hypot(mx, my);
      if (mag > 0.01) { mx /= mag; my /= mag; } else { mx = 0; my = 0; }
      // 전송할 각도는 update()에서 이미 설정된 player.angle 사용
      const shoot = mouse.down || (isMobile && (mobileControls.aimAtEdge || (mobileControls.shoot && currentWeapon === 0)));
      try { mp.conn.send({ type: "input", mx, my, angle: player.angle, shoot }); } catch(e) {}
    }

    function applyRemoteState(data) {
      if (!data) return;
      // 첫 수신 시 클라이언트 월드 초기화
      if (state === "lobby" || state === "menu" || state === "intro") {
        walls.length = 0; doors.length = 0; props.length = 0; fixtures.length = 0;
        buildFacilityMap();
        if (data.p2) { player.x = data.p2.x; player.y = data.p2.y; }
        else { player.x = 700; player.y = 450; }
        player.hp = 100; player.stamina = 100; player.invuln = 0; player.dodge = 0;
        camera.zoom = cameraMode === 2 ? 0.81 : 0.9;
        camera.x = Math.max(0, player.x - width / camera.zoom / 2);
        camera.y = Math.max(0, player.y - height / camera.zoom / 2);
        if (isMobile) initMobileAimCursor();
        state = "play";
      }
      // 원격 플레이어(1P) 목표 위치 업데이트 (보간은 update()에서)
      if (data.p1) remotePlayerTarget = data.p1;
      // 내 위치(2P) 서버 보정: 큰 차이면 스냅, 작은 차이는 부드럽게
      if (data.p2) {
        const ddx = data.p2.x - player.x;
        const ddy = data.p2.y - player.y;
        const ddist = Math.hypot(ddx, ddy);
        if (ddist > 100) {
          player.x = data.p2.x;
          player.y = data.p2.y;
        } else if (ddist > 8) {
          player.x += ddx * 0.22;
          player.y += ddy * 0.22;
        }
        player.hp = data.p2.hp;
      }
      kills = data.kills || 0;
      wave = data.wave || 1;
      skillEnergy = data.skillEnergy || 0;
      if (data.enemies) {
        // 기존 적 위치 업데이트 (wobble 보존, 깜빡임 방지)
        const newEnemies = data.enemies;
        for (let i = 0; i < newEnemies.length; i++) {
          const ne = newEnemies[i];
          if (i < enemies.length) {
            const oe = enemies[i];
            oe.x = ne.x; oe.y = ne.y; oe.r = ne.r;
            oe.kind = ne.kind; oe.hp = ne.hp; oe.maxHp = ne.maxHp; oe.fast = ne.fast;
          } else {
            enemies.push({ x: ne.x, y: ne.y, r: ne.r, kind: ne.kind, hp: ne.hp, maxHp: ne.maxHp, fast: ne.fast, wobble: Math.random() * Math.PI * 2, bite: 0, shoot: 0, alert: 5, speed: 80 });
          }
        }
        if (enemies.length > newEnemies.length) enemies.splice(newEnemies.length);
      }
      if (data.bullets) {
        bullets.length = 0;
        for (const b of data.bullets) bullets.push({ x: b.x, y: b.y, r: b.r || 5, vx: 0, vy: 0, life: 1 });
      }
      if (data.tracers) {
        tracers.length = 0;
        for (const t of data.tracers) tracers.push({ x1: t.x1, y1: t.y1, x2: t.x2, y2: t.y2, life: t.life, maxLife: t.maxLife });
      }
    }

        } else {
          ctx.fillStyle = "#88aaff";
          ctx.font = "bold " + Math.round(Math.min(18, width * 0.03)) + "px Arial";
          ctx.fillText("방 코드 입력 (4자리)", width / 2, height * 0.33);
          const cDigits = ["_","_","_","_"];
          for (let i = 0; i < mp.codeInput.length && i < 4; i++) cDigits[i] = mp.codeInput[i];
          const display = cDigits.join("  ");
          ctx.fillStyle = "white";
          ctx.font = "bold " + Math.round(Math.min(60, width * 0.1)) + "px monospace";
          ctx.fillText(display, width / 2, height * 0.5);
          const padStartY = height * 0.6;
          const btnSize = Math.min(58, width * 0.1);
          const padGap = Math.min(16, width * 0.024);
          const padW = btnSize * 3 + padGap * 2;
          const padX = width / 2 - padW / 2;
          const nums = ["1","2","3","4","5","6","7","8","9","","0","⌫"];
          for (let i = 0; i < 12; i++) {
            if (!nums[i]) continue;
            const col = i % 3, row = Math.floor(i / 3);
            const bx = padX + col * (btnSize + padGap);
            const by = padStartY + row * (btnSize + padGap);
            drawLobbyBtn({ x: bx, y: by, w: btnSize, h: btnSize }, nums[i], "#1a2248", "#88aaff");
          }
          if (mp.status) {
            ctx.fillStyle = mp.status.includes("오류") || mp.status.includes("error") ? "#ff7755" : "#ffcc44";
            ctx.font = Math.round(Math.min(13, width * 0.022)) + "px Arial";
            ctx.fillText(mp.status, width / 2, height * 0.93);
          }
          const rects = lobbyButtonRects();
          drawLobbyBtn(rects.back, "← 메뉴로", "#252525", "#999999");
        }
      }
    }

    function drawLobbyBtn(rect, label, bgColor, fgColor) {
      const now = performance.now() * 0.001;
      ctx.save();
      const { x, y, w, h } = rect;
      const chamfer = Math.min(8, h * 0.2);
      // 버튼 배경 (각진 sci-fi 스타일)
      ctx.fillStyle = bgColor;
      ctx.beginPath();
      ctx.moveTo(x + chamfer, y); ctx.lineTo(x + w - chamfer, y);
      ctx.lineTo(x + w, y + chamfer); ctx.lineTo(x + w, y + h - chamfer);
      ctx.lineTo(x + w - chamfer, y + h); ctx.lineTo(x + chamfer, y + h);
      ctx.lineTo(x, y + h - chamfer); ctx.lineTo(x, y + chamfer);
      ctx.closePath(); ctx.fill();
      // 테두리
      ctx.strokeStyle = fgColor; ctx.lineWidth = 1.5; ctx.stroke();
      // 상단 하이라이트
      ctx.strokeStyle = "rgba(255,255,255,0.15)"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x + chamfer, y); ctx.lineTo(x + w - chamfer, y); ctx.stroke();
      // 텍스트
      ctx.fillStyle = fgColor;
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.font = "bold " + Math.round(Math.min(15, h * 0.38)) + "px monospace";
      ctx.fillText(label, x + w / 2, y + h / 2);
      ctx.restore();
    }

    function drawRemotePlayer(rp, isP2) {
      if (!rp) return;
      ctx.save();
      ctx.translate(rp.x, rp.y);
      // 라벨 + HP바 (화면 기준, 회전 없음)
      ctx.fillStyle = isP2 ? "#88ccff" : "#cc88ff";
      ctx.font = "bold 11px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "bottom";
      ctx.fillText(isP2 ? "2P" : "1P", 0, -30);
      if (rp.hp < 100) {
        const barW = 36, barH = 4;
        ctx.fillStyle = "rgba(0,0,0,0.6)";
        ctx.fillRect(-barW / 2, 32, barW, barH);
        ctx.fillStyle = rp.hp > 50 ? "#44cc66" : rp.hp > 25 ? "#ffaa22" : "#cc3333";
        ctx.fillRect(-barW / 2, 32, barW * rp.hp / 100, barH);
      }
      // 마린 모델 (팀 색상)
      ctx.rotate(rp.angle);
      ctx.globalAlpha = 0.92;
      const rpColors = isP2
        ? { dark: "#0c1c48", mid: "#183878", light: "#2858a8", visor: "rgba(60,180,255,0.94)", red: "#0060cc" }
        : { dark: "#22083a", mid: "#3a1268", light: "#5c22a0", visor: "rgba(200,80,255,0.94)", red: "#8820cc" };
      drawMarineSoldier(24, rp.walkTime || 0, rp.isMoving, rpColors);
      ctx.restore();
    }

    // ==================== END MULTIPLAYER ====================

    window.__ringedSelfTest = runSelfTests;

    function loop(now) {
      const dt = Math.min(0.033, (now - last) / 1000);
      last = now;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    resize();
    loadAssets().then(() => {
      if (new URLSearchParams(location.search).get("play") === "1") startGame();
      last = performance.now();
      requestAnimationFrame(loop);
    });
  </script>
</body>
</html>
