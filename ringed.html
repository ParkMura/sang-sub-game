              ctx.fillRect(tx + s, ty + tile - 5, 5, 5);
            }
            ctx.restore();
          } else if (seed % 29 === 0) {
            // Battle damage crack
            ctx.strokeStyle = "rgba(180,100,20,0.18)";
            ctx.lineWidth = 0.7;
            ctx.beginPath();
            ctx.moveTo(tx + 15, ty + 25); ctx.lineTo(tx + 38, ty + 14); ctx.lineTo(tx + 55, ty + 48); ctx.lineTo(tx + 70, ty + 40);
            ctx.stroke();
          }
        }
      }

      // Stone slab mortar lines (tight grid)
      ctx.strokeStyle = "rgba(80,60,20,0.18)";
      ctx.lineWidth = 0.8;
      for (let y = 0; y < world.h; y += tile) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(world.w, y); ctx.stroke();
      }
      for (let x = 0; x < world.w; x += tile) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, world.h); ctx.stroke();
      }

      // Heavy structural seams every 4 tiles (fortress buttress lines)
      ctx.strokeStyle = "rgba(160,110,30,0.22)";
      ctx.lineWidth = 2;
      for (let y = 0; y < world.h; y += tile * 4) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(world.w, y); ctx.stroke();
      }
      for (let x = 0; x < world.w; x += tile * 4) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, world.h); ctx.stroke();
      }

      // Blood/oil stain scatter
      ctx.fillStyle = "rgba(80,20,10,0.06)";
      for (let i = 0; i < 120; i++) {
        const x = (i * 1847) % world.w, y = (i * 1231) % world.h;
        ctx.beginPath();
        ctx.ellipse(x, y, 2 + (i % 5), 1 + (i % 3), (i % 6) * 0.5, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawFacility() {
      for (const wall of walls) drawWall(wall);
      for (const door of doors) drawDoor(door);
    }

    function drawWall(wall) {
      const isH = wall.w > wall.h * 1.5;  // 가로 벽
      const isV = wall.h > wall.w * 1.5;  // 세로 벽
      const dmg = wallCornerDmg.has(wall) ? wallCornerDmg.get(wall) : null;
      const cs = Math.min(wall.w, wall.h) * 0.3;

      ctx.save();
      if (dmg) {
        const [tl, tr, bl, br] = dmg;
        const tlc = tl >= 1 ? cs : 0, trc = tr >= 1 ? cs : 0;
        const blc = bl >= 1 ? cs : 0, brc = br >= 1 ? cs : 0;
        ctx.beginPath();
        ctx.moveTo(wall.x + tlc, wall.y);
        ctx.lineTo(wall.x + wall.w - trc, wall.y);
        if (trc) ctx.lineTo(wall.x + wall.w, wall.y + trc);
        ctx.lineTo(wall.x + wall.w, wall.y + wall.h - brc);
        if (brc) ctx.lineTo(wall.x + wall.w - brc, wall.y + wall.h);
        ctx.lineTo(wall.x + blc, wall.y + wall.h);
        if (blc) ctx.lineTo(wall.x, wall.y + wall.h - blc);
        ctx.lineTo(wall.x, wall.y + tlc);
        if (tlc) ctx.lineTo(wall.x + tlc, wall.y);
        ctx.closePath();
        ctx.clip();
      }

      // Space Marine 2 ceramite fortress wall
      const wallGrad = ctx.createLinearGradient(wall.x, wall.y, wall.x + (isH ? 0 : wall.w), wall.y + (isH ? wall.h : 0));
      wallGrad.addColorStop(0, "#201a10");
      wallGrad.addColorStop(0.35, "#161108");
      wallGrad.addColorStop(1, "#0c0905");
      ctx.fillStyle = wallGrad;
      ctx.fillRect(wall.x, wall.y, wall.w, wall.h);

      // Ceramite armor panel seams
      ctx.strokeStyle = "rgba(100,75,25,0.45)";
      ctx.lineWidth = 1;
      const panelSize = 68;
      if (isH) {
        for (let x = wall.x + panelSize; x < wall.x + wall.w - 4; x += panelSize) {
          ctx.beginPath(); ctx.moveTo(x, wall.y + 3); ctx.lineTo(x, wall.y + wall.h - 3); ctx.stroke();
        }
      } else if (isV) {
        for (let y = wall.y + panelSize; y < wall.y + wall.h - 4; y += panelSize) {
          ctx.beginPath(); ctx.moveTo(wall.x + 3, y); ctx.lineTo(wall.x + wall.w - 3, y); ctx.stroke();
        }
      }

      // Rivet detail along edges
      const rivetColor = "rgba(160,120,40,0.5)";
      if (isH && wall.w > 60) {
        ctx.fillStyle = rivetColor;
        for (let x = wall.x + 10; x < wall.x + wall.w - 6; x += 20) {
          ctx.fillRect(x, wall.y + 2, 2, 2);
          ctx.fillRect(x, wall.y + wall.h - 4, 2, 2);
        }
      }
      if (isV && wall.h > 60) {
        ctx.fillStyle = rivetColor;
        for (let y = wall.y + 10; y < wall.y + wall.h - 6; y += 20) {
          ctx.fillRect(wall.x + 2, y, 2, 2);
          ctx.fillRect(wall.x + wall.w - 4, y, 2, 2);
        }
      }

      // Hazard warning band (black-yellow, worn)
      ctx.save();
      ctx.globalAlpha = 0.22;
      if (isH) {
        ctx.fillStyle = "#b06010";
        ctx.fillRect(wall.x + 3, wall.y + wall.h - 4, wall.w - 6, 3);
        ctx.fillStyle = "#000";
        for (let x = wall.x + 3; x < wall.x + wall.w - 3; x += 8)
          ctx.fillRect(x, wall.y + wall.h - 4, 4, 3);
      } else if (isV) {
        ctx.fillStyle = "#b06010";
        ctx.fillRect(wall.x + wall.w - 4, wall.y + 3, 3, wall.h - 6);
        ctx.fillStyle = "#000";
        for (let y = wall.y + 3; y < wall.y + wall.h - 3; y += 8)
          ctx.fillRect(wall.x + wall.w - 4, y, 3, 4);
      }
      ctx.restore();

      // Top highlight edge (fortress parapet glow)
      ctx.strokeStyle = "rgba(200,150,40,0.55)";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(wall.x, wall.y);
      ctx.lineTo(wall.x + wall.w, wall.y);
      ctx.stroke();

      // Side edges
      ctx.strokeStyle = "rgba(140,100,30,0.28)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(wall.x, wall.y);
      ctx.lineTo(wall.x, wall.y + wall.h);
      ctx.moveTo(wall.x + wall.w, wall.y);
      ctx.lineTo(wall.x + wall.w, wall.y + wall.h);
      ctx.stroke();

      // Bottom shadow
      ctx.strokeStyle = "rgba(0,0,0,0.5)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(wall.x, wall.y + wall.h);
      ctx.lineTo(wall.x + wall.w, wall.y + wall.h);
      ctx.stroke();

      ctx.restore();
    }

    function drawDoor(door) {
      if (door.open > 0.92) return;
      const cx = door.x + door.w / 2;
      const cy = door.y + door.h / 2;
      const isOpen = door.open > 0.05;
      ctx.save();

      // Fortress gate heavy frame
      const frameColor = door.target ? "rgba(200,160,40,0.85)" : (isOpen ? "rgba(160,200,80,0.7)" : "rgba(140,100,30,0.7)");
      ctx.strokeStyle = frameColor;
      ctx.lineWidth = 3;
      ctx.strokeRect(door.x, door.y, door.w, door.h);

      // Heavy corner bolts
      const bc = 7;
      ctx.strokeStyle = door.target ? "#e0c040" : "#a07828";
      ctx.lineWidth = 2;
      const corners = [[door.x, door.y], [door.x + door.w, door.y], [door.x, door.y + door.h], [door.x + door.w, door.y + door.h]];
      const signs = [[ 1, 1],[-1, 1],[ 1,-1],[-1,-1]];
      for (let i = 0; i < 4; i++) {
        const [bx, by] = corners[i]; const [sx, sy] = signs[i];
        ctx.beginPath();
        ctx.moveTo(bx + sx * bc, by); ctx.lineTo(bx, by); ctx.lineTo(bx, by + sy * bc);
        ctx.stroke();
        ctx.fillStyle = door.target ? "rgba(220,180,50,0.8)" : "rgba(160,120,40,0.8)";
        ctx.fillRect(bx - 2, by - 2, 4, 4);
      }

      // Gate panels
      drawSplitDoorPanels(door);

      // Opening energy pulse
      if (isOpen && door.open < 0.92) {
        const openGlow = ctx.createRadialGradient(cx, cy, 0, cx, cy, 28 + door.open * 18);
        openGlow.addColorStop(0, "rgba(200,150,40,0.18)");
        openGlow.addColorStop(1, "rgba(200,150,40,0)");
        ctx.fillStyle = openGlow;
        ctx.beginPath(); ctx.arc(cx, cy, 28 + door.open * 18, 0, Math.PI * 2); ctx.fill();
      }

      // Status indicator (red=locked, green=open)
      const ledColor = isOpen ? "rgba(80,255,100,0.9)" : (door.target ? "rgba(220,180,40,0.9)" : "rgba(220,40,30,0.9)");
      ctx.fillStyle = ledColor;
      const ledSize = 4;
      ctx.fillRect(cx - ledSize / 2, door.axis === "h" ? door.y - 3 : cy - ledSize / 2,
        door.axis === "h" ? ledSize : 3, door.axis === "h" ? 3 : ledSize);

      // Gate label
      if (!isOpen) {
        ctx.save();
        ctx.globalAlpha = 0.5;
        ctx.fillStyle = door.target ? "#e0c040" : "#806030";
        ctx.font = "bold 7px monospace";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("GATE", cx, cy);
        ctx.restore();
      }
      ctx.restore();
    }

    function drawSplitDoorPanels(door) {
      if (door.open > 0.92) return;
      const baseColor = door.target ? "#2a2010" : "#1a1208";
      ctx.fillStyle = baseColor;
      ctx.strokeStyle = door.target ? "rgba(200,160,40,0.55)" : "rgba(140,100,30,0.5)";
      ctx.lineWidth = 1.5;
      const rects = doorCollisionRects(door);
      for (const rect of rects) {
        if (rect.w <= 0.5 || rect.h <= 0.5) continue;
        ctx.fillRect(rect.x, rect.y, rect.w, rect.h);
        ctx.strokeRect(rect.x, rect.y, rect.w, rect.h);
        // Iron banding
        ctx.fillStyle = "rgba(180,130,30,0.25)";
        if (door.axis === "h") {
          ctx.fillRect(rect.x, rect.y, rect.w, 3);
          ctx.fillRect(rect.x, rect.y + rect.h - 3, rect.w, 3);
        } else {
          ctx.fillRect(rect.x, rect.y, 3, rect.h);
          ctx.fillRect(rect.x + rect.w - 3, rect.y, 3, rect.h);
        }
        ctx.fillStyle = baseColor;
      }
    }

    function drawProps() {
      for (const p of props) {
        const img = assets[p.type];
        const s = 48 * p.s;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.a);
        if (img) {
          ctx.drawImage(img, -s / 2, -s / 2, s, s * img.height / img.width);
        } else if (p.type === "crate") {
          drawCrateFallback(s);
        }
        ctx.restore();
      }
    }

    function drawBlockingPropOverlays() {
      for (const p of props) {
        if (!propBlocksMovement(p)) continue;
        const img = assets[p.type];
        const s = 48 * p.s;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.a);
        ctx.globalAlpha = 0.88;
        if (img) ctx.drawImage(img, -s / 2, -s / 2, s, s * img.height / img.width);
        else drawCrateFallback(s);
        ctx.globalAlpha = 1;
        ctx.strokeStyle = "rgba(235, 238, 230, 0.72)";
        ctx.lineWidth = 1.6;
        ctx.strokeRect(-s / 2 + 3, -s / 2 + 3, s - 6, s - 6);
        ctx.restore();
      }
    }

    function drawCrateFallback(s) {
      // Space Marine 2 supply crate (dark iron with gold trim)
      ctx.fillStyle = "#2a1e10";
      ctx.fillRect(-s / 2, -s / 2, s, s);
      // Corner reinforcements
      ctx.fillStyle = "#8a6520";
      const c = s * 0.12;
      ctx.fillRect(-s / 2, -s / 2, c, c);
      ctx.fillRect(s / 2 - c, -s / 2, c, c);
      ctx.fillRect(-s / 2, s / 2 - c, c, c);
      ctx.fillRect(s / 2 - c, s / 2 - c, c, c);
      // Iron banding
      ctx.strokeStyle = "#6a4c18";
      ctx.lineWidth = 2;
      ctx.strokeRect(-s / 2, -s / 2, s, s);
      ctx.strokeRect(-s / 2 + 3, -s / 2 + 3, s - 6, s - 6);
      // Imperial markings
      ctx.fillStyle = "rgba(180,130,40,0.35)";
      ctx.font = Math.round(s * 0.28) + "px serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("⚡", 0, 0);
    }

    function drawFixtureBodies() {
      for (const f of fixtures) {
        const boost = fixtureBoost;
        ctx.save();
        ctx.translate(f.x, f.y);
        ctx.rotate(f.angle);
        ctx.fillStyle = "rgba(8, 9, 10, 0.82)";
        ctx.fillRect(-f.w / 2 - 5, -f.h / 2 - 4, f.w + 10, f.h + 8);
        ctx.fillStyle = "rgba(255, 248, 235, " + (0.86 + boost * 0.14) + ")";
        ctx.shadowColor = "rgba(255, 230, 210, " + (0.75 + boost * 0.25) + ")";
        ctx.shadowBlur = 10 + boost * 34;
        ctx.fillRect(-f.w / 2, -f.h / 2, f.w, f.h);
        ctx.shadowBlur = 0;
        ctx.strokeStyle = "rgba(255,255,255," + (0.5 + boost * 0.42) + ")";
        ctx.lineWidth = 1.5;
        ctx.strokeRect(-f.w / 2 + 1, -f.h / 2 + 1, f.w - 2, f.h - 2);
        ctx.restore();
      }
    }

    function drawCorpses() {
      for (const c of corpses) {
        ctx.save();
        ctx.translate(c.x, c.y);
        ctx.rotate(c.angle);
        ctx.globalAlpha = 0.5;
        const stain = ctx.createRadialGradient(0, 8, 4, 0, 8, 42 * c.stain);
        stain.addColorStop(0, "rgba(70, 12, 13, 0.34)");
        stain.addColorStop(0.52, "rgba(48, 8, 8, 0.16)");
        stain.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = stain;
        ctx.beginPath();
        ctx.ellipse(0, 10, 34 * c.stain, 20 * c.stain, 0.18 * c.pose, 0, Math.PI * 2);
        ctx.fill();

        ctx.globalAlpha = 0.82;
        ctx.fillStyle = "rgba(4, 5, 6, 0.96)";
        ctx.strokeStyle = "rgba(255, 255, 255, 0.1)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.ellipse(0, 0, c.r * 0.82, c.r * 1.25, 0.12 * c.pose, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        drawLimb(-c.r * 0.55, -c.r * 0.1, -c.r * 1.28, c.r * 0.18, 7);
        drawLimb(c.r * 0.56, -c.r * 0.05, c.r * 1.18, c.r * 0.25, 7);
        drawLimb(-c.r * 0.32, c.r * 0.8, -c.r * 0.85, c.r * 1.62, 8);
        drawLimb(c.r * 0.34, c.r * 0.82, c.r * 1.02, c.r * 1.52, 8);
        ctx.beginPath();
        ctx.arc(0, -c.r * 1.08, c.r * 0.48, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      }
    }

    function drawDeathTexts() {
      for (const text of deathTexts) {
        const t = 1 - Math.max(0, text.life / text.maxLife);
        const pop = t < 0.24 ? t / 0.24 : 1;
        const fade = t > 0.62 ? 1 - (t - 0.62) / 0.38 : 1;
        const scaleText = (0.45 + Math.sin(pop * Math.PI * 0.5) * 0.92) * Math.max(0, fade);
        ctx.save();
        ctx.translate(text.x, text.y - t * 22);
        ctx.rotate(text.angle);
        ctx.scale(scaleText, scaleText);
        ctx.globalAlpha = Math.max(0, fade);
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = "900 30px Arial Black, Arial";
        ctx.lineJoin = "round";
        ctx.lineWidth = 8;
        ctx.strokeStyle = "rgba(255,255,255,0.9)";
        ctx.strokeText("DIE", 0, 0);
        ctx.lineWidth = 3;
        ctx.strokeStyle = "rgba(0,0,0,0.95)";
        ctx.strokeText("DIE", 0, 0);
        ctx.fillStyle = "rgba(8,8,10,0.98)";
        ctx.fillText("DIE", 0, 0);
        ctx.restore();
      }
    }

    function drawSpeechBubbles() {
      for (const bubble of speechBubbles) {
        if (bubble.delay > 0) continue;
        const alpha = Math.max(0, Math.min(1, bubble.life / bubble.maxLife));
        const pop = Math.min(1, (bubble.maxLife - bubble.life) / 0.16);
        ctx.save();
        if (bubble.screen) {
          ctx.setTransform(scale, 0, 0, scale, 0, 0);
          ctx.translate(width / 2, 132 - (1 - alpha) * 10);
        } else {
          const enemy = bubble.enemy;
          ctx.translate(enemy.x, enemy.y - enemy.r - 34 - (1 - alpha) * 12);
        }
        ctx.scale(0.72 + pop * 0.28, 0.72 + pop * 0.28);
        ctx.globalAlpha = alpha;
        ctx.font = bubble.screen ? "900 17px Arial" : "900 15px Arial";
        const w = Math.max(62, ctx.measureText(bubble.text).width + 22);
        const h = bubble.screen ? 34 : 28;
        ctx.fillStyle = bubble.screen ? "rgba(40, 12, 10, 0.92)" : "rgba(238, 242, 244, 0.94)";
        ctx.strokeStyle = bubble.screen ? "rgba(255, 210, 170, 0.92)" : "rgba(0, 0, 0, 0.82)";
        ctx.lineWidth = 3;
        roundRect(-w / 2, -h / 2, w, h, 7);
        ctx.fill();
        ctx.stroke();
        if (!bubble.screen) {
          ctx.beginPath();
          ctx.moveTo(-8, h / 2 - 2);
          ctx.lineTo(0, h / 2 + 10);
          ctx.lineTo(8, h / 2 - 2);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
        }
        ctx.fillStyle = bubble.screen ? "#ffe2c2" : "#111";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(bubble.text, 0, 1);
        ctx.restore();
      }
    }

    function drawPickups() {
      for (const p of pickups) {
        const pulse = 0.5 + Math.sin(p.pulse) * 0.5;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.globalCompositeOperation = "lighter";
        const glow = ctx.createRadialGradient(0, 0, 4, 0, 0, 34 + pulse * 8);
        glow.addColorStop(0, "rgba(118, 255, 145, 0.34)");
        glow.addColorStop(1, "rgba(118, 255, 145, 0)");
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(0, 0, 40, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalCompositeOperation = "source-over";
        ctx.fillStyle = "rgba(24, 45, 32, 0.96)";
        ctx.strokeStyle = "rgba(210, 255, 218, 0.86)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.roundRect ? ctx.roundRect(-11, -14, 22, 28, 5) : ctx.rect(-11, -14, 22, 28);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "rgba(120, 235, 128, 0.95)";
        ctx.fillRect(-3, -9, 6, 18);
        ctx.fillRect(-8, -3, 16, 6);
        ctx.restore();
      }
    }

    function drawLimb(x1, y1, x2, y2, widthSize) {
      ctx.save();
      ctx.lineCap = "round";
      ctx.strokeStyle = "rgba(5, 6, 7, 0.98)";
      ctx.lineWidth = widthSize;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo((x1 + x2) / 2, (y1 + y2) / 2 + 6);
      ctx.lineTo(x2, y2);
      ctx.stroke();
      ctx.strokeStyle = "rgba(255,255,255,0.08)";
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.restore();
    }

    function drawPlayer() {
      ctx.save();
      ctx.translate(player.x, player.y);
      if (recoilAmt > 0) {
        ctx.translate(-Math.cos(player.angle) * recoilAmt * 3.5, -Math.sin(player.angle) * recoilAmt * 3.5);
      }
      ctx.rotate(player.angle);
      if (player.invuln > 0) ctx.globalAlpha = 0.65 + Math.sin(performance.now() * 0.04) * 0.25;
      // 선택된 캐릭터 색상 적용
      const pc = playerChar.col;
      const charColors = { dark: pc.body, mid: pc.light, light: pc.light, red: pc.visor };
      drawMarineSoldier(24, player.walkTime, player.isMoving, charColors, skillActive, autoGatling, recoilAmt);
      ctx.restore();
    }

    function drawEnemy(e) {
      const _ep2 = (mp.role === "host" && player2) ? player2 : (mp.role === "client" && remotePlayer ? remotePlayer : null);
      if (!hasLOS(player.x, player.y, e.x, e.y) && (!_ep2 || !hasLOS(_ep2.x, _ep2.y, e.x, e.y))) return;
      ctx.save();
      ctx.translate(e.x, e.y);
      if (e.dropTime > 0) {
        const t = Math.max(0, e.dropTime / e.dropMax);
        const height = e.dropHeight * t;
        ctx.save();
        ctx.globalAlpha = 0.28;
        ctx.fillStyle = "#000";
        ctx.beginPath();
        ctx.ellipse(0, 14, e.r * (1.1 - t * 0.35), e.r * 0.42, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        drawParachute(height, t);
        ctx.translate(0, -height);
      }
      ctx.rotate(Math.atan2(player.y - e.y, player.x - e.x));
      drawStormtrooper(e.r, e.kind !== "melee", e.kind);
      if (e.raidAggressive) drawRaidUnitOverlay(e);
      ctx.beginPath();
      ctx.arc(0, 0, e.r - 1, 0, Math.PI * 2);
      ctx.strokeStyle = "rgba(220, 30, 30, 0.75)";
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.restore();
      ctx.fillStyle = "rgba(0,0,0,0.45)";
      ctx.fillRect(e.x - 18, e.y - e.r - 16, 36, 4);
      ctx.fillStyle = e.raidLeader ? "#ff4a32" : (e.raidAggressive ? "#51b8ff" : (e.kind === "melee" ? "#cf6b4e" : (e.kind === "flamer" ? "#ef8a3a" : (e.fast ? "#ddbb55" : "#9fd06d"))));
      ctx.fillRect(e.x - 18, e.y - e.r - 16, Math.max(0, 36 * e.hp / (e.maxHp || (e.fast ? 34 : 58 + wave * 4))), 4);
    }

    function drawRaidUnitOverlay(e) {
      const r = e.r;
      ctx.save();
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      if (e.raidLeader) {
        ctx.strokeStyle = "rgba(255, 72, 48, 0.92)";
        ctx.fillStyle = "rgba(52, 10, 9, 0.82)";
        ctx.lineWidth = 2.4;
        ctx.beginPath();
        ctx.moveTo(-r * 0.38, -r * 0.64);
        ctx.lineTo(r * 0.12, -r * 0.76);
        ctx.lineTo(r * 0.56, -r * 0.42);
        ctx.lineTo(r * 0.2, -r * 0.28);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.strokeStyle = "rgba(255, 188, 92, 0.95)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-r * 0.12, -r * 0.62);
        ctx.lineTo(r * 0.28, -r * 0.46);
        ctx.stroke();
      } else {
        ctx.strokeStyle = "rgba(86, 184, 255, 0.86)";
        ctx.fillStyle = "rgba(10, 22, 32, 0.72)";
        ctx.lineWidth = 1.8;
        ctx.beginPath();
        ctx.moveTo(-r * 0.28, -r * 0.56);
        ctx.lineTo(r * 0.22, -r * 0.64);
        ctx.lineTo(r * 0.5, -r * 0.28);
        ctx.lineTo(-r * 0.04, -r * 0.22);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
      }
      ctx.fillStyle = e.raidLeader ? "rgba(255, 220, 135, 0.95)" : "rgba(136, 216, 255, 0.94)";
      ctx.beginPath();
      ctx.ellipse(r * 0.48, -r * 0.05, r * 0.18, r * 0.08, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = e.raidLeader ? "rgba(255, 70, 42, 0.88)" : "rgba(70, 180, 255, 0.72)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-r * 0.44, r * 0.02);
      ctx.lineTo(-r * 0.08, r * 0.02);
      ctx.moveTo(-r * 0.42, r * 0.2);
      ctx.lineTo(-r * 0.02, r * 0.2);
      ctx.stroke();
      ctx.restore();
    }

    function drawParachute(height, t) {
      ctx.save();
      ctx.translate(0, -height - 42);
      ctx.globalAlpha = 0.94;
      ctx.fillStyle = "rgba(226, 231, 232, 0.88)";
      ctx.strokeStyle = "rgba(20, 24, 28, 0.78)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-38, 0);
      ctx.quadraticCurveTo(-26, -30 - t * 10, 0, -34 - t * 12);
      ctx.quadraticCurveTo(26, -30 - t * 10, 38, 0);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.strokeStyle = "rgba(230,235,238,0.72)";
      ctx.lineWidth = 1.2;
      for (const x of [-26, -10, 10, 26]) {
        ctx.beginPath();
        ctx.moveTo(x, -2);
        ctx.lineTo(0, height + 36);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawBullet(b) {
      ctx.save();
      ctx.translate(b.x, b.y);
      ctx.rotate(Math.atan2(b.vy, b.vx));
      drawImageStretched(assets.bullet, 0, 0, 22, 8);
      ctx.restore();
    }

    function drawTaserBullet(tb) {
      ctx.save();
      ctx.translate(tb.x, tb.y);
      const pulse = 0.7 + 0.3 * Math.sin(tb.life * 30);
      ctx.fillStyle = "rgba(100, 200, 255, " + (0.9 * pulse) + ")";
      ctx.strokeStyle = "rgba(220, 245, 255, 0.7)";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(0, 0, tb.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    function drawBomb(b) {
      const t = 1 - Math.max(0, b.life / b.maxLife);
      const arcHeight = Math.sin(t * Math.PI) * 42;
      ctx.save();
      ctx.translate(b.x, b.y - arcHeight);
      ctx.rotate(t * Math.PI * 4);
      drawBombSprite();
      ctx.restore();
      ctx.save();
      ctx.globalAlpha = 0.18;
      ctx.fillStyle = "#000";
      ctx.beginPath();
      ctx.ellipse(b.x, b.y + 8, 16 * (1 - t * 0.2), 8, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawC4OnGround(c4) {
      const now = performance.now() * 0.001;
      ctx.save();
      ctx.translate(c4.x, c4.y);
      // Shadow
      ctx.globalAlpha = 0.22; ctx.fillStyle = "#000";
      ctx.beginPath(); ctx.ellipse(0, 4, 10, 4, 0, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
      // Body
      ctx.fillStyle = "#d4d8b0"; ctx.strokeStyle = "#000"; ctx.lineWidth = 1;
      ctx.fillRect(-8, -5, 16, 10); ctx.strokeRect(-8, -5, 16, 10);
      // Red LED blink
      ctx.fillStyle = `rgba(255,40,20,${0.5 + Math.sin(now*6)*0.5})`;
      ctx.beginPath(); ctx.arc(4, -2, 2.5, 0, Math.PI*2); ctx.fill();
      // C4 label
      ctx.fillStyle = "#222"; ctx.font = "bold 6px monospace";
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText("C4", -2, 0);
      ctx.restore();
    }

    function drawMissileProjectile(m) {
      const now = performance.now() * 0.001;
      const angle = Math.atan2(m.vy, m.vx);
      ctx.save();
      ctx.translate(m.x, m.y);
      ctx.rotate(angle);
      // Trail glow
      ctx.save();
      ctx.globalAlpha = 0.3 + Math.sin(now * 20) * 0.1;
      const tg = ctx.createLinearGradient(-60, 0, 0, 0);
      tg.addColorStop(0, "rgba(0,180,255,0)"); tg.addColorStop(1, "rgba(80,200,255,0.7)");
      ctx.fillStyle = tg; ctx.fillRect(-60, -8, 60, 16);
      ctx.restore();
      // Body
      ctx.fillStyle = "#c0e8ff"; ctx.strokeStyle = "#0080cc"; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(18, 0); ctx.lineTo(-12, -7); ctx.lineTo(-12, 7); ctx.closePath();
      ctx.fill(); ctx.stroke();
      // Warhead tip
      ctx.fillStyle = "#ff4020";
      ctx.beginPath(); ctx.moveTo(18, 0); ctx.lineTo(24, 0); ctx.lineTo(18, 3); ctx.closePath(); ctx.fill();
      // Engine glow
      ctx.fillStyle = `rgba(80,200,255,${0.7+Math.sin(now*30)*0.3})`;
      ctx.beginPath(); ctx.arc(-12, 0, 5, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }

    function drawHomingMissile(hm) {
      const now = performance.now() * 0.001;
      const angle = Math.atan2(hm.vy, hm.vx);
      // 자유비행 중(바람개비)이면 밝은 주황, 유도 중이면 빨강
      const isFreeFlight = hm.orbitTime > 0;
      ctx.save();
      ctx.translate(hm.x, hm.y);
      ctx.rotate(angle);

      // ── 넓은 외부 글로우 (항상 밝게) ─────────────
      const outerGlow = ctx.createRadialGradient(0, 0, 0, 0, 0, 28);
      outerGlow.addColorStop(0, isFreeFlight ? "rgba(255,200,0,0.5)" : "rgba(255,80,0,0.5)");
      outerGlow.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = outerGlow;
      ctx.beginPath(); ctx.arc(0, 0, 28, 0, Math.PI * 2); ctx.fill();

      // ── 꼬리 불꽃 ──────────────────────────
      ctx.globalAlpha = 0.75;
      const trail = ctx.createLinearGradient(-80, 0, 0, 0);
      trail.addColorStop(0, "rgba(255,60,0,0)");
      trail.addColorStop(0.4, isFreeFlight ? "rgba(255,160,0,0.45)" : "rgba(255,60,0,0.45)");
      trail.addColorStop(1, isFreeFlight ? "rgba(255,240,80,1)" : "rgba(255,120,0,1)");
      ctx.fillStyle = trail;
      ctx.fillRect(-80, -7, 80, 14);
      ctx.globalAlpha = 1;

      // ── 핵심 발광 원 ──
      const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, 18);
      glow.addColorStop(0, isFreeFlight ? "rgba(255,240,100,0.9)" : "rgba(255,120,0,0.9)");
      glow.addColorStop(1, "rgba(255,60,0,0)");
      ctx.fillStyle = glow;
      ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI * 2); ctx.fill();

      // ── 본체: 방추형 (더 크게) ────────────────────────
      ctx.fillStyle = isFreeFlight ? "#fff8c0" : "#ffccaa";
      ctx.strokeStyle = isFreeFlight ? "#ff9900" : "#ff3300";
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      ctx.moveTo(14, 0);
      ctx.lineTo(-10, -6);
      ctx.lineTo(-10,  6);
      ctx.closePath();
      ctx.fill(); ctx.stroke();

      // ── 탄두 빛점 ────────────────────────────────
      ctx.fillStyle = "#ffffff";
      ctx.beginPath(); ctx.arc(14, 0, 5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = isFreeFlight ? "#ffee00" : "#ff6600";
      ctx.beginPath(); ctx.arc(14, 0, 3, 0, Math.PI * 2); ctx.fill();

      // ── 엔진 불꽃 (깜빡임) ───────────────────────
      const flicker = 0.7 + Math.sin(now * 60) * 0.3;
      ctx.fillStyle = `rgba(255,${100 + Math.sin(now*45)*100|0},0,${flicker})`;
      ctx.beginPath(); ctx.arc(-10, 0, 7, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = `rgba(255,220,80,${flicker * 0.8})`;
      ctx.beginPath(); ctx.arc(-7, 0, 2.5, 0, Math.PI * 2); ctx.fill();

      ctx.restore();
    }

    function drawDrone(dr) {
      const now = performance.now() * 0.001;
      if (dr.phase === "waiting") return;

      const fadeOut = dr.phase === "done" ? Math.max(0, dr.doneTimer / 0.35) : 1;
      const fadeIn  = dr.phase === "flying" ? dr.flyProgress : 1;
      const alpha   = fadeIn * fadeOut;
      ctx.save();

      // ── 레이저 빔 (firing 단계) ─────────────────────
      if (dr.phase === "firing" && dr.laserTimer > 0) {
        const la = dr.laserTimer / 0.4;
        const lx = dr.x;
        const ey = dr.target.y;
        ctx.globalAlpha = la * 0.85;
        // 외부 글로우 빔
        const lg = ctx.createLinearGradient(lx - 10, 0, lx + 10, 0);
        lg.addColorStop(0, "rgba(0,255,180,0)");
        lg.addColorStop(0.5, `rgba(0,255,220,${0.8 * la})`);
        lg.addColorStop(1, "rgba(0,255,180,0)");
        ctx.fillStyle = lg;
        ctx.fillRect(lx - 10, dr.y, 20, ey - dr.y);
        // 핵심 빔
        ctx.globalAlpha = la;
        ctx.fillStyle = `rgba(210,255,255,${la})`;
        ctx.fillRect(lx - 2, dr.y, 4, ey - dr.y);
        // 충격 플래시 (착탄점)
        ctx.globalAlpha = la * 0.9;
        const imp = ctx.createRadialGradient(lx, ey, 0, lx, ey, 32);
        imp.addColorStop(0, "rgba(255,255,255,1)");
        imp.addColorStop(0.3, "rgba(0,255,200,0.7)");
        imp.addColorStop(1, "rgba(0,255,200,0)");
        ctx.fillStyle = imp;
        ctx.beginPath(); ctx.arc(lx, ey, 32, 0, Math.PI * 2); ctx.fill();
      }

      // ── 드론 본체 ────────────────────────────────────
      ctx.globalAlpha = alpha;
      ctx.save();
      ctx.translate(dr.x, dr.y);

      // 호버링 흔들흔들
      const wobble = dr.phase === "hovering"
        ? Math.sin(now * 9) * 2.5
        : (dr.phase === "flying" ? 0 : Math.sin(now * 5) * 1.2);
      ctx.translate(Math.sin(now * 7) * wobble * 0.4, wobble);

      const isFiring = (dr.phase === "firing");
      const isHovering = (dr.phase === "hovering");
      const chargeRatio = isHovering ? (1 - dr.hoverTimer / 0.5) : (isFiring ? 1 : 0);
      const pulse = 0.7 + Math.sin(now * 8) * 0.3;

      // ── 외부 큰 글로우 (항상 켜져 있음) ─────────────
      const outerGlow = ctx.createRadialGradient(0, 0, 0, 0, 0, 36 + chargeRatio * 12);
      outerGlow.addColorStop(0, `rgba(0,255,180,${0.55 * pulse})`);
      outerGlow.addColorStop(0.5, `rgba(0,200,120,${0.25 * pulse})`);
      outerGlow.addColorStop(1, "rgba(0,255,180,0)");
      ctx.fillStyle = outerGlow;
      ctx.beginPath(); ctx.arc(0, 0, 48, 0, Math.PI * 2); ctx.fill();

      // ── 좌우 프로펠러 암 (밝은 회색) ────────────────
      for (const sx of [-18, 18]) {
        ctx.strokeStyle = "#c8e8d0";
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(sx, 0); ctx.stroke();
        // 프로펠러 회전 원판 (밝은 민트)
        ctx.strokeStyle = isFiring ? "rgba(0,255,220,0.9)" : "rgba(120,255,200,0.85)";
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.ellipse(sx, 0, 10, 3, now * (sx > 0 ? 12 : -12), 0, Math.PI * 2);
        ctx.stroke();
        // 프로펠러 원 테두리
        ctx.strokeStyle = "rgba(255,255,255,0.5)";
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(sx, 0, 10, 0, Math.PI * 2); ctx.stroke();
      }

      // ── 몸체 본판 (밝은 군사 연두/올리브) ──────────
      ctx.fillStyle = isFiring ? "#40e8a0" : "#5adc9a";
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      for (let k = 0; k < 6; k++) {
        const a = (k / 6) * Math.PI * 2;
        k === 0 ? ctx.moveTo(Math.cos(a) * 14, Math.sin(a) * 9) : ctx.lineTo(Math.cos(a) * 14, Math.sin(a) * 9);
      }
      ctx.closePath(); ctx.fill(); ctx.stroke();

      // 몸체 내부 패널 (어두운 테두리 느낌)
      ctx.strokeStyle = "rgba(0,80,40,0.6)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let k = 0; k < 6; k++) {
        const a = (k / 6) * Math.PI * 2;
        k === 0 ? ctx.moveTo(Math.cos(a) * 10, Math.sin(a) * 6) : ctx.lineTo(Math.cos(a) * 10, Math.sin(a) * 6);
      }
      ctx.closePath(); ctx.stroke();

      // ── 중앙 렌즈 (밝은 흰색+청록) ─────────────────
      const lens = ctx.createRadialGradient(-1, -1, 0, 0, 0, 6);
      lens.addColorStop(0, "#ffffff");
      lens.addColorStop(0.35, isFiring ? "#00ffee" : "#88ffdd");
      lens.addColorStop(1, "#00aa66");
      ctx.fillStyle = lens;
      ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = "rgba(255,255,255,0.8)";
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI * 2); ctx.stroke();

      // ── 충전 링 (hovering → 점점 밝아짐) ───────────
      if (chargeRatio > 0) {
        ctx.strokeStyle = `rgba(0,255,180,${chargeRatio * pulse})`;
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.arc(0, 0, 18, -Math.PI / 2, -Math.PI / 2 + chargeRatio * Math.PI * 2);
        ctx.stroke();
      }

      ctx.restore();
      ctx.restore();
    }

    function drawGroundBurn(gb) {
      const now = performance.now() * 0.001;
      const t = gb.life / gb.maxLife; // 1 → 0
      ctx.save();

      // 그을음 원 (검게, 서서히 사라짐)
      const r = 20 + (1 - t) * 6;
      ctx.globalAlpha = t * 0.82;
      const scorch = ctx.createRadialGradient(gb.x, gb.y, 0, gb.x, gb.y, r);
      scorch.addColorStop(0, "rgba(0,0,0,0.95)");
      scorch.addColorStop(0.6, "rgba(10,5,0,0.7)");
      scorch.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = scorch;
      ctx.beginPath(); ctx.arc(gb.x, gb.y, r, 0, Math.PI * 2); ctx.fill();

      // 흰 아지랭이 (중반부터 피어오름)
      if (t < 0.75) {
        const shimmerAmt = (0.75 - t) / 0.75;
        for (let k = 0; k < 4; k++) {
          const wx = gb.x + Math.sin(now * 2.5 + k * 1.7) * r * 0.55;
          const riseY = shimmerAmt * 28 + k * 7;
          const wy = gb.y - riseY;
          const wa = shimmerAmt * (1 - k * 0.22) * (0.5 + 0.4 * Math.sin(now * 4 + k * 2.3));
          if (wa <= 0) continue;
          ctx.globalAlpha = wa * 0.55;
          const wisp = ctx.createRadialGradient(wx, wy, 0, wx, wy, 5 + k * 1.5);
          wisp.addColorStop(0, "rgba(255,255,255,0.9)");
          wisp.addColorStop(1, "rgba(255,255,255,0)");
          ctx.fillStyle = wisp;
          ctx.beginPath(); ctx.arc(wx, wy, 5 + k * 1.5, 0, Math.PI * 2); ctx.fill();
        }
      }

      ctx.restore();
    }

    function drawMarineSoldier(r, walkTime, isWalking, colors, isSkill, isGatling, shootFlash) {
      // Warhammer 40K Space Marine (Ultramarines) — 탑다운 뷰
      const wt = walkTime || 0;
      const freq = 8;
      const sf = shootFlash || 0;
      const swing = isWalking ? Math.sin(wt * freq) : 0;
      const bob   = isWalking ? Math.abs(Math.sin(wt * freq)) : 0;
      const sway  = isWalking ? Math.sin(wt * freq * 2) : 0;

      // 스킬 발동 — 오렌지 파워 글로우
      if (isSkill) {
        ctx.save();
        ctx.globalAlpha = 0.44 + Math.sin(performance.now() * 0.018) * 0.15;
        const sg = ctx.createRadialGradient(0, 0, r * 0.12, 0, 0, r * 1.7);
        sg.addColorStop(0, "rgba(255,150,40,0.9)");
        sg.addColorStop(0.45, "rgba(255,50,0,0.55)");
        sg.addColorStop(1, "rgba(255,10,0,0)");
        ctx.fillStyle = sg;
        ctx.beginPath(); ctx.arc(0, 0, r * 1.7, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      }

      // 개틀링 대기 — 파란 에너지 링
      if (isGatling && !isSkill) {
        ctx.save();
        ctx.globalAlpha = 0.30 + Math.sin(performance.now() * 0.022) * 0.12;
        ctx.strokeStyle = "#60d0ff";
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(0, 0, r * 1.15, 0, Math.PI * 2); ctx.stroke();
        ctx.restore();
      }

      // 지면 그림자
      ctx.save();
      ctx.globalAlpha = 0.36;
      ctx.fillStyle = "#000";
      ctx.beginPath();
      ctx.ellipse(-r * 0.08, r * 0.1 + bob * r * 0.06,
                  r * (0.92 + bob * 0.04), r * (0.58 + bob * 0.03), 0.06, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      ctx.translate(0, sway * 0.8);
      ctx.scale(0.87, 0.87);
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      // ── 색상 팔레트 (Ultramarines 딥 코발트) ──────────────
      const aDeep  = (colors && colors.dark)   || "#0c1e50";
      const aMid   = (colors && colors.mid)    || "#18388a";
      const aLight = (colors && colors.light)  || "#2a56c0";
      const aHigh  = "#4878e8";
      const gDark  = "#7a5008";
      const gMid   = "#c89010";
      const gLight = "#f0d030";
      const redAcc = (colors && colors.red)    || "#c81a14";
      const black  = "rgba(0,0,0,0.92)";
      const recoilPull = sf * 0.22;

      // ── 배낭 (power plant backpack) ──────────────────────
      ctx.fillStyle = aDeep;
      ctx.strokeStyle = black;
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.ellipse(-r * 0.53, 0, r * 0.27, r * 0.32, 0, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      ctx.strokeStyle = gDark; ctx.lineWidth = 0.9;
      ctx.beginPath();
      ctx.ellipse(-r * 0.53, 0, r * 0.25, r * 0.30, 0, 0, Math.PI * 2);
      ctx.stroke();
      // 배기 파이프 3개
      ctx.strokeStyle = "#252e3a"; ctx.lineWidth = r * 0.065;
      for (let i = -1; i <= 1; i++) {
        ctx.beginPath();
        ctx.moveTo(-r * 0.63, i * r * 0.11);
        ctx.lineTo(-r * 0.80, i * r * 0.14);
        ctx.stroke();
      }
      // 배기구 청색 발광
      ctx.fillStyle = "rgba(0,160,255,0.22)";
      for (let i = -1; i <= 1; i++) {
        ctx.beginPath(); ctx.arc(-r * 0.80, i * r * 0.14, r * 0.052, 0, Math.PI * 2); ctx.fill();
      }

      // ── 뒤쪽 팔 ─────────────────────────────────────────
      const gSpread = isGatling ? 0.20 : 0;
      ctx.strokeStyle = aMid; ctx.lineWidth = r * 0.27;
      ctx.beginPath();
      ctx.moveTo(-r * 0.28, -r * 0.25);
      ctx.lineTo(-r * (0.74 - swing * 0.26 + recoilPull), -r * (0.52 + gSpread));
      ctx.moveTo(-r * 0.28,  r * 0.25);
      ctx.lineTo(-r * (0.74 + swing * 0.26 + recoilPull),  r * (0.52 + gSpread));
      ctx.stroke();
      ctx.strokeStyle = aLight; ctx.lineWidth = r * 0.13;
      ctx.beginPath();
      ctx.moveTo(-r * 0.26, -r * 0.22);
      ctx.lineTo(-r * (0.68 - swing * 0.26 + recoilPull), -r * (0.46 + gSpread));
      ctx.moveTo(-r * 0.26,  r * 0.22);
      ctx.lineTo(-r * (0.68 + swing * 0.26 + recoilPull),  r * (0.46 + gSpread));
      ctx.stroke();
      // 팔꿈치 금장 (elbow guards)
      for (const [ay, ang] of [[-1, -0.22], [1, 0.22]]) {
        const ex = -r * (0.57 + swing * ay * 0.13 + recoilPull);
        const ey = ay * r * (0.42 + gSpread * 0.5);
        ctx.fillStyle = gMid; ctx.strokeStyle = gDark; ctx.lineWidth = 0.6;
        ctx.beginPath();
        ctx.ellipse(ex, ey, r * 0.10, r * 0.07, ang, 0, Math.PI * 2);
        ctx.fill(); ctx.stroke();
      }

      // ── 앞쪽 팔 ─────────────────────────────────────────
      ctx.strokeStyle = aMid; ctx.lineWidth = r * 0.26;
      ctx.beginPath();
      ctx.moveTo(r * 0.06, -r * 0.28);
      ctx.lineTo(r * (0.50 + swing * 0.12 - recoilPull), -r * 0.45);
      ctx.moveTo(r * 0.06,  r * 0.26);
      ctx.lineTo(r * (0.50 - swing * 0.12 - recoilPull),  r * 0.43);
      ctx.stroke();
      ctx.strokeStyle = aLight; ctx.lineWidth = r * 0.12;
      ctx.beginPath();
      ctx.moveTo(r * 0.07, -r * 0.25);
      ctx.lineTo(r * (0.46 + swing * 0.12 - recoilPull), -r * 0.41);
      ctx.moveTo(r * 0.07,  r * 0.23);
      ctx.lineTo(r * (0.46 - swing * 0.12 - recoilPull),  r * 0.39);
      ctx.stroke();

      // ── 몸통 (bulky power armour torso) ──────────────────
      const bodyG = ctx.createRadialGradient(-r*0.14, -r*0.1, r*0.06, -r*0.04, 0, r*0.64);
      bodyG.addColorStop(0, aLight);
      bodyG.addColorStop(0.44, aMid);
      bodyG.addColorStop(1, aDeep);
      ctx.fillStyle = bodyG;
      ctx.strokeStyle = black; ctx.lineWidth = 1.9;
      ctx.beginPath();
      ctx.ellipse(-r * 0.04, 0, r * 0.56, r * 0.51, 0, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      // 몸통 하이라이트 엣지
      ctx.save();
      ctx.globalAlpha = 0.38;
      ctx.strokeStyle = aHigh; ctx.lineWidth = 0.9;
      ctx.beginPath();
      ctx.arc(-r*0.04, 0, r*0.50, Math.PI*1.06, Math.PI*1.64);
      ctx.stroke();
      ctx.restore();

      // ── 어깨 패드 (HUGE Warhammer pauldrons) ─────────────
      const pW = r * 0.33, pH = r * 0.22;
      for (const [side, tilt] of [[-1, -0.22], [1, 0.22]]) {
        const pcx = -r * 0.06, pcy = side * r * 0.57;
        const pg = ctx.createLinearGradient(pcx - pW, pcy, pcx + pW, pcy);
        pg.addColorStop(0, aDeep);
        pg.addColorStop(0.35, aMid);
        pg.addColorStop(0.8, aLight);
        ctx.fillStyle = pg;
        ctx.strokeStyle = black; ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.ellipse(pcx, pcy, pW, pH, tilt, 0, Math.PI * 2);
        ctx.fill(); ctx.stroke();
        // 금장 테두리
        ctx.strokeStyle = gMid; ctx.lineWidth = 1.4;
        ctx.beginPath();
        ctx.ellipse(pcx, pcy, pW - 1, pH - 1, tilt, 0, Math.PI * 2);
        ctx.stroke();
        // 하이라이트
        ctx.save();
        ctx.globalAlpha = 0.42;
        ctx.strokeStyle = gLight; ctx.lineWidth = 0.6;
        ctx.beginPath();
        ctx.ellipse(pcx - r*0.06, pcy - side*r*0.04, pW*0.6, pH*0.5, tilt, 0, Math.PI*2);
        ctx.stroke();
        ctx.restore();
        // 챕터 U 마크
        ctx.save();
        ctx.globalAlpha = 0.68;
        ctx.fillStyle = gMid;
        ctx.font = `bold ${Math.round(r * 0.13)}px serif`;
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText("U", pcx, pcy + side * r * 0.01);
        ctx.restore();
      }

      // ── 가슴 플레이트 ────────────────────────────────────
      const cpG = ctx.createLinearGradient(r*0.0, -r*0.22, r*0.28, r*0.22);
      cpG.addColorStop(0, aLight); cpG.addColorStop(1, aMid);
      ctx.fillStyle = cpG;
      ctx.strokeStyle = black; ctx.lineWidth = 1.0;
      ctx.beginPath();
      ctx.ellipse(r * 0.04, 0, r * 0.29, r * 0.27, 0, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();

      // 가슴 중앙 세로 금선
      ctx.strokeStyle = gMid; ctx.lineWidth = 0.75;
      ctx.beginPath();
      ctx.moveTo(r * 0.04, -r * 0.22); ctx.lineTo(r * 0.04, r * 0.22);
      ctx.stroke();

      // ── 해골 엠블렘 (skull emblem on chest) ──────────────
      const skx = r * 0.08, sky = -r * 0.02;
      ctx.fillStyle = "#d0c4a4"; ctx.strokeStyle = "rgba(0,0,0,0.5)"; ctx.lineWidth = 0.55;
      ctx.beginPath(); ctx.ellipse(skx, sky, r*0.105, r*0.095, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.fillStyle = "#b8ab8a";
      ctx.beginPath(); ctx.ellipse(skx, sky + r*0.075, r*0.072, r*0.050, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = aDeep;
      ctx.beginPath(); ctx.ellipse(skx - r*0.04, sky - r*0.02, r*0.028, r*0.024, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(skx + r*0.04, sky - r*0.02, r*0.028, r*0.024, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "#8a7a60";
      ctx.beginPath();
      ctx.moveTo(skx - r*0.02, sky + r*0.020); ctx.lineTo(skx, sky + r*0.038);
      ctx.lineTo(skx + r*0.02, sky + r*0.020); ctx.closePath(); ctx.fill();

      // ── 체인 장식 3줄 ────────────────────────────────────
      ctx.setLineDash([r * 0.045, r * 0.042]);
      ctx.strokeStyle = "#686878"; ctx.lineWidth = 1.1;
      for (let ci = 0; ci < 3; ci++) {
        const cy = -r * 0.14 + ci * r * 0.14;
        ctx.beginPath();
        ctx.moveTo(-r * 0.25, cy); ctx.lineTo(r * 0.18, cy);
        ctx.stroke();
      }
      ctx.setLineDash([]);

      // 퓨리티 씰 (purity seal — wax + ribbon)
      ctx.fillStyle = "#c8b060";
      ctx.fillRect(-r * 0.11, r * 0.17, r * 0.055, r * 0.16);
      ctx.fillStyle = redAcc;
      ctx.beginPath(); ctx.arc(-r*0.082, r*0.17, r*0.042, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "rgba(255,255,255,0.14)";
      ctx.beginPath(); ctx.arc(-r*0.07, r*0.15, r*0.02, 0, Math.PI*2); ctx.fill();

      // ── 무기 (개틀링/스킬: 배럴 회전 / 기본: 볼터) ──────
      ctx.save();
      ctx.translate(r * 0.44, 0);
      if (isGatling || isSkill) {
        const barrelAngle = performance.now() * (isSkill ? 0.022 : 0.010);
        const barrelCount = 6, barrelLen = r * 0.45, barrelRad = r * 0.072;
        ctx.save();
        ctx.translate(r * 0.1, 0);
        for (let b = 0; b < barrelCount; b++) {
          const ba = barrelAngle + (b / barrelCount) * Math.PI * 2;
          ctx.save(); ctx.rotate(ba);
          ctx.fillStyle = isSkill ? "#c06020" : "#505860";
          ctx.strokeStyle = black; ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.ellipse(barrelLen*0.5, barrelRad*1.1, barrelLen*0.5, barrelRad, 0, 0, Math.PI*2);
          ctx.fill(); ctx.stroke();
          ctx.restore();
        }
        ctx.fillStyle = isSkill ? "#ff8030" : "#404848";
        ctx.beginPath(); ctx.arc(0, 0, barrelRad*1.8, 0, Math.PI*2); ctx.fill();
        ctx.restore();
        if (sf > 0.3) {
          ctx.save(); ctx.globalAlpha = sf * 0.9;
          const fg = ctx.createRadialGradient(r*0.65, 0, 0, r*0.65, 0, r*0.42);
          fg.addColorStop(0, "#ffffff"); fg.addColorStop(0.3, "#ffdd60"); fg.addColorStop(1, "rgba(255,80,0,0)");
          ctx.fillStyle = fg;
          ctx.beginPath(); ctx.arc(r*0.65, 0, r*0.42, 0, Math.PI*2); ctx.fill();
          ctx.restore();
        }
      } else {
        drawWeapon(true, "shooter");
        if (sf > 0.3) {
          ctx.save(); ctx.globalAlpha = sf * 0.82;
          const fg = ctx.createRadialGradient(r*0.5, 0, 0, r*0.5, 0, r*0.32);
          fg.addColorStop(0, "#ffffff"); fg.addColorStop(0.3, "#ffe060"); fg.addColorStop(1, "rgba(255,200,0,0)");
          ctx.fillStyle = fg;
          ctx.beginPath(); ctx.arc(r*0.5, 0, r*0.32, 0, Math.PI*2); ctx.fill();
          ctx.restore();
        }
      }
      ctx.restore();

      // ── 헬멧 ─────────────────────────────────────────────
      const hx = r * 0.40, hr = r * 0.40;
      const helmG = ctx.createRadialGradient(hx - r*0.1, -r*0.1, r*0.04, hx, 0, hr);
      helmG.addColorStop(0, aLight); helmG.addColorStop(0.52, aMid); helmG.addColorStop(1, aDeep);
      ctx.fillStyle = helmG;
      ctx.strokeStyle = black; ctx.lineWidth = 1.9;
      ctx.beginPath(); ctx.arc(hx, 0, hr, 0, Math.PI*2); ctx.fill(); ctx.stroke();

      // 헬멧 금장 크라운 링
      ctx.strokeStyle = gMid; ctx.lineWidth = 1.3;
      ctx.beginPath(); ctx.arc(hx, 0, hr - 1, Math.PI*0.72, Math.PI*1.84); ctx.stroke();

      // ── 바이저 슬릿 (Space Marine 수평 레드 슬릿) ────────
      const visorCol = isSkill ? "rgba(255,80,20,0.97)"
                               : ((colors && colors.visor) || "rgba(200,22,14,0.94)");
      // 어두운 배경
      ctx.fillStyle = "rgba(4,4,8,0.82)";
      ctx.beginPath();
      ctx.moveTo(hx - hr*0.40, -hr*0.20);
      ctx.lineTo(hx + hr*0.56,  -hr*0.20);
      ctx.lineTo(hx + hr*0.56,   hr*0.20);
      ctx.lineTo(hx - hr*0.40,   hr*0.20);
      ctx.closePath(); ctx.fill();
      // 발광 슬릿
      ctx.fillStyle = visorCol;
      ctx.beginPath();
      ctx.moveTo(hx - hr*0.38, -hr*0.13);
      ctx.lineTo(hx + hr*0.54,  -hr*0.13);
      ctx.lineTo(hx + hr*0.54,   hr*0.13);
      ctx.lineTo(hx - hr*0.38,   hr*0.13);
      ctx.closePath(); ctx.fill();
      // 바이저 글로우
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      ctx.globalAlpha = isSkill ? 0.52 : 0.26;
      const vg = ctx.createRadialGradient(hx + hr*0.14, 0, 0, hx + hr*0.14, 0, hr*0.48);
      vg.addColorStop(0, isSkill ? "rgba(255,100,20,1)" : "rgba(220,28,12,1)");
      vg.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = vg;
      ctx.beginPath(); ctx.arc(hx + hr*0.14, 0, hr*0.48, 0, Math.PI*2); ctx.fill();
      ctx.restore();

      // 귀 보호대 (cheek guard vents)
      ctx.fillStyle = aDeep; ctx.strokeStyle = black; ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.ellipse(hx - hr*0.80, -hr*0.36, r*0.12, r*0.09, -0.30, 0, Math.PI*2);
      ctx.fill(); ctx.stroke();
      ctx.beginPath();
      ctx.ellipse(hx - hr*0.80,  hr*0.36, r*0.12, r*0.09,  0.30, 0, Math.PI*2);
      ctx.fill(); ctx.stroke();
      // 환기구 구멍
      ctx.fillStyle = "#1a1e28";
      for (const sy of [-1, 1]) {
        ctx.beginPath(); ctx.arc(hx - hr*0.88, sy*hr*0.38, r*0.048, 0, Math.PI*2); ctx.fill();
      }

      // 헬멧 크레스트 금장
      ctx.save();
      ctx.globalAlpha = 0.65;
      ctx.strokeStyle = gMid; ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(hx - r*0.04, 0, hr*0.88, -Math.PI*0.54, -Math.PI*0.12);
      ctx.stroke();
      ctx.restore();
    }

    function drawStormtrooper(r, hasGun = true, weaponKind = "shooter") {
      // 스타워즈 스톰트루퍼 (흰색 갑옷) — 탑다운 뷰
      ctx.save();
      ctx.globalAlpha = 0.28;
      ctx.fillStyle = "#000";
      ctx.beginPath();
      ctx.ellipse(-r * 0.14, r * 0.12, r * 0.84, r * 0.5, 0.1, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      const sc = 0.82;
      ctx.scale(sc, sc);
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      const white     = "#dde1e8";
      const offWhite  = "#c8cdd5";
      const darkGray  = "#6a707a";
      const black     = "rgba(0,0,0,0.9)";
      const blackLine = "rgba(0,0,0,0.52)";
      const visorBlk  = "rgba(6,6,8,0.97)";

      // 뒤쪽 팔
      ctx.strokeStyle = darkGray;
      ctx.lineWidth = r * 0.22;
      ctx.beginPath();
      ctx.moveTo(-r * 0.3, -r * 0.22);
      ctx.lineTo(-r * 0.82, -r * 0.5);
      ctx.moveTo(-r * 0.3,  r * 0.22);
      ctx.lineTo(-r * 0.82,  r * 0.5);
      ctx.stroke();

      // 앞쪽 팔 (흰색 갑옷)
      ctx.strokeStyle = white;
      ctx.lineWidth = r * 0.21;
      ctx.beginPath();
      ctx.moveTo(r * 0.04, -r * 0.26);
      ctx.lineTo(r * 0.5,  -r * 0.42);
      ctx.moveTo(r * 0.04,  r * 0.24);
      ctx.lineTo(r * 0.5,   r * 0.4);
      ctx.stroke();

      // 몸통 (흰 갑옷)
      ctx.fillStyle = white;
      ctx.strokeStyle = black;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.ellipse(-r * 0.05, 0, r * 0.52, r * 0.46, 0, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();

      // 갑옷 검은 구분선
      ctx.strokeStyle = blackLine;
      ctx.lineWidth = 1.3;
      ctx.beginPath();
      ctx.moveTo(r * 0.06, -r * 0.32);
      ctx.lineTo(r * 0.06,  r * 0.32);
      ctx.moveTo(-r * 0.22, -r * 0.14);
      ctx.lineTo( r * 0.22, -r * 0.14);
      ctx.moveTo(-r * 0.22,  r * 0.14);
      ctx.lineTo( r * 0.22,  r * 0.14);
      ctx.stroke();

      // 어깨 패드 (흰색)
      ctx.fillStyle = offWhite;
      ctx.strokeStyle = black;
      ctx.lineWidth = 1.1;
      ctx.beginPath();
      ctx.ellipse(-r * 0.07, -r * 0.43, r * 0.23, r * 0.15, -0.28, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      ctx.beginPath();
      ctx.ellipse(-r * 0.07,  r * 0.43, r * 0.23, r * 0.15,  0.28, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();

      // 임페리얼 블라스터 (E-11)
      if (hasGun && weaponKind !== "melee") {
        ctx.save();
        ctx.translate(r * 0.42, 0);
        ctx.fillStyle = "#4a4f58";
        ctx.strokeStyle = black;
        ctx.lineWidth = 1.3;
        ctx.fillRect(-3, -4, 26, 8);
        ctx.strokeRect(-3, -4, 26, 8);
        ctx.fillRect(22, -3, 13, 6);
        ctx.strokeRect(22, -3, 13, 6);
        ctx.fillStyle = "#333740";
        ctx.fillRect(1, -7, 11, 4);
        ctx.strokeRect(1, -7, 11, 4);
        ctx.beginPath();
        ctx.moveTo(7, 4);
        ctx.lineTo(9, 12);
        ctx.lineTo(15, 12);
        ctx.lineTo(13, 4);
        ctx.closePath();
        ctx.fill(); ctx.stroke();
        ctx.restore();
      }

      // 헬멧 (스톰트루퍼 돔)
      const hx = r * 0.38, hr = r * 0.38;
      ctx.fillStyle = white;
      ctx.strokeStyle = black;
      ctx.lineWidth = 1.6;
      ctx.beginPath();
      ctx.arc(hx, 0, hr, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();

      // 검은 T자 바이저 (스톰트루퍼 시그니처)
      // 눈 부분 (가로 밴드)
      ctx.fillStyle = visorBlk;
      ctx.beginPath();
      ctx.arc(hx, -hr * 0.08, hr * 0.76, -Math.PI * 0.44, Math.PI * 0.44);
      ctx.arc(hx, -hr * 0.08, hr * 0.44, Math.PI * 0.44, -Math.PI * 0.44, true);
      ctx.closePath();
      ctx.fill();

      // 입/코 부분 (T자 세로 슬롯)
      ctx.beginPath();
      ctx.arc(hx, hr * 0.24, hr * 0.56, -Math.PI * 0.27, Math.PI * 0.27);
      ctx.arc(hx, hr * 0.24, hr * 0.3, Math.PI * 0.27, -Math.PI * 0.27, true);
      ctx.closePath();
      ctx.fill();

      // 헬멧 하이라이트 (흰색 광택)
      ctx.fillStyle = "rgba(255,255,255,0.42)";
      ctx.beginPath();
      ctx.arc(hx - r * 0.05, -r * 0.1, hr * 0.34, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawTacticalHuman(r, isPlayer, hasGun = true, weaponKind = "shooter") {
      const suit = isPlayer ? "rgba(26, 28, 32, 0.98)" : "rgba(5, 6, 7, 0.98)";
      const skin = isPlayer ? "rgba(226, 218, 212, 0.96)" : "rgba(8, 9, 10, 0.98)";
      const accent = isPlayer ? "rgba(255, 205, 205, 0.82)" : "rgba(255,255,255,0.13)";
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      ctx.save();
      ctx.globalAlpha = 0.34;
      ctx.fillStyle = "#000";
      ctx.beginPath();
      ctx.ellipse(-r * 0.18, r * 0.15, r * 0.85, r * 0.5, 0.1, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      const unitScale = 0.82;
      ctx.scale(unitScale, unitScale);

      ctx.strokeStyle = suit;
      ctx.lineWidth = r * 0.22;
      ctx.beginPath();
      ctx.moveTo(-r * 0.32, -r * 0.22);
      ctx.lineTo(-r * 0.86, -r * 0.52);
      ctx.moveTo(-r * 0.34, r * 0.2);
      ctx.lineTo(-r * 0.9, r * 0.5);
      ctx.stroke();

      ctx.strokeStyle = suit;
      ctx.lineWidth = r * 0.2;
      ctx.beginPath();
      ctx.moveTo(r * 0.04, -r * 0.28);
      ctx.lineTo(r * 0.58, -r * 0.44);
      ctx.moveTo(r * 0.04, r * 0.24);
      ctx.lineTo(r * 0.58, r * 0.42);
      ctx.stroke();

      ctx.fillStyle = suit;
      ctx.strokeStyle = accent;
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.ellipse(-r * 0.08, 0, r * 0.5, r * 0.44, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      ctx.save();
      ctx.translate(r * 0.42, 0);
      if (hasGun) drawWeapon(isPlayer, weaponKind);
      ctx.restore();

      ctx.fillStyle = skin;
      ctx.strokeStyle = isPlayer ? "rgba(255,255,255,0.74)" : "rgba(255,255,255,0.1)";
      ctx.lineWidth = 1.3;
      ctx.beginPath();
      ctx.arc(r * 0.38, 0, r * 0.34, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      if (isPlayer) {
        ctx.fillStyle = "rgba(218, 220, 225, 0.92)";
        ctx.beginPath();
        ctx.arc(r * 0.3, -r * 0.08, r * 0.3, Math.PI * 0.6, Math.PI * 1.9);
        ctx.fill();
        ctx.strokeStyle = "rgba(244, 190, 196, 0.8)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-r * 0.12, -r * 0.32);
        ctx.lineTo(-r * 0.42, -r * 0.58);
        ctx.stroke();
      }
    }

    function drawWeapon(isPlayer, weaponKind) {
      if (weaponKind === "flamer") {
        drawFlamethrower(isPlayer);
        return;
      }
      if (isPlayer && currentWeapon === 1) { drawShotgun(); return; }
      if (isPlayer && currentWeapon === 2) { drawTaserGun(); return; }
      if (isPlayer && currentWeapon === 3) { drawBombInHand(); return; }
      drawRifle(isPlayer);
    }

    function drawBombInHand() {
      // 손에 든 수류탄
      ctx.fillStyle = "#2e3840";
      ctx.strokeStyle = "rgba(0,0,0,0.82)";
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.arc(14, 0, 10, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      // 도화선
      ctx.strokeStyle = "#9a8830";
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      ctx.moveTo(14, -10);
      ctx.quadraticCurveTo(21, -16, 19, -21);
      ctx.stroke();
      // 하이라이트
      ctx.fillStyle = "rgba(255,255,255,0.18)";
      ctx.beginPath();
      ctx.arc(10, -3, 4, 0, Math.PI * 2);
      ctx.fill();
      // 세로 줄 (수류탄 무늬)
      ctx.strokeStyle = "rgba(255,255,255,0.2)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(14, -10); ctx.lineTo(14, 10);
      ctx.moveTo(7, -7); ctx.lineTo(7, 7);
      ctx.moveTo(21, -7); ctx.lineTo(21, 7);
      ctx.stroke();
    }

    function drawShotgun() {
      // Storm Bolter (더블 배럴 볼터)
      ctx.strokeStyle = "rgba(0,0,0,0.80)"; ctx.lineWidth = 1.4;
      // 메인 바디
      ctx.fillStyle = "#1a2e7a";
      ctx.fillRect(-3, -8, 22, 16); ctx.strokeRect(-3, -8, 22, 16);
      // 더블 배럴 하우징
      ctx.fillStyle = "#0c1848";
      ctx.fillRect(19, -8, 13, 7); ctx.strokeRect(19, -8, 13, 7);
      ctx.fillRect(19, 1, 13, 7); ctx.strokeRect(19, 1, 13, 7);
      // 두 총구
      ctx.fillStyle = "#060810";
      ctx.fillRect(30, -7, 5, 5); ctx.strokeRect(30, -7, 5, 5);
      ctx.fillRect(30, 2, 5, 5); ctx.strokeRect(30, 2, 5, 5);
      // 탄창
      ctx.fillStyle = "#0c1848";
      ctx.fillRect(2, 8, 15, 9); ctx.strokeRect(2, 8, 15, 9);
      // 손잡이
      ctx.fillStyle = "#070b24";
      ctx.strokeStyle = "rgba(0,0,0,0.80)";
      ctx.fillRect(5, 8, 8, 13); ctx.strokeRect(5, 8, 8, 13);
      // 주황 금장 테두리 (산탄총)
      ctx.strokeStyle = "#d07818"; ctx.lineWidth = 1.0;
      ctx.strokeRect(-2, -7, 20, 14);
      // 중앙 분리선
      ctx.strokeStyle = "rgba(40,80,200,0.4)"; ctx.lineWidth = 0.7;
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(21, 0); ctx.stroke();
    }

    function drawTaserGun() {
      // Plasma Pistol (플라즈마 피스톨 — 마취총)
      ctx.strokeStyle = "rgba(0,0,0,0.80)"; ctx.lineWidth = 1.4;
      // 본체
      ctx.fillStyle = "#162464";
      ctx.fillRect(-3, -5, 19, 10); ctx.strokeRect(-3, -5, 19, 10);
      // 플라즈마 코일 하우징 (원형)
      ctx.fillStyle = "#0a1038";
      ctx.beginPath(); ctx.ellipse(21, 0, 8, 8, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
      // 플라즈마 글로우
      const pg = ctx.createRadialGradient(21, 0, 0, 21, 0, 7);
      pg.addColorStop(0, "rgba(100,220,255,0.9)");
      pg.addColorStop(0.5, "rgba(40,140,255,0.65)");
      pg.addColorStop(1, "rgba(0,60,200,0)");
      ctx.fillStyle = pg;
      ctx.beginPath(); ctx.arc(21, 0, 7, 0, Math.PI*2); ctx.fill();
      // 배럴 (짧음)
      ctx.fillStyle = "#0c1848"; ctx.strokeStyle = "rgba(0,0,0,0.80)";
      ctx.fillRect(29, -2, 10, 4); ctx.strokeRect(29, -2, 10, 4);
      // 손잡이
      ctx.fillStyle = "#070b24";
      ctx.fillRect(3, 5, 8, 12); ctx.strokeRect(3, 5, 8, 12);
      // 청록 테두리 (마취총)
      ctx.strokeStyle = "#40d0ff"; ctx.lineWidth = 0.9;
      ctx.strokeRect(-2, -4, 17, 8);
      // 외부 글로우
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      ctx.globalAlpha = 0.32;
      const og = ctx.createRadialGradient(21, 0, 0, 21, 0, 15);
      og.addColorStop(0, "rgba(80,200,255,0.8)"); og.addColorStop(1, "rgba(0,100,255,0)");
      ctx.fillStyle = og;
      ctx.beginPath(); ctx.arc(21, 0, 15, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }

    function drawRifle(isPlayer) {
      // Space Marine Bolter (청금 파워 볼터)
      const bodyCol = isPlayer ? "#1a2e7a" : "#606878";
      const darkCol = isPlayer ? "#0c1848" : "#484e58";

      ctx.strokeStyle = "rgba(0,0,0,0.80)"; ctx.lineWidth = 1.4;
      // 메인 볼터 바디
      ctx.fillStyle = bodyCol;
      ctx.fillRect(-3, -6, 23, 12); ctx.strokeRect(-3, -6, 23, 12);
      // 총열 하우징
      ctx.fillStyle = darkCol;
      ctx.fillRect(20, -4, 14, 8); ctx.strokeRect(20, -4, 14, 8);
      // 총구
      ctx.fillStyle = "#060810";
      ctx.fillRect(32, -3, 5, 6); ctx.strokeRect(32, -3, 5, 6);
      // 탄창 (big bolter magazine)
      ctx.fillStyle = darkCol;
      ctx.fillRect(1, 6, 15, 9); ctx.strokeRect(1, 6, 15, 9);
      // 손잡이
      ctx.fillStyle = "#070b24";
      ctx.fillRect(4, 6, 8, 14); ctx.strokeRect(4, 6, 8, 14);
      // 금장 테두리
      ctx.strokeStyle = goldCol; ctx.lineWidth = 0.9;
      ctx.strokeRect(-2, -5, 21, 10);
      // 조준선
      ctx.fillStyle = darkCol; ctx.strokeStyle = "rgba(0,0,0,0.6)"; ctx.lineWidth = 0.7;
      ctx.fillRect(7, -8, 8, 3); ctx.strokeRect(7, -8, 8, 3);
      // 볼터 분리선
      ctx.strokeStyle = isPlayer ? "rgba(42,86,200,0.45)" : "rgba(180,190,200,0.35)";
      ctx.lineWidth = 0.7;
      ctx.beginPath(); ctx.moveTo(1, 0); ctx.lineTo(22, 0); ctx.stroke();
    }

    function drawFlamethrower(isPlayer) {
      ctx.fillStyle = isPlayer ? "rgba(238, 240, 242, 0.96)" : "rgba(230, 224, 212, 0.82)";
      ctx.strokeStyle = "rgba(0,0,0,0.72)";
      ctx.lineWidth = 1.4;
      ctx.fillRect(-6, -5, 32, 10);
      ctx.strokeRect(-6, -5, 32, 10);
      ctx.fillStyle = "rgba(92, 98, 102, 0.9)";
      ctx.fillRect(23, -3, 21, 6);
      ctx.strokeRect(23, -3, 21, 6);
      ctx.fillStyle = "rgba(241, 119, 43, 0.9)";
      ctx.beginPath();
      ctx.ellipse(2, 11, 9, 5, 0.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.strokeStyle = "rgba(255, 169, 84, 0.85)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(42, 0);
