    function drawBombSprite() {
      ctx.fillStyle = "rgba(4, 5, 6, 0.98)";
      ctx.strokeStyle = "rgba(235,240,245,0.34)";
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.ellipse(0, 1, 9, 11, -0.35, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = "rgba(15, 18, 20, 0.95)";
      ctx.fillRect(-3, -12, 8, 5);
      ctx.strokeRect(-3, -12, 8, 5);
      ctx.strokeStyle = "rgba(255, 210, 120, 0.9)";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(4, -12);
      ctx.quadraticCurveTo(13, -18, 17, -8);
      ctx.stroke();
    }

    function drawTracers() {
      ctx.save();
      ctx.lineCap = "round";
      for (const tr of tracers) {
        const alpha = Math.max(0, tr.life / tr.maxLife);
        ctx.strokeStyle = "rgba(255, 55, 46, " + (0.85 * alpha) + ")";
        ctx.lineWidth = 1.4;
        ctx.beginPath();
        ctx.moveTo(tr.x1, tr.y1);
        ctx.lineTo(tr.x2, tr.y2);
        ctx.stroke();
        ctx.strokeStyle = "rgba(255, 235, 220, " + (0.45 * alpha) + ")";
        ctx.lineWidth = 0.7;
        ctx.beginPath();
        ctx.moveTo(tr.x1, tr.y1);
        ctx.lineTo(tr.x2, tr.y2);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawEnemyTracers() {
      ctx.save();
      ctx.lineCap = "round";
      for (const tr of enemyTracers) {
        const alpha = Math.max(0, tr.life / tr.maxLife);
        ctx.strokeStyle = "rgba(255, 86, 54, " + (0.7 * alpha) + ")";
        ctx.lineWidth = 1.1;
        ctx.beginPath();
        ctx.moveTo(tr.x1, tr.y1);
        ctx.lineTo(tr.x2, tr.y2);
        ctx.stroke();
        ctx.strokeStyle = "rgba(255, 210, 185, " + (0.24 * alpha) + ")";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(tr.x1, tr.y1);
        ctx.lineTo(tr.x2, tr.y2);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawFlameBursts() {
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      for (const flame of flameBursts) {
        const alpha = Math.max(0, flame.life / flame.maxLife);
        const len = flame.length * (0.82 + 0.18 * alpha);
        const spread = flame.spread * (0.82 + 0.2 * Math.sin(alpha * Math.PI));
        const a = flame.angle;
        const tipX = flame.x + Math.cos(a) * len;
        const tipY = flame.y + Math.sin(a) * len;
        const leftX = flame.x + Math.cos(a - spread) * len * 0.72;
        const leftY = flame.y + Math.sin(a - spread) * len * 0.72;
        const rightX = flame.x + Math.cos(a + spread) * len * 0.72;
        const rightY = flame.y + Math.sin(a + spread) * len * 0.72;
        const gradient = ctx.createLinearGradient(flame.x, flame.y, tipX, tipY);
        gradient.addColorStop(0, "rgba(255, 248, 198, " + (0.72 * alpha) + ")");
        gradient.addColorStop(0.34, "rgba(255, 124, 42, " + (0.54 * alpha) + ")");
        gradient.addColorStop(0.72, "rgba(154, 38, 14, " + (0.24 * alpha) + ")");
        gradient.addColorStop(1, "rgba(60, 12, 5, 0)");
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.moveTo(flame.x, flame.y);
        ctx.lineTo(leftX, leftY);
        ctx.quadraticCurveTo(tipX, tipY, rightX, rightY);
        ctx.closePath();
        ctx.fill();

        for (let i = 0; i < 4; i++) {
          const offset = (i - 1.5) * spread * 0.26;
          const tongueLen = len * (0.38 + i * 0.11);
          ctx.strokeStyle = i % 2 ? "rgba(255, 211, 120, " + (0.34 * alpha) + ")" : "rgba(255, 76, 24, " + (0.28 * alpha) + ")";
          ctx.lineWidth = 6 - i;
          ctx.beginPath();
          ctx.moveTo(flame.x, flame.y);
          ctx.quadraticCurveTo(
            flame.x + Math.cos(a + offset) * tongueLen * 0.55,
            flame.y + Math.sin(a + offset) * tongueLen * 0.55,
            flame.x + Math.cos(a + offset * 1.8) * tongueLen,
            flame.y + Math.sin(a + offset * 1.8) * tongueLen
          );
          ctx.stroke();
        }
      }
      ctx.restore();
    }

    function drawAimLaser() {
      if (!aimRay) return;
      if (!player.isMoving) return;
      ctx.save();
      ctx.lineCap = "round";
      ctx.globalCompositeOperation = "lighter";
      ctx.strokeStyle = aimRay.enemy ? "rgba(255, 45, 38, 0.72)" : "rgba(230, 34, 32, 0.52)";
      ctx.lineWidth = 1.15;
      ctx.beginPath();
      ctx.moveTo(aimRay.x1, aimRay.y1);
      ctx.lineTo(aimRay.x2, aimRay.y2);
      ctx.stroke();
      ctx.strokeStyle = "rgba(255, 205, 205, 0.22)";
      ctx.lineWidth = 3.5;
      ctx.beginPath();
      ctx.moveTo(aimRay.x1, aimRay.y1);
      ctx.lineTo(aimRay.x2, aimRay.y2);
      ctx.stroke();
      if (isMobile) {
        ctx.restore();
        return;
      }
      const marker = mobileAimMarkerWorld();
      ctx.globalCompositeOperation = "source-over";
      ctx.strokeStyle = "rgba(255,255,255,0.86)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(marker.x - 11, marker.y);
      ctx.lineTo(marker.x - 3, marker.y);
      ctx.moveTo(marker.x + 3, marker.y);
      ctx.lineTo(marker.x + 11, marker.y);
      ctx.moveTo(marker.x, marker.y - 11);
      ctx.lineTo(marker.x, marker.y - 3);
      ctx.moveTo(marker.x, marker.y + 3);
      ctx.lineTo(marker.x, marker.y + 11);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(marker.x, marker.y, 5, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    function mobileAimMarkerWorld() {
      if (isMobile && mobileControls.shoot && (mobileControls.aimScreenX || mobileControls.aimScreenY)) {
        return screenToWorld(mobileControls.aimScreenX, mobileControls.aimScreenY);
      }
      return { x: aimRay.x2, y: aimRay.y2 };
    }

    function drawMobileAimCursor() {
      // 비터치 시 항상 캐릭터 정중앙, 터치 시 조이스틱 방향으로 계산
      if (mobileControls.shoot) calcAimScreenPos();
      const x = mobileControls.shoot
        ? mobileControls.aimScreenX
        : clamp(screenX(player.x), 18, width - 18);
      const y = mobileControls.shoot
        ? mobileControls.aimScreenY
        : clamp(screenY(player.y), 18, height - 18);
      ctx.save();
      ctx.globalCompositeOperation = "source-over";
      ctx.strokeStyle = mobileControls.shoot ? "rgba(255,255,255,0.96)" : "rgba(255,255,255,0.58)";
      ctx.lineWidth = mobileControls.shoot ? 2.2 : 1.6;
      ctx.beginPath();
      ctx.moveTo(x - 12, y);
      ctx.lineTo(x - 4, y);
      ctx.moveTo(x + 4, y);
      ctx.lineTo(x + 12, y);
      ctx.moveTo(x, y - 12);
      ctx.lineTo(x, y - 4);
      ctx.moveTo(x, y + 4);
      ctx.lineTo(x, y + 12);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(x, y, 5.5, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    function drawMobileAimCursorWorld() {
      // 월드 좌표계에 과녁 그리기 (정방향 v2)
      let wx, wy;
      const isVIPERSniper = currentWeapon === 5 && playerChar && playerChar.id === 2;
      if (mobileControls.shoot && mobileControls.aimDeflection > 0) {
        const scopeMult = isVIPERSniper ? 2.5 : 1;
        const maxWorldRadius = Math.min(width, height) * 0.38 / camera.zoom * scopeMult;
        const dx = mobileControls.aimDirX;
        const dy = mobileControls.aimDirY;
        wx = player.x + dx * mobileControls.aimDeflection * maxWorldRadius;
        wy = player.y + dy * mobileControls.aimDeflection * maxWorldRadius;
      } else {
        wx = player.x;
        wy = player.y;
      }
      const z = camera.zoom;
      const lineLen = 12 / z;
      const gap = 4 / z;
      const r = 5.5 / z;
      ctx.save();
      ctx.globalCompositeOperation = "source-over";
      if (isVIPERSniper && mobileControls.shoot) {
        // 저격 스코프 — 밝은 초록 큰 원 + 십자선
        ctx.strokeStyle = "rgba(0,255,120,0.95)";
        ctx.lineWidth = 2.0 / z;
        const scopeR = 28 / z;
        ctx.beginPath(); ctx.arc(wx, wy, scopeR, 0, Math.PI * 2); ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(wx - scopeR, wy); ctx.lineTo(wx + scopeR, wy);
        ctx.moveTo(wx, wy - scopeR); ctx.lineTo(wx, wy + scopeR);
        ctx.stroke();
        // 중앙 작은 도트
        ctx.fillStyle = "rgba(0,255,120,0.9)";
        ctx.beginPath(); ctx.arc(wx, wy, 2.5 / z, 0, Math.PI * 2); ctx.fill();
      } else {
        ctx.strokeStyle = mobileControls.shoot ? "rgba(255,255,255,0.96)" : "rgba(255,255,255,0.58)";
        ctx.lineWidth = (mobileControls.shoot ? 2.2 : 1.6) / z;
        ctx.beginPath();
        ctx.moveTo(wx - lineLen, wy); ctx.lineTo(wx - gap, wy);
        ctx.moveTo(wx + gap, wy);    ctx.lineTo(wx + lineLen, wy);
        ctx.moveTo(wx, wy - lineLen); ctx.lineTo(wx, wy - gap);
        ctx.moveTo(wx, wy + gap);    ctx.lineTo(wx, wy + lineLen);
        ctx.stroke();
        ctx.beginPath(); ctx.arc(wx, wy, r, 0, Math.PI * 2); ctx.stroke();
      }
      ctx.restore();
    }

    function drawParticles() {
      for (const p of particles) {
        ctx.globalAlpha = Math.max(0, Math.min(1, p.life * 3));
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function drawOriginalFlashlightLayer() {
      const lp = lightSourcePlayer || player;
      const z = camera.zoom;
      const px = screenX(lp.x);
      const py = screenY(lp.y);
      const forward = { x: Math.cos(lp.angle), y: Math.sin(lp.angle) };
      const side = { x: -Math.sin(lp.angle), y: Math.cos(lp.angle) };

      // Ringed's original player scene places the main Light2D at (4.42135, -167.677)
      // with flashlight.png at scale 0.387037 and energy 1.3. Since this Canvas
      // build faces +X instead of Godot's -Y, the local offset is remapped to
      // forward/side coordinates while preserving the original numbers.
      const flickerT = (performance.now() % 300) / 300;
      const flickerPhase = flickerT < 0.666 ? flickerT / 0.666 : (1 - flickerT) / 0.334;
      const originalScalePulse = 1 - 0.1 * flickerPhase;
      const originalPosPulse = {
        x: 5.29622 + (4.38928 - 5.29622) * flickerPhase,
        y: 0.776039 + (-5.71774 - 0.776039) * flickerPhase
      };
      const healthEnergy = (lp.hp || 100) / 100;
      const mainEnergy = 0.98 * healthEnergy;
      const fillEnergy = 0.38 * healthEnergy;
      const beamCenter = {
        x: px + (forward.x * 167.677 + side.x * 4.42135 + side.x * originalPosPulse.x + forward.x * -originalPosPulse.y) * z,
        y: py + (forward.y * 167.677 + side.y * 4.42135 + side.y * originalPosPulse.x + forward.y * -originalPosPulse.y) * z
      };

      lightCtx.setTransform(scale, 0, 0, scale, 0, 0);
      lightCtx.clearRect(0, 0, width, height);
      lightCtx.globalCompositeOperation = "source-over";
      lightCtx.fillStyle = "rgba(0, 0, 0, 0.62)";
      lightCtx.fillRect(0, 0, width, height);

      lightCtx.globalCompositeOperation = "destination-out";
      drawInstalledLights(lightCtx);
      drawKillLights(lightCtx);
      drawBlastLights(lightCtx);
      drawRadialLight(lightCtx, px, py, 20 * z, 180 * z, fillEnergy * 1.0);
      drawSoftConeLight(lightCtx, px, py, lp.angle, 480 * z, 1.22, mainEnergy * 0.92);
      drawSoftConeLight(lightCtx, px + forward.x * 52 * z, py + forward.y * 52 * z, lp.angle, 340 * z, 0.9, mainEnergy * 0.42);
      drawLightTexture(lightCtx, assets.flashlight, beamCenter.x, beamCenter.y, lp.angle + Math.PI / 2, 1024 * 0.2 * originalScalePulse * z, 1024 * 0.2 * originalScalePulse * z, mainEnergy * 0.07);
      for (const flash of flashes) {
        const alpha = Math.max(0, flash.life / flash.maxLife);
        drawLightTexture(lightCtx, assets.shotLight, screenX(flash.x), screenY(flash.y), flash.angle + Math.PI / 2, 430 * z, 430 * z, alpha * 0.9);
      }
      for (const b of bullets) {
        drawLightTexture(lightCtx, assets.lightSmall, screenX(b.x), screenY(b.y), 0, 64 * z, 64 * z, 0.45);
      }
      for (const tb of taserBullets) {
        drawLightTexture(lightCtx, assets.lightSmall, screenX(tb.x), screenY(tb.y), 0, 80 * z, 80 * z, 0.5);
      }

      ctx.setTransform(scale, 0, 0, scale, 0, 0);
      ctx.drawImage(lightCanvas, 0, 0, width, height);
      drawVisibleKillBloom();
      drawVisibleBlastBloom();
      drawVisibleFizzles();
      ctx.save();
      ctx.setTransform(scale, 0, 0, scale, splitPanelOffsetX * scale, 0);
      ctx.scale(camera.zoom, camera.zoom);
      ctx.translate(-camera.x, -camera.y);
      drawFacility();
      ctx.restore();
      drawVisibleFlashlightGlow(px, py, beamCenter.x, beamCenter.y, lp.angle, mainEnergy);
    }

    function drawInstalledLights(target) {
      const boost = fixtureBoost;
      const z = camera.zoom;
      for (const f of fixtures) {
        const x = screenX(f.x);
        const y = screenY(f.y);
        const energy = f.energy * (1 + boost * 2.4);
        const radius = f.radius * (1 + boost * 0.42) * z;
        if (x < -radius || y < -radius || x > width + radius || y > height + radius) continue;
        drawRadialLight(target, x, y, 12 * z, radius, energy);
        drawSoftRectLight(target, x, y, f.angle, f.w * 1.35 * z, radius * 0.7, energy * 0.48);
      }
    }

    function drawKillLights(target) {
      for (const k of killLights) {
        const age = 1 - k.life / k.maxLife;
        const pulse = Math.sin((1 - age) * Math.PI);
        const radius = k.radius * (0.62 + age * 0.55);
        const energy = 1.75 * pulse;
        drawRadialLight(target, screenX(k.x), screenY(k.y), 18 * camera.zoom, radius * camera.zoom, energy);
        drawRadialLight(target, screenX(k.x), screenY(k.y), 4 * camera.zoom, radius * 0.42 * camera.zoom, energy * 1.15);
      }
    }

    function drawBlastLights(target) {
      for (const b of blastLights) {
        const age = 1 - b.life / b.maxLife;
        const pulse = Math.sin((1 - age) * Math.PI);
        const radius = b.radius * (0.72 + age * 0.35);
        const energy = 1.8 * pulse;
        drawOccludedRadialLight(target, b.x, b.y, radius, energy);
      }
    }

    function drawOccludedRadialLight(target, x, y, radius, energy) {
      const points = visibilityPoints(x, y, radius, 96);
      if (!points.length) return;
      target.save();
      target.beginPath();
      target.moveTo(screenX(points[0].x), screenY(points[0].y));
      for (let i = 1; i < points.length; i++) {
        target.lineTo(screenX(points[i].x), screenY(points[i].y));
      }
      target.closePath();
      target.clip();
      drawRadialLight(target, screenX(x), screenY(y), 10 * camera.zoom, radius * camera.zoom, energy);
      drawRadialLight(target, screenX(x), screenY(y), 3 * camera.zoom, radius * 0.38 * camera.zoom, energy * 1.1);
      target.restore();
    }

    function drawVisibleKillBloom() {
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      for (const k of killLights) {
        const age = 1 - k.life / k.maxLife;
        const pulse = Math.sin((1 - age) * Math.PI);
        const x = screenX(k.x);
        const y = screenY(k.y);
        const radius = k.radius * (0.45 + age * 0.55) * camera.zoom;
        const gradient = ctx.createRadialGradient(x, y, 6, x, y, radius);
        gradient.addColorStop(0, "rgba(255,255,255," + (0.72 * pulse) + ")");
        gradient.addColorStop(0.18, "rgba(255,232,215," + (0.42 * pulse) + ")");
        gradient.addColorStop(0.55, "rgba(255,180,145," + (0.16 * pulse) + ")");
        gradient.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
      ctx.globalCompositeOperation = "source-over";
    }

    function drawVisibleBlastBloom() {
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      for (const b of blastLights) {
        const age = 1 - b.life / b.maxLife;
        const pulse = Math.sin((1 - age) * Math.PI);
        const radius = b.radius * (0.58 + age * 0.28);
        const points = visibilityPoints(b.x, b.y, radius, 80);
        if (!points.length) continue;
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(screenX(points[0].x), screenY(points[0].y));
        for (let i = 1; i < points.length; i++) {
          ctx.lineTo(screenX(points[i].x), screenY(points[i].y));
        }
        ctx.closePath();
        ctx.clip();
        const x = screenX(b.x);
        const y = screenY(b.y);
        const sr = radius * camera.zoom;
        const gradient = ctx.createRadialGradient(x, y, 5 * camera.zoom, x, y, sr);
        gradient.addColorStop(0, "rgba(255,250,230," + (0.78 * pulse) + ")");
        gradient.addColorStop(0.24, "rgba(255,194,130," + (0.34 * pulse) + ")");
        gradient.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(x, y, sr, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
      ctx.restore();
      ctx.globalCompositeOperation = "source-over";
    }

    function drawVisibleFizzles() {
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      for (const f of fizzles) {
        const remain = Math.max(0, f.life / f.maxLife);
        const age = 1 - remain;
        const x = screenX(f.x);
        const y = screenY(f.y);
        const z = camera.zoom;

        const flash = Math.max(0, 1 - age * 9);
        const smoke = Math.sin(Math.min(1, age) * Math.PI) * remain;
        const flashGradient = ctx.createRadialGradient(x, y, 2 * z, x, y, 30 * z);
        flashGradient.addColorStop(0, "rgba(255,235,185," + (0.72 * flash) + ")");
        flashGradient.addColorStop(0.22, "rgba(255,150,80," + (0.34 * flash) + ")");
        flashGradient.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = flashGradient;
        ctx.beginPath();
        ctx.arc(x, y, 30 * z, 0, Math.PI * 2);
        ctx.fill();

        ctx.globalCompositeOperation = "source-over";
        ctx.strokeStyle = "rgba(180, 178, 170," + (0.36 * smoke) + ")";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(x, y, (8 + age * 14) * z, f.angle, f.angle + Math.PI * 1.25);
        ctx.stroke();
        ctx.strokeStyle = "rgba(40, 38, 36," + (0.22 * smoke) + ")";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(x, y, (12 + age * 18) * z, f.angle + 1.4, f.angle + Math.PI * 1.9);
        ctx.stroke();

        ctx.globalCompositeOperation = "lighter";
        ctx.strokeStyle = "rgba(255,205,120," + (0.8 * remain) + ")";
        ctx.lineWidth = 1.6;
        for (let i = 0; i < 6; i++) {
          const a = f.angle + i * 0.72 + age * 5;
          const inner = (7 + age * 8) * z;
          const outer = (16 + i * 1.2 + age * 8) * z;
          ctx.beginPath();
          ctx.moveTo(x + Math.cos(a) * inner, y + Math.sin(a) * inner);
          ctx.lineTo(x + Math.cos(a) * outer, y + Math.sin(a) * outer);
          ctx.stroke();
        }
      }
      ctx.restore();
      ctx.globalCompositeOperation = "source-over";
    }

    function drawSoftRectLight(target, x, y, angle, widthSize, length, energy) {
      target.save();
      target.translate(x, y);
      target.rotate(angle);
      const gradient = target.createRadialGradient(0, 0, 8, 0, 0, length);
      gradient.addColorStop(0, "rgba(0,0,0," + (0.56 * energy) + ")");
      gradient.addColorStop(0.28, "rgba(0,0,0," + (0.32 * energy) + ")");
      gradient.addColorStop(1, "rgba(0,0,0,0)");
      target.fillStyle = gradient;
      target.beginPath();
      target.ellipse(0, 0, widthSize, length * 0.62, 0, 0, Math.PI * 2);
      target.fill();
      target.restore();
    }

    function drawSoftConeLight(target, x, y, angle, length, halfAngle, energy) {
      for (let i = 0; i < 7; i++) {
        const t = i / 6;
        const spread = halfAngle * (0.35 + t * 0.95);
        const alpha = energy * (0.34 - t * 0.036);
        const len = length * (0.82 + t * 0.2);
        const end = { x: x + Math.cos(angle) * len, y: y + Math.sin(angle) * len };
        const left = { x: x + Math.cos(angle - spread) * len, y: y + Math.sin(angle - spread) * len };
        const right = { x: x + Math.cos(angle + spread) * len, y: y + Math.sin(angle + spread) * len };
        const gradient = target.createLinearGradient(x, y, end.x, end.y);
        gradient.addColorStop(0, "rgba(0,0,0," + alpha + ")");
        gradient.addColorStop(0.28, "rgba(0,0,0," + (alpha * 0.82) + ")");
        gradient.addColorStop(0.72, "rgba(0,0,0," + (alpha * 0.32) + ")");
        gradient.addColorStop(1, "rgba(0,0,0,0)");
        target.fillStyle = gradient;
        target.beginPath();
        target.moveTo(x, y);
        target.lineTo(left.x, left.y);
        target.quadraticCurveTo(end.x + Math.cos(angle) * 28, end.y + Math.sin(angle) * 28, right.x, right.y);
        target.closePath();
        target.fill();
      }
    }

    function drawRadialLight(target, x, y, inner, outer, energy) {
      const gradient = target.createRadialGradient(x, y, inner, x, y, outer);
      gradient.addColorStop(0, "rgba(0,0,0," + (0.92 * energy) + ")");
      gradient.addColorStop(0.24, "rgba(0,0,0," + (0.62 * energy) + ")");
      gradient.addColorStop(0.58, "rgba(0,0,0," + (0.22 * energy) + ")");
      gradient.addColorStop(1, "rgba(0,0,0,0)");
      target.fillStyle = gradient;
      target.beginPath();
      target.arc(x, y, outer, 0, Math.PI * 2);
      target.fill();
    }

    function drawVisibleFlashlightGlow(px, py, x, y, angle, energy) {
      const z = camera.zoom;
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      const body = ctx.createRadialGradient(px, py, 12 * z, px, py, 130 * z);
      body.addColorStop(0, "rgba(255,240,225," + (0.16 * energy) + ")");
      body.addColorStop(0.35, "rgba(205,220,235," + (0.07 * energy) + ")");
      body.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = body;
      ctx.beginPath();
      ctx.arc(px, py, 130 * z, 0, Math.PI * 2);
      ctx.fill();
      if (!assets.flashlight) {
        ctx.restore();
        return;
      }
      ctx.globalAlpha = 0.055 * energy;
      ctx.translate(x, y);
      ctx.rotate(angle + Math.PI / 2);
      const w = 1024 * 0.3 * z;
      ctx.drawImage(assets.flashlight, -w / 2, -w / 2, w, w);
      ctx.restore();
      ctx.globalCompositeOperation = "source-over";
      ctx.globalAlpha = 1;
    }

    function drawLightTexture(target, img, x, y, angle, w, h, alpha) {
      if (!img || alpha <= 0) return;
      target.save();
      target.globalAlpha = Math.max(0, Math.min(1, alpha));
      target.translate(x, y);
      target.rotate(angle);
      target.drawImage(img, -w / 2, -h / 2, w, h);
      target.restore();
      target.globalAlpha = 1;
    }

    function drawHud() {
      const now = performance.now() * 0.001;
      ctx.textAlign = "left";

      // HUD 패널 (각진 군사 스타일)
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(10, 10);
      ctx.lineTo(186, 10);
      ctx.lineTo(192, 16);
      ctx.lineTo(192, 100);
      ctx.lineTo(10, 100);
      ctx.closePath();
      ctx.fillStyle = "rgba(2,6,14,0.88)";
      ctx.fill();
      ctx.strokeStyle = "rgba(0,160,255,0.55)";
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.restore();

      // 스캔라인 애니메이션
      ctx.save();
      ctx.globalAlpha = 0.06;
      ctx.fillStyle = "#00c8ff";
      const scanY = 10 + ((now * 55) % 92);
      ctx.fillRect(11, scanY, 180, 2);
      ctx.restore();

      // HP 바
      const maxHp = gameMode === "teambattle" ? playerChar.tbHp : Math.round(100 * playerChar.hpMult);
      const hpRatio = Math.max(0, player.hp / maxHp);
      const hpColor = hpRatio > 0.5 ? "#22e870" : (hpRatio > 0.25 ? "#f0a020" : "#e83020");
      ctx.save();
      ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(22, 18, 138, 10);
      ctx.fillStyle = "#040c0a"; ctx.fillRect(23, 19, 136, 8);
      // HP 바 블록 스타일
      const hpW = Math.floor(hpRatio * 136);
      for (let hx = 0; hx < hpW; hx += 5) {
        ctx.fillStyle = hpColor;
        ctx.globalAlpha = 0.9 + Math.sin(now * 3 + hx * 0.1) * 0.08;
        ctx.fillRect(23 + hx, 19, Math.min(4, hpW - hx), 8);
      }
      ctx.globalAlpha = 1;
      ctx.strokeStyle = "rgba(0,200,255,0.3)"; ctx.lineWidth = 0.8;
      ctx.strokeRect(22, 18, 138, 10);
      ctx.fillStyle = hpColor; ctx.font = "bold 9px monospace";
      ctx.fillText("■ HP " + Math.ceil(player.hp) + "/" + maxHp, 22, 16);
      ctx.restore();

      // 스킬 에너지 바
      ctx.save();
      ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(22, 36, 138, 9);
      const skillColor = skillEnergy >= 1 ? "#ff60ff" : "#a040e0";
      const skillW = Math.floor(skillEnergy * 136);
      for (let sx = 0; sx < skillW; sx += 4) {
        const pulse = skillEnergy >= 1 ? (0.7 + Math.abs(Math.sin(now * 8 + sx * 0.15)) * 0.3) : 0.85;
        ctx.fillStyle = skillColor; ctx.globalAlpha = pulse;
        ctx.fillRect(23 + sx, 37, Math.min(3, skillW - sx), 7);
      }
      ctx.globalAlpha = 1;
      ctx.strokeStyle = "rgba(180,0,255,0.35)"; ctx.lineWidth = 0.8;
      ctx.strokeRect(22, 36, 138, 9);
      ctx.fillStyle = skillEnergy >= 1 ? "#ff80ff" : "#9060d0";
      ctx.font = "bold 9px monospace";
      ctx.fillText("◈ PWR " + Math.floor(skillEnergy * 100) + "%", 22, 34);
      ctx.restore();

      // 무기 표시
      const wColors = { 0:"#ffd060", 1:"#ff8040", 2:"#40d0ff", 3:"#ff6030", 4:"#e0c060", 5:"#80ff80", 6:"#ff9040" };
      const wNames = { 0:"RIFLE", 1:"SHOTGUN", 2:"TASER", 3:"BOMB", 4:"PISTOL", 5:"SNIPER", 6:"HEAVY PISTOL" };
      const wIcons = { 0:"▸", 1:"▸▸", 2:"⚡", 3:"◉", 4:"▸", 5:"▸▬", 6:"▸●" };
      ctx.fillStyle = wColors[currentWeapon] || "#ffd060";
      ctx.font = "bold 11px monospace";
      ctx.fillText((wIcons[currentWeapon] || "▸") + " " + (wNames[currentWeapon] || ""), 22, 58);

      // 탄약 / 재장전 표시
      ctx.font = "bold 9px monospace";
      let reloadT = 0, ammoNow = 0, ammoMax = 0;
      if (currentWeapon === 0) { reloadT = rifleReloadTimer; ammoNow = rifleAmmo; ammoMax = RIFLE_MAX_AMMO; }
      else if (currentWeapon === 1) { reloadT = shotgunReloadTimer; ammoNow = shotgunAmmo; ammoMax = SHOTGUN_MAX_AMMO; }
      else if (currentWeapon === 2) { reloadT = taserReloadTimer; ammoNow = taserAmmo; ammoMax = TASER_MAX_AMMO; }
      else if (currentWeapon === 4) { reloadT = pistolReloadTimer; ammoNow = pistolAmmo; ammoMax = PISTOL_MAX_AMMO; }
      else if (currentWeapon === 5) { reloadT = sniperReloadTimer; ammoNow = sniperAmmo; ammoMax = SNIPER_MAX_AMMO; }
      else if (currentWeapon === 6) { reloadT = heavyPistolReloadTimer; ammoNow = heavyPistolAmmo; ammoMax = HEAVY_PISTOL_MAX_AMMO; }
      if (currentWeapon !== 3) {
        if (reloadT > 0) {
          ctx.fillStyle = "#ff6060";
          ctx.fillText("RELOAD " + Math.ceil(reloadT * 10) / 10 + "s", 22, 70);
        } else {
          ctx.fillStyle = ammoNow <= Math.ceil(ammoMax * 0.3) ? "#ffaa40" : "#a8e0ff";
          ctx.fillText(ammoNow + "/" + ammoMax + " AMO", 22, 70);
        }
      }

      // 폭탄/C4 상태
      ctx.font = "bold 9px monospace";
      if (playerChar.bombType === "c4") {
        const c4Ready = bombCooldown <= 0;
        ctx.fillStyle = c4List.length > 0 ? "#ff6030" : (c4Ready ? "#60a8d0" : "rgba(100,120,160,0.7)");
        const c4Str = c4List.length > 0 ? `[Q]C4 SET[${c4List.length}/3] [F]BOOM` : `[Q]C4 ${c4Ready?"READY":"·"+Math.ceil(bombCooldown*10)/10+"s"}`;
        ctx.fillText(c4Str, 22, 82);
      } else {
        ctx.fillStyle = bombCooldown > 0 ? "rgba(100,120,160,0.7)" : "#60a8d0";
        ctx.fillText("[Q]BOMB " + (bombCooldown > 0 ? "·" + Math.ceil(bombCooldown * 10) / 10 + "s" : "READY"), 22, 82);
      }
      // 미사일 충전 인디케이터 (VIPER)
      if (missileCharging) {
        ctx.save();
        const chPct = Math.min(1, missileHoldTimer / 3.0);
        ctx.fillStyle = `rgba(0,180,255,${0.5+chPct*0.4})`;
        ctx.strokeStyle = "rgba(80,200,255,0.9)"; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(width/2, height/2, 30 + chPct*16, 0, Math.PI*2); ctx.stroke();
        ctx.fillStyle = "#80e8ff"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.font = `bold ${Math.round(13+chPct*6)}px monospace`;
        ctx.fillText(`MISSILE ${Math.round(chPct*100)}%`, width/2, height/2 + 55);
        ctx.restore();
      }

      // HUD 코너 장식
      ctx.strokeStyle = "rgba(0,180,255,0.5)"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(10, 22); ctx.lineTo(10, 10); ctx.lineTo(22, 10); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(10, 98); ctx.lineTo(10, 100); ctx.lineTo(22, 100); ctx.stroke();

      // Wave / Kill 표시 (클래식 모드만)
      if (gameMode!=="teambattle") {
        ctx.fillStyle = "rgba(0,120,200,0.7)"; ctx.font = "bold 9px monospace";
        ctx.textAlign = "right";
        ctx.fillText("WAVE " + wave, 192, 96);
      }
      ctx.textAlign = "left";
      // 정지 시 개틀링 충전 인디케이터
      if (stationaryTimer > 0 && stationaryTimer < 1.0 && !autoGatling && !skillActive) {
        const cx = player.x * camera.zoom - camera.x * camera.zoom + (camera.x > 0 ? 0 : 0);
        // 화면 좌표는 카메라 변환 적용 후
        const prog = stationaryTimer / 1.0;
        const sx = width / 2, sy = height - 38;
        ctx.save();
        ctx.globalAlpha = 0.7;
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.fillRect(sx - 48, sy, 96, 10);
        ctx.fillStyle = "#60d0ff";
        ctx.fillRect(sx - 48, sy, 96 * prog, 10);
        ctx.fillStyle = "#c8f0ff";
        ctx.font = "bold 9px Arial";
        ctx.textAlign = "center";
        ctx.fillText("GATLING READY", sx, sy + 8);
        ctx.restore();
      }
      if (autoGatling && !skillActive) {
        ctx.save();
        ctx.fillStyle = "rgba(0,180,255,0.18)";
        ctx.fillRect(0, 0, width, height);
        ctx.globalAlpha = 0.85;
        ctx.fillStyle = "#60d0ff";
        ctx.font = "bold 13px Arial";
        ctx.textAlign = "center";
        ctx.fillText("⚡ AUTO GATLING", width / 2, height - 22);
        ctx.restore();
      }
      drawGameMenuButton();
      drawSpecialForcesToggle();
      drawCameraButtons();
      drawMinimap();
      if (skillEnergy >= 1 && !skillActive) drawSkillButton();
    }

    function drawMinimap() {
      const mw = 110, mh = 80;
      const mx = width - mw - 12, my = 12;
      const scaleX = mw / world.w, scaleY = mh / world.h;
      ctx.save();
      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.strokeStyle = "rgba(255,255,255,0.22)";
      ctx.lineWidth = 1;
      ctx.fillRect(mx, my, mw, mh);
      ctx.strokeRect(mx, my, mw, mh);
      ctx.fillStyle = "rgba(80,90,100,0.5)";
      for (const w of walls) {
        ctx.fillRect(mx + w.x * scaleX, my + w.y * scaleY, Math.max(1, w.w * scaleX), Math.max(1, w.h * scaleY));
      }
      ctx.fillStyle = "rgba(220,50,50,0.9)";
      for (const e of enemies) {
        const ex = mx + e.x * scaleX, ey = my + e.y * scaleY;
        ctx.fillRect(ex - 1.5, ey - 1.5, 3, 3);
      }
      ctx.fillStyle = "#f1d477";
      const px2 = mx + player.x * scaleX, py2 = my + player.y * scaleY;
      ctx.beginPath();
      ctx.arc(px2, py2, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawSkillButton() {
      const now = performance.now() * 0.001;
      const bx = width / 2 - 44, by = height - 62;
      const bw = 88, bh = 42;
      ctx.save();
      // 발광 헤일로
      const pulse = 0.5 + Math.abs(Math.sin(now * 4)) * 0.5;
      ctx.globalAlpha = pulse * 0.3;
      ctx.fillStyle = "#ff40ff";
      ctx.beginPath(); ctx.arc(bx + bw / 2, by + bh / 2, 40, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;
      // 버튼 패널
      ctx.fillStyle = `rgba(60,0,80,0.9)`;
      ctx.beginPath();
      ctx.moveTo(bx + 8, by); ctx.lineTo(bx + bw - 8, by);
      ctx.lineTo(bx + bw, by + 8); ctx.lineTo(bx + bw, by + bh - 8);
      ctx.lineTo(bx + bw - 8, by + bh); ctx.lineTo(bx + 8, by + bh);
      ctx.lineTo(bx, by + bh - 8); ctx.lineTo(bx, by + 8); ctx.closePath();
      ctx.fill();
      // 테두리 (펄스)
      const bc = `rgba(220,60,255,${0.7 + pulse * 0.3})`;
      ctx.strokeStyle = bc; ctx.lineWidth = 2;
      ctx.stroke();
      // 내부 에너지 패턴
      ctx.save(); ctx.globalAlpha = 0.4;
      const eg = ctx.createLinearGradient(bx, by, bx + bw, by + bh);
      eg.addColorStop(0, "#ff00ff"); eg.addColorStop(1, "#8800ff");
      ctx.fillStyle = eg;
      ctx.beginPath(); ctx.arc(bx + bw / 2, by + bh / 2, 14, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
      // 텍스트
      ctx.fillStyle = "#ffffff";
      ctx.font = "bold 13px monospace";
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.shadowColor = "#ff00ff"; ctx.shadowBlur = 8;
      ctx.fillText("⚡ SKILL", bx + bw / 2, by + bh / 2);
      ctx.shadowBlur = 0;
      ctx.restore();
    }

    function gameMenuButtonRect() {
      return { x: Math.max(16, width - 86), y: 58, w: 70, h: 34 };
    }

    function handleGameMenuButtonClick(x, y) {
      const rect = gameMenuButtonRect();
      if (x >= rect.x && x <= rect.x + rect.w && y >= rect.y && y <= rect.y + rect.h) {
        goMainMenu();
        return true;
      }
      return false;
    }

    function drawGameMenuButton() {
      drawMenuButton(gameMenuButtonRect(), "MAIN", false);
    }

    function specialForcesToggleRect() {
      return { x: 30, y: 108, w: 186, h: 30 };
    }

    function handleSkillButtonClick(x, y) {
      if (skillEnergy < 1 || skillActive || missileCharging) return false;
      const bx = width / 2 - 36, by = height - 58;
      if (x >= bx && x <= bx + 72 && y >= by && y <= by + 36) {
        activateSkill();
        return true;
      }
      return false;
    }

    function handleSpecialForcesToggleClick(x, y) {
      const rect = specialForcesToggleRect();
      if (x >= rect.x && x <= rect.x + rect.w && y >= rect.y && y <= rect.y + rect.h) {
        specialForcesEnabled = !specialForcesEnabled;
        idleRaidTimer = 0;
        idleRaidWarned = false;
        lastIdleX = player.x;
        lastIdleY = player.y;
        return true;
      }
      return false;
    }

    function drawSpecialForcesToggle() {
      return;
      const rect = specialForcesToggleRect();
      ctx.save();
      ctx.fillStyle = "rgba(0,0,0,0.42)";
      ctx.strokeStyle = "rgba(255,255,255,0.24)";
      ctx.lineWidth = 1.4;
      roundRect(rect.x, rect.y, rect.w, rect.h, 6);
      ctx.fill();
      ctx.stroke();
      ctx.strokeStyle = specialForcesEnabled ? "#f2d28c" : "#9aa1aa";
      ctx.strokeRect(rect.x + 9, rect.y + 8, 14, 14);
      if (specialForcesEnabled) {
        ctx.strokeStyle = "#f2d28c";
        ctx.lineWidth = 2.3;
        ctx.beginPath();
        ctx.moveTo(rect.x + 12, rect.y + 15);
        ctx.lineTo(rect.x + 16, rect.y + 19);
        ctx.lineTo(rect.x + 24, rect.y + 9);
        ctx.stroke();
      }
      ctx.fillStyle = "#e7decf";
      ctx.font = "700 12px Arial";
      ctx.textAlign = "left";
      ctx.textBaseline = "middle";
      ctx.fillText("SPECIAL FORCES", rect.x + 32, rect.y + rect.h / 2 + 1);
      ctx.restore();
    }

    function mobileButtonRects() {
      const base = Math.min(66, Math.max(54, width * 0.12));
      const gap = Math.max(12, base * 0.18);
      const safeRight = 22;
      const attackRBase = Math.min(70, Math.max(62, width * 0.126));
      const attackR = (playerChar && playerChar.id === 1) ? attackRBase * 0.8 : attackRBase;
      const attackY = height - 112;
      const actionX = width - safeRight - base;
      const weaponNames = { 0:"소총", 1:"산탄총", 2:"마취총", 4:"권총", 5:"저격총", 6:"대구경" };
      const bombLabel = playerChar.bombType === "c4"
        ? (c4List.length > 0 ? `C4 [${c4List.length}]` : "C4")
        : (currentWeapon === 3 ? "BOMB ON" : "BOMB");
      return {
        stick: { x: 88, y: height - 112, r: 58 },
        attack: { x: width - 88, y: attackY, r: attackR },
        bomb: { id: "bomb", label: bombLabel, x: actionX, y: attackY - attackR - gap - base, w: base, h: base },
        detonate: { id: "detonate", label: "BOOM!", x: actionX - base - gap, y: attackY - attackR - gap * 2 - base * 2, w: base, h: base },
        dodge: { id: "dodge", label: "DASH", x: actionX, y: attackY - attackR - gap * 2 - base * 2, w: base, h: base },
        swap: { id: "swap", label: weaponNames[currentWeapon] || "SWAP", x: actionX - base - gap, y: attackY - attackR - gap - base, w: base, h: base }
      };
    }

    function drawP2StatusHud() {
      const p2Obj = (mp.role === "host" && player2) ? player2 : (mp.role === "client" && remotePlayer ? remotePlayer : null);
      if (!p2Obj) return;
      const hp = Math.max(0, p2Obj.hp || 0);
      const hpRatio = hp / 100;
      const hpColor = hpRatio > 0.5 ? "#22e870" : (hpRatio > 0.25 ? "#f0a020" : "#e83020");
      const now = performance.now() * 0.001;
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(10, 10);
      ctx.lineTo(156, 10);
      ctx.lineTo(162, 16);
      ctx.lineTo(162, 54);
      ctx.lineTo(10, 54);
      ctx.closePath();
      ctx.fillStyle = "rgba(2,6,14,0.88)";
      ctx.fill();
      ctx.strokeStyle = "rgba(80,160,255,0.55)";
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.restore();
      ctx.save();
      ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(22, 18, 118, 8);
      ctx.fillStyle = "#040c0a"; ctx.fillRect(23, 19, 116, 6);
      const hpW = Math.floor(hpRatio * 116);
      for (let hx = 0; hx < hpW; hx += 5) {
        ctx.fillStyle = hpColor;
        ctx.globalAlpha = 0.9 + Math.sin(now * 3 + hx * 0.1) * 0.08;
        ctx.fillRect(23 + hx, 19, Math.min(4, hpW - hx), 6);
      }
      ctx.globalAlpha = 1;
      ctx.strokeStyle = "rgba(0,200,255,0.3)"; ctx.lineWidth = 0.8;
      ctx.strokeRect(22, 18, 118, 8);
      ctx.fillStyle = hpColor; ctx.font = "bold 9px monospace";
      ctx.fillText("■ HP " + Math.ceil(hp) + "%", 22, 16);
      ctx.restore();
      ctx.fillStyle = "rgba(80,200,255,0.85)";
      ctx.font = "bold 9px monospace";
      ctx.fillText("◈ 2P MARINE", 22, 42);
    }

    function drawMobileControls() {
      const rects = mobileButtonRects();
      ctx.save();
      ctx.globalAlpha = 0.88;
      ctx.lineWidth = 2;
      ctx.strokeStyle = "rgba(255,255,255,0.35)";
      ctx.fillStyle = "rgba(0,0,0,0.42)";
      ctx.beginPath();
      ctx.arc(rects.stick.x, rects.stick.y, rects.stick.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = "rgba(230,235,238,0.28)";
      ctx.beginPath();
      ctx.arc(rects.stick.x + mobileControls.knobX, rects.stick.y + mobileControls.knobY, 24, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      const isFiring = mobileControls.aimAtEdge && currentWeapon === 0;
      const isAiming = mobileControls.shoot;
      ctx.fillStyle = "rgba(0,0,0,0.42)";
      ctx.strokeStyle = isFiring ? "rgba(255,90,60,0.96)" : (isAiming ? "rgba(255,210,190,0.86)" : "rgba(255,255,255,0.35)");
      ctx.lineWidth = isFiring ? 2.8 : 2;
      ctx.beginPath();
      ctx.arc(rects.attack.x, rects.attack.y, rects.attack.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.lineWidth = 2;
      ctx.fillStyle = isFiring ? "rgba(255,80,40,0.6)" : (isAiming ? "rgba(255,120,90,0.42)" : "rgba(230,235,238,0.24)");
      ctx.beginPath();
      ctx.arc(rects.attack.x + mobileControls.aimKnobX, rects.attack.y + mobileControls.aimKnobY, 24, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = isFiring ? "#ff9977" : (isAiming ? "#ffd5c5" : "#d8dde5");
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = "800 12px Arial";
      ctx.fillText("AIM", rects.attack.x, rects.attack.y - rects.attack.r - 12);
      drawMobileButton(rects.bomb, bombCooldown <= 0);
      if (playerChar.bombType === "c4" && c4List.length > 0) {
        // C4 기폭 버튼 — 빨간 강조
        const dr = rects.detonate;
        ctx.fillStyle = `rgba(200,30,20,${0.6 + Math.abs(Math.sin(performance.now()*0.006))*0.35})`;
        ctx.strokeStyle = "rgba(255,80,40,0.9)";
        roundRect(dr.x, dr.y, dr.w, dr.h, 12); ctx.fill(); ctx.stroke();
        ctx.fillStyle = "#fff"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.font = "800 11px Arial"; ctx.fillText("DETONATE", dr.x + dr.w/2, dr.y + dr.h/2);
      }
      drawMobileButton(rects.dodge, player.stamina > 25);
      drawMobileButton(rects.swap, true);
      // 미사일 충전 인디케이터 (VIPER)
      if (missileCharging) {
        ctx.save();
        const chPct = Math.min(1, missileHoldTimer / 3.0);
        ctx.fillStyle = `rgba(40,160,255,${0.5 + chPct*0.4})`;
        ctx.strokeStyle = "rgba(80,200,255,0.9)";
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(width/2, height/2, 28 + chPct*14, 0, Math.PI*2); ctx.stroke();
        ctx.fillStyle = "#80e8ff"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.font = `bold ${Math.round(12+chPct*6)}px monospace`;
        ctx.fillText(`MISSILE ${Math.round(chPct*100)}%`, width/2, height/2 + 50);
        ctx.restore();
      }
      ctx.restore();
    }

    function drawMobileButton(rect, active) {
      ctx.fillStyle = active ? "rgba(230,238,245,0.78)" : "rgba(0,0,0,0.42)";
      ctx.strokeStyle = active ? "rgba(255,255,255,0.86)" : "rgba(255,255,255,0.28)";
      roundRect(rect.x, rect.y, rect.w, rect.h, 12);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = active ? "#11161b" : "#d8dde5";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = "800 12px Arial";
      ctx.fillText(rect.label, rect.x + rect.w / 2, rect.y + rect.h / 2 + 1);
    }

    function cameraButtonRects() {
      const x = Math.min(width - 142, 292);
      const y = 16;
      return [
        { mode: 1, x, y, w: 62, h: 34 },
        { mode: 2, x: x + 66, y, w: 62, h: 34 }
      ];
    }

    function handleCameraButtonClick(x, y) {
      for (const rect of cameraButtonRects()) {
        if (x >= rect.x && x <= rect.x + rect.w && y >= rect.y && y <= rect.y + rect.h) {
          cameraMode = rect.mode;
          return true;
        }
      }
      return false;
    }

    function drawCameraButtons() {
      return;
      const rects = cameraButtonRects();
      ctx.save();
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = "700 13px Arial";
      for (const rect of rects) {
        const active = cameraMode === rect.mode;
        ctx.fillStyle = active ? "rgba(224, 238, 255, 0.88)" : "rgba(0, 0, 0, 0.52)";
        ctx.strokeStyle = active ? "rgba(255,255,255,0.9)" : "rgba(255,255,255,0.24)";
        ctx.lineWidth = 1.5;
        roundRect(rect.x, rect.y, rect.w, rect.h, 7);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = active ? "#10151b" : "#d8dde5";
        ctx.fillText("CAM " + rect.mode, rect.x + rect.w / 2, rect.y + rect.h / 2 + 1);
      }
      ctx.restore();
    }

    function drawDeath() {
      const now = performance.now() * 0.001;
      // 어두운 오버레이
      ctx.fillStyle = "rgba(0,0,0,0.72)";
      ctx.fillRect(0, 0, width, height);

      // 빨간 비상 글로우
      const redGlow = ctx.createRadialGradient(width / 2, height / 2, 0, width / 2, height / 2, width * 0.7);
      redGlow.addColorStop(0, "rgba(200,0,0,0.18)");
      redGlow.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = redGlow; ctx.fillRect(0, 0, width, height);

      // 경고 스캔라인
      ctx.save(); ctx.globalAlpha = 0.06;
      ctx.fillStyle = "#ff0000";
      for (let sl = 0; sl < height; sl += 2) ctx.fillRect(0, sl, width, 1);
      ctx.restore();

      // 글리치 효과 (노이즈 블록)
      ctx.save(); ctx.globalAlpha = 0.12;
      for (let g = 0; g < 5; g++) {
        const gx = Math.sin(now * 10 + g * 2.1) * width * 0.4 + width * 0.5;
        const gy = Math.cos(now * 8 + g * 1.7) * height * 0.3 + height * 0.5;
        ctx.fillStyle = g % 2 === 0 ? "#ff0000" : "#ffffff";
        ctx.fillRect(gx, gy, 120 + g * 18, 4);
      }
      ctx.restore();

      // 패널 배경
      const pw = Math.min(440, width * 0.65), ph = 180;
      const px = (width - pw) / 2, py = height / 2 - ph / 2;
      ctx.save();
      ctx.fillStyle = "rgba(10,2,2,0.9)";
      ctx.strokeStyle = "rgba(220,30,30,0.8)"; ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(px + 12, py); ctx.lineTo(px + pw - 12, py);
      ctx.lineTo(px + pw, py + 12); ctx.lineTo(px + pw, py + ph - 12);
      ctx.lineTo(px + pw - 12, py + ph); ctx.lineTo(px + 12, py + ph);
      ctx.lineTo(px, py + ph - 12); ctx.lineTo(px, py + 12); ctx.closePath();
      ctx.fill(); ctx.stroke();
      // 패널 상단 빨간 바
      ctx.fillStyle = "rgba(200,20,20,0.8)";
      ctx.fillRect(px + 12, py, pw - 24, 3);
      ctx.restore();

      // MISSION FAILED
      ctx.textAlign = "center";
      const flashAlpha = 0.8 + Math.abs(Math.sin(now * 3)) * 0.2;
      ctx.save(); ctx.globalAlpha = flashAlpha;
      ctx.fillStyle = "#ff2020";
      ctx.font = "900 42px Arial";
      ctx.shadowColor = "#ff0000"; ctx.shadowBlur = 20;
      ctx.fillText("MISSION FAILED", width / 2, py + 55);
      ctx.shadowBlur = 0; ctx.restore();

      // 구분선
      ctx.strokeStyle = "rgba(200,30,30,0.5)"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(px + 30, py + 70); ctx.lineTo(px + pw - 30, py + 70); ctx.stroke();

      // 통계
      ctx.fillStyle = "#a0b8c8"; ctx.font = "bold 13px monospace";
      ctx.fillText("KILLS: " + kills + "   |   WAVE: " + wave, width / 2, py + 96);

      // 재시작
      const blinkA = 0.5 + Math.abs(Math.sin(now * 2.5)) * 0.5;
      ctx.save(); ctx.globalAlpha = blinkA;
      ctx.fillStyle = "#60c0d8"; ctx.font = "bold 13px monospace";
      ctx.fillText("[ TAP / CLICK TO REDEPLOY ]", width / 2, py + 140);
      ctx.restore();

      // 코너 디테일
      ctx.strokeStyle = "rgba(180,30,30,0.6)"; ctx.lineWidth = 1.5;
      [[px+2,py+2],[px+pw-2,py+2],[px+2,py+ph-2],[px+pw-2,py+ph-2]].forEach(([bx,by],i) => {
        const sx = i%2===0?1:-1, sy = i<2?1:-1;
        ctx.beginPath(); ctx.moveTo(bx+sx*14,by); ctx.lineTo(bx,by); ctx.lineTo(bx,by+sy*14); ctx.stroke();
      });
    }

    function handleTouchStart(event) {
      if (!isMobile) return;
      event.preventDefault();
      ensureAudio();
      updateTouchPositions(event);
      for (const touch of event.changedTouches) {
        const p = touchPoint(touch);
        if (state === "intro") {
          startIntroSequence();
          return;
        }
        if (state === "menu") {
          if (handleMenuClick(p.x, p.y)) return;
          charSelectPhase = 0; p1CharIdx = -1; p2CharIdx = -1; state = "charselect";
          return;
        }
        if (state === "charselect") {
          handleCharSelectClick(p.x, p.y);
          return;
        }
        if (state === "teamselect") {
          handleTeamSelectClick(p.x, p.y);
          return;
        }
        if (state === "play" && teamBattleWon !== null) { gameMode = "classic"; goMainMenu(); return; }
        if (state === "dead") {
          startGame();
          return;
        }
        if (state === "lobby") {
          handleLobbyClick(p.x, p.y);
          return;
        }
      if (state !== "play") continue;
      const action = mobileActionAt(p.x, p.y);
        if (action === "bomb") {
          if (playerChar.bombType === "c4") {
            throwBomb(isMobile ? { x: player.x + mobileControls.aimDirX * 140, y: player.y + mobileControls.aimDirY * 140 } : aimTarget);
          } else {
            currentWeapon = 3;
          }
        } else if (action === "detonate") {
          detonateC4();
        } else if (action === "dodge") {
          mobileControls.dodge = true;
        } else if (action === "swap") {
          mobileControls.swap = true;
        } else if (handleSkillButtonClick(p.x, p.y)) {
          return;
        } else if (handleGameMenuButtonClick(p.x, p.y)) {
          return;
        } else if (handleSpecialForcesToggleClick(p.x, p.y)) {
          return;
        } else if (p.x < width * 0.46 && mobileControls.moveId === null) {
          mobileControls.moveId = touch.identifier;
          updateMobileStick(p.x, p.y);
        } else if (p.x > width * 0.54 && mobileControls.aimId === null) {
          mobileControls.aimId = touch.identifier;
          mobileControls.shoot = true;
          mobileControls.aimAnchorX = p.x;
          mobileControls.aimAnchorY = p.y;
          mobileControls.aimAtEdge = false;
          mobileControls.aimDeflection = 0;
          updateMobileAttackStick(p.x, p.y, true);
        }
      }
    }

    function handleTouchMove(event) {
      if (!isMobile) return;
      event.preventDefault();
      updateTouchPositions(event);
    }

    function handleTouchEnd(event) {
      if (!isMobile) return;
      event.preventDefault();
      for (const touch of event.changedTouches) {
        if (touch.identifier === mobileControls.moveId) {
          mobileControls.moveId = null;
          mobileControls.moveX = 0;
          mobileControls.moveY = 0;
          mobileControls.knobX = 0;
          mobileControls.knobY = 0;
        }
        if (touch.identifier === mobileControls.aimId) mobileControls.aimId = null;
      }
      if (mobileControls.aimId === null) {
        // 저격총 (VIPER weapon 5): AIM 손 뗄 때 발사
        if (currentWeapon === 5 && playerChar && playerChar.id === 2 && state === "play" && sniperAimReady) {
          fireSniperAt(sniperAimTx, sniperAimTy);
          sniperAimReady = false;
        }
        // 폭탄 무기: AIM 손 뗄 때 투척
        if (currentWeapon === 3 && mobileControls.shoot && mobileControls.aimDeflection > 0 && bombCooldown <= 0 && !skillActive && state === "play") {
          const maxWorldRadius = Math.min(width, height) * 0.38 / camera.zoom;
          throwBomb({
            x: player.x + mobileControls.aimDirX * mobileControls.aimDeflection * maxWorldRadius,
            y: player.y + mobileControls.aimDirY * mobileControls.aimDeflection * maxWorldRadius
          });
        }
        mobileControls.shoot = false;
        mobileControls.aimAtEdge = false;
        mobileControls.aimAnchorX = 0;
        mobileControls.aimAnchorY = 0;
        mobileControls.aimScreenX = 0;
        mobileControls.aimScreenY = 0;
        mobileControls.aimKnobX = 0;
        mobileControls.aimKnobY = 0;
        mobileControls.aimTouchX = 0;
        mobileControls.aimTouchY = 0;
        mobileControls.aimDeflection = 0;
      }
    }

    function updateTouchPositions(event) {
      for (const touch of event.touches) {
        const p = touchPoint(touch);
        if (touch.identifier === mobileControls.moveId) {
          updateMobileStick(p.x, p.y);
        } else if (touch.identifier === mobileControls.aimId) {
          updateMobileAttackStick(p.x, p.y, false);
        }
      }
    }

    function touchPoint(touch) {
      const rect = canvas.getBoundingClientRect();
      return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
    }

    function updateMobileStick(x, y) {
      const stick = mobileButtonRects().stick;
      const dx = x - stick.x;
      const dy = y - stick.y;
      const d = Math.hypot(dx, dy) || 1;
      const limit = stick.r * 0.72;
      const amount = Math.min(1, d / limit);
      mobileControls.moveX = (dx / d) * amount;
      mobileControls.moveY = (dy / d) * amount;
      mobileControls.knobX = (dx / d) * Math.min(limit, d);
      mobileControls.knobY = (dy / d) * Math.min(limit, d);
    }

    function updateMobileAttackStick(x, y, force) {
      const stick = mobileButtonRects().attack;
      const anchorDx = x - mobileControls.aimAnchorX;
      const anchorDy = y - mobileControls.aimAnchorY;
      const dragDist = Math.hypot(anchorDx, anchorDy);
      const maxDrag = stick.r;
      // 데드존: 15px 미만 드래그는 과녁 안 움직임 (터치 초기 손떨림 방지)
      const DEAD = 15;
      const dirX = dragDist < DEAD ? Math.cos(player.angle || 0) : anchorDx / dragDist;
      const dirY = dragDist < DEAD ? Math.sin(player.angle || 0) : anchorDy / dragDist;
      const deflection = dragDist < DEAD ? 0 : Math.min(1, (dragDist - DEAD) / (maxDrag - DEAD));

      mobileControls.aimKnobX = (dragDist < DEAD ? 0 : dirX) * Math.min(maxDrag * 0.72, dragDist);
      mobileControls.aimKnobY = (dragDist < DEAD ? 0 : dirY) * Math.min(maxDrag * 0.72, dragDist);
      mobileControls.aimDirX = dirX;
      mobileControls.aimDirY = dirY;
      mobileControls.aimDeflection = deflection;
      calcAimScreenPos();

      mobileControls.aimTouchX = x;
      mobileControls.aimTouchY = y;
      mobileControls.aimAtEdge = (dragDist >= maxDrag * 0.72);

      // VIPER 저격총: 조준 중 목표 위치 실시간 저장
      if (currentWeapon === 5 && playerChar && playerChar.id === 2 && deflection > 0) {
        const maxWorldRadius = Math.min(width, height) * 0.38 / camera.zoom * 2.5;
        sniperAimTx = player.x + dirX * deflection * maxWorldRadius;
        sniperAimTy = player.y + dirY * deflection * maxWorldRadius;
        sniperAimReady = true;
      }
    }

    function calcAimScreenPos() {
      const maxAimDist = Math.min(width, height) * 0.38;
      const px = screenX(player.x);
      const py = screenY(player.y);
      const d = mobileControls.aimDeflection;
      mobileControls.aimScreenX = clamp(px + mobileControls.aimDirX * d * maxAimDist, 18, width - 18);
      mobileControls.aimScreenY = clamp(py + mobileControls.aimDirY * d * maxAimDist, 18, height - 18);
      syncMobileAimWorld();
    }

    function mobileActionAt(x, y) {
      const rects = mobileButtonRects();
      for (const key of ["bomb", "detonate", "dodge", "swap"]) {
        const rect = rects[key];
        if (rect && x >= rect.x && x <= rect.x + rect.w && y >= rect.y && y <= rect.y + rect.h) return key;
      }
      return null;
    }

    function updateMobileAim(mx, my) {
      if (mobileControls.aimId !== null) return;
      let nearest = null;
      let best = Infinity;
      for (const enemy of enemies) {
        const d = dist2(player.x, player.y, enemy.x, enemy.y);
        if (d < best && d < 560 * 560 && hasLineOfSight(player.x, player.y, enemy.x, enemy.y, Math.sqrt(d))) {
          best = d;
          nearest = enemy;
        }
      }
      if (nearest) {
        mobileControls.aimX = nearest.x;
        mobileControls.aimY = nearest.y;
        return;
      }
      if (Math.hypot(mx, my) > 0.1) {
        mobileControls.aimX = player.x + mx * 260;
        mobileControls.aimY = player.y + my * 260;
      } else {
        mobileControls.aimX = player.x + Math.cos(player.angle || 0) * 260;
        mobileControls.aimY = player.y + Math.sin(player.angle || 0) * 260;
      }
    }

    function fitMapToolCamera() {
      const zoom = Math.min(width / world.w, (height - 92) / world.h) * 0.94;
      camera.zoom = clamp(zoom, 0.18, 0.5);
      camera.x = world.w / 2 - width / camera.zoom / 2;
      camera.y = world.h / 2 - height / camera.zoom / 2 + 120;
    }

    function mapToolButtons() {
      const labels = [
        ["wall", "WALL"],
        ["doorH", "DOOR H"],
        ["doorV", "DOOR V"],
        ["fixture", "LIGHT"],
        ["crate", "BOX"],
        ["rock", "ROCK"],
        ["erase", "ERASE"],
        ["save", "SAVE"],
        // Static GitHub Pages builds cannot send email directly, so keep this disabled.
        // ["email", "EMAIL"],
        ["play", "PLAY"],
        ["reset", "RESET"],
        ["menu", "MENU"]
      ];
      const buttons = [];
      let x = 12;
      let y = 12;
      for (const [id, label] of labels) {
        const w = id === "fixture" || id === "doorH" || id === "doorV" ? 66 : 56;
        if (x + w > width - 12) {
          x = 12;
          y += 40;
        }
        buttons.push({ id, label, x, y, w, h: 32 });
        x += w + 8;
      }
      return buttons;
    }

    function drawMapTool() {
      fitMapToolCamera();
      ctx.save();
      ctx.fillStyle = "#111419";
      ctx.fillRect(0, 0, width, height);
      ctx.scale(camera.zoom, camera.zoom);
      ctx.translate(-camera.x, -camera.y);
      drawGround();
      drawEditorGrid();
      drawFacility();
      drawProps();
      drawFixtureBodies();
      drawMapToolPreview();
      ctx.restore();
      drawMapToolUi();
    }

    function drawEditorGrid() {
      ctx.save();
      ctx.strokeStyle = "rgba(255,255,255,0.045)";
      ctx.lineWidth = 1;
      for (let x = 0; x <= world.w; x += mapTool.grid) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, world.h);
        ctx.stroke();
      }
      for (let y = 0; y <= world.h; y += mapTool.grid) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(world.w, y);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawMapToolUi() {
      ctx.save();
      ctx.fillStyle = "rgba(0,0,0,0.62)";
      ctx.fillRect(0, 0, width, 90);
      for (const button of mapToolButtons()) {
        const active = mapTool.tool === button.id;
        drawMenuButton(button, button.label, active);
      }
      ctx.textAlign = "left";
      ctx.textBaseline = "top";
      ctx.font = "700 12px Arial";
      ctx.fillStyle = "#d7dddf";
      const saved = loadSavedMap() ? "CUSTOM MAP ACTIVE" : "DEFAULT MAP";
      ctx.fillText(saved + "  |  " + mapTool.status, 14, 74);
      ctx.restore();
    }

    function drawMapToolPreview() {
      const preview = mapTool.preview;
      if (!preview) return;
      ctx.save();
      ctx.globalAlpha = 0.62;
      ctx.fillStyle = preview.type === "fixture" ? "#fff0bd" : (preview.type === "door" ? "#86d7ff" : "#dbe2ea");
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 2;
      if (preview.type === "prop") {
        ctx.translate(preview.x, preview.y);
        ctx.rotate(preview.a || 0);
        drawCrateFallback(48 * preview.s);
      } else {
        ctx.fillRect(preview.x, preview.y, preview.w, preview.h);
        ctx.strokeRect(preview.x, preview.y, preview.w, preview.h);
      }
      ctx.restore();
    }

    function handleMapToolKey(event) {
      if (event.code === "Escape") {
        state = "menu";
        return;
      }
      if (event.code === "Enter") {
        saveCurrentMap();
        startGame();
        return;
      }
      const map = {
        Digit1: "wall",
        Digit2: "doorH",
        Digit3: "doorV",
        Digit4: "fixture",
        Digit5: "crate",
        Digit6: "rock",
        Backspace: "erase",
        Delete: "erase"
      };
      if (map[event.code]) mapTool.tool = map[event.code];
    }

    function handleMapToolMouseDown(event) {
      if (handleMapToolButtonClick(mouse.x, mouse.y)) return;
      const worldPoint = screenToWorld(mouse.x, mouse.y);
      const p = mapTool.tool === "doorH" || mapTool.tool === "doorV" ? worldPoint : snapPoint(worldPoint);
      if (event.button === 2 || mapTool.tool === "erase") {
        eraseMapItemAt(snapPoint(worldPoint));
        return;
      }
      if (mapTool.tool === "wall") {
        mapTool.dragStart = p;
        mapTool.preview = rectFromPoints(p, p);
        return;
      }
      placeMapToolItem(p);
    }

    function handleMapToolMouseUp() {
      if (mapTool.tool === "wall" && mapTool.dragStart && mapTool.preview) {
        const rect = normalizeEditorRect(mapTool.preview);
        if (rect.w >= mapTool.grid && rect.h >= mapTool.grid) {
          walls.push(rect);
          mapTool.status = "Wall placed.";
          mapTool.statusTime = 1.4;
        }
      }
      mapTool.dragStart = null;
      mapTool.preview = null;
    }

    function updateMapToolPreview() {
      if (state !== "maptool") return;
      const worldPoint = screenToWorld(mouse.x, mouse.y);
      const p = mapTool.tool === "doorH" || mapTool.tool === "doorV" ? worldPoint : snapPoint(worldPoint);
      if (mapTool.tool === "wall" && mapTool.dragStart) {
        mapTool.preview = rectFromPoints(mapTool.dragStart, p);
        return;
      }
      mapTool.preview = previewForTool(p);
    }

    function handleMapToolButtonClick(x, y) {
      for (const button of mapToolButtons()) {
        if (x < button.x || x > button.x + button.w || y < button.y || y > button.y + button.h) continue;
        if (button.id === "save") {
          if (saveCurrentMap()) state = "menu";
        } else if (button.id === "play") {
          saveCurrentMap();
          startGame();
        } else if (button.id === "reset") {
          clearSavedMap();
        } else if (button.id === "menu") {
          state = "menu";
        } else {
          mapTool.tool = button.id;
          mapTool.status = button.label + " selected.";
          mapTool.statusTime = 1.2;
        }
        return true;
      }
      return false;
    }

    function placeMapToolItem(p) {
      const item = previewForTool(p);
      if (!item) return;
      if (item.type === "door") {
        if (item.wallIndex === undefined) {
          mapTool.status = "Place doors directly on a matching wall.";
          mapTool.statusTime = 2;
          return;
        }
        if (doorTouchesBlockedCorner(item)) {
          mapTool.status = "Door rejected: blocked corner.";
          mapTool.statusTime = 2;
          return;
        }
        carveWallForDoor(item);
        doors.push({ x: item.x, y: item.y, w: item.w, h: item.h, axis: item.axis, open: 0, target: 0, range: 34 });
      } else if (item.type === "fixture") {
        fixtures.push(item);
      } else if (item.type === "prop") {
        props.push({ x: item.x, y: item.y, type: item.propType, s: item.s, a: item.a });
      }
      mapTool.status = "Item placed.";
      mapTool.statusTime = 1.4;
    }

    function previewForTool(p) {
      const g = mapTool.grid;
      if (mapTool.tool === "doorH") return doorPlacementFromWall(p, "h");
      if (mapTool.tool === "doorV") return doorPlacementFromWall(p, "v");
      if (mapTool.tool === "fixture") return { type: "fixture", x: p.x, y: p.y, w: 72, h: 12, angle: 0, radius: 180, energy: 1 };
      if (mapTool.tool === "crate") return { type: "prop", propType: "crate", x: p.x, y: p.y, s: 1, a: 0 };
      if (mapTool.tool === "rock") return { type: "prop", propType: "rock", x: p.x, y: p.y, s: 1, a: Math.PI * 0.15 };
      return null;
    }

    function doorPlacementFromWall(p, axis) {
      const horizontal = axis === "h";
      let best = null;
      let bestScore = Infinity;
      for (let i = 0; i < walls.length; i++) {
        const wall = walls[i];
        const wallHorizontal = wall.w >= wall.h;
        if (horizontal !== wallHorizontal) continue;
        const nearCross = horizontal
          ? p.y >= wall.y - 28 && p.y <= wall.y + wall.h + 28
          : p.x >= wall.x - 28 && p.x <= wall.x + wall.w + 28;
        const nearSpan = horizontal
          ? p.x >= wall.x - 24 && p.x <= wall.x + wall.w + 24
          : p.y >= wall.y - 24 && p.y <= wall.y + wall.h + 24;
        if (!nearCross || !nearSpan) continue;
        const score = horizontal ? Math.abs(p.y - (wall.y + wall.h / 2)) : Math.abs(p.x - (wall.x + wall.w / 2));
        if (score < bestScore) {
          bestScore = score;
          best = { wall, wallIndex: i };
        }
      }
      if (!best) {
        const g = mapTool.grid;
        return horizontal
          ? { type: "door", x: snap(p.x - g), y: snap(p.y - g / 2), w: g * 3, h: g, axis }
          : { type: "door", x: snap(p.x - g / 2), y: snap(p.y - g), w: g, h: g * 3, axis };
      }
      const wall = best.wall;
      if (horizontal) {
        const doorW = Math.min(150, Math.max(84, wall.w - 84));
        const x = clamp(p.x - doorW / 2, wall.x + 42, wall.x + wall.w - doorW - 42);
        return { type: "door", x: Math.round(x), y: wall.y, w: Math.round(doorW), h: wall.h, axis, wallIndex: best.wallIndex };
      }
      const doorH = Math.min(180, Math.max(84, wall.h - 84));
      const y = clamp(p.y - doorH / 2, wall.y + 42, wall.y + wall.h - doorH - 42);
      return { type: "door", x: wall.x, y: Math.round(y), w: wall.w, h: Math.round(doorH), axis, wallIndex: best.wallIndex };
    }

    function carveWallForDoor(door) {
      const wall = walls[door.wallIndex];
      if (!wall) return;
      const pieces = [];
      if (door.axis === "h") {
        const leftW = door.x - wall.x;
        const rightX = door.x + door.w;
        const rightW = wall.x + wall.w - rightX;
        if (leftW >= 24) pieces.push({ x: wall.x, y: wall.y, w: leftW, h: wall.h });
        if (rightW >= 24) pieces.push({ x: rightX, y: wall.y, w: rightW, h: wall.h });
      } else {
        const topH = door.y - wall.y;
        const bottomY = door.y + door.h;
        const bottomH = wall.y + wall.h - bottomY;
        if (topH >= 24) pieces.push({ x: wall.x, y: wall.y, w: wall.w, h: topH });
        if (bottomH >= 24) pieces.push({ x: wall.x, y: bottomY, w: wall.w, h: bottomH });
      }
      walls.splice(door.wallIndex, 1, ...pieces);
    }

    function snap(value) {
      return Math.round(value / mapTool.grid) * mapTool.grid;
    }

    function eraseMapItemAt(p) {
      const hitFixture = fixtures.findIndex((f) => Math.abs(f.x - p.x) < 40 && Math.abs(f.y - p.y) < 40);
      if (hitFixture >= 0) {
        fixtures.splice(hitFixture, 1);
        mapTool.status = "Light erased.";
        mapTool.statusTime = 1.4;
        return;
      }

      const hitDoor = doors.findIndex((door) => p.x >= door.x - 8 && p.x <= door.x + door.w + 8 && p.y >= door.y - 8 && p.y <= door.y + door.h + 8);
      if (hitDoor >= 0) {

        mapTool.status = "Door erased.";
        mapTool.statusTime = 1.4;
        return;
      }
      const hitWall = walls.findIndex((wall) => p.x >= wall.x - 8 && p.x <= wall.x + wall.w + 8 && p.y >= wall.y - 8 && p.y <= wall.y + wall.h + 8);

    function snapPoint(p) {
      const g = mapTool.grid;
      return {
        x: clamp(Math.round(p.x / g) * g, 0, world.w),
        y: clamp(Math.round(p.y / g) * g, 0, world.h)
      };
    }

    function rectFromPoints(a, b) {
      return { type: "wall", x: Math.min(a.x, b.x), y: Math.min(a.y, b.y), w: Math.abs(a.x - b.x) + mapTool.grid, h: Math.abs(a.y - b.y) + mapTool.grid };

    function normalizeEditorRect(rect) {
      return { x: rect.x, y: rect.y, w: rect.w, h: rect.h };
    }

    function roundRect(x, y, w, h, r) {
      const radius = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + w - radius, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
      ctx.lineTo(x + w, y + h - radius);
      ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
      ctx.lineTo(x + radius, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }

    function bar(x, y, w, h, value, fill, back) {
      ctx.fillStyle = back;
      ctx.fillRect(x, y, w, h);
      ctx.fillStyle = fill;
      ctx.fillRect(x, y, w * clamp(value, 0, 1), h);
      ctx.strokeStyle = "rgba(255,255,255,0.25)";
      ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
    }

    function drawImageCentered(img, x, y, w, h) {
      if (img) {
        const ratio = img.width / img.height;
        let dw = w;
        let dh = h;
        if (dw / dh > ratio) dw = dh * ratio;
        else dh = dw / ratio;
        ctx.drawImage(img, x - dw / 2, y - dh / 2, dw, dh);
      } else {
        ctx.fillStyle = "rgba(5, 6, 7, 0.96)";
        ctx.strokeStyle = "rgba(255,255,255,0.12)";
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.ellipse(x, y, Math.max(4, w * 0.34), Math.max(4, h * 0.42), 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
      }
    }

    function drawImageStretched(img, x, y, w, h) {
      if (img) ctx.drawImage(img, x - w / 2, y - h / 2, w, h);
      else drawImageCentered(img, x, y, w, h);
    }

    function drawCover(img, x, y, w, h) {
      const s = Math.max(w / img.width, h / img.height);
      const iw = img.width * s;
      const ih = img.height * s;
      ctx.drawImage(img, x + (w - iw) / 2, y + (h - ih) / 2, iw, ih);
    }

    function screenToWorld(x, y) {
      return { x: x / camera.zoom + camera.x, y: y / camera.zoom + camera.y };
    }

    function screenX(x) {
      return (x - camera.x) * camera.zoom + splitPanelOffsetX;
    }

    function screenY(y) {
      return (y - camera.y) * camera.zoom;
    }

    function screenSize(value) {
      return value * camera.zoom;
    }

    function smoothAngle(current, target, dt, speed) {
      const delta = Math.atan2(Math.sin(target - current), Math.cos(target - current));
      return current + delta * Math.min(1, dt * speed);
    }

    function dist2(ax, ay, bx, by) {
      const dx = ax - bx;
      const dy = ay - by;
      return dx * dx + dy * dy;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));

      return {

    function handleTeamSelectClick(x, y) {
      if (x>=8 && x<=88 && y>=8 && y<=34) { state="menu"; gameMode="classic"; return; }
      const {blue,red}=teamSelectBtnRects();
      if (x>=blue.x && x<=blue.x+blue.w && y>=blue.y && y<=blue.y+blue.h) { playerTeam=0; startTeamBattle(); return; }
      if (x>=red.x  && x<=red.x+red.w   && y>=red.y  && y<=red.y+red.h)  { playerTeam=1; startTeamBattle(); return; }
    }

    function setupAiPlayers() {
      aiPlayers.length=0;
      const bx=380, rx=world.w-380;
      // playerChar.id가 이미 플레이어 팀에 있으므로 AI는 나머지 3캐릭터 사용
      const allIdx=[0,1,2,3];
      const allyIdx=allIdx.filter(i=>i!==playerChar.id);   // 내 팀 AI: 플레이어 제외 3종
      const enemyIdx=[0,1,2,3].filter(i=>i!==playerChar.id); // 적팀 AI: 동일 구성
      const offsets=[{dx:0,dy:-120},{dx:-80,dy:0},{dx:0,dy:120}];
      allyIdx.forEach((ci,k)=>{
        const ch=CHAR_DEFS[ci], o=offsets[k];
        aiPlayers.push({ team:playerTeam, charIdx:ci, x:bx+o.dx, y:world.h/2+o.dy,
          hp:ch.tbHp, maxHp:ch.tbHp, angle:0, speed:170*ch.speedMult,
          shootCd:Math.random()*1.2, walkTime:0, isMoving:false,
          alive:true, col:ch.col, build:ch.build, name:ch.name });
      });

      enemyIdx.forEach((ci,k)=>{

        aiPlayers.push({ team:eteam, charIdx:ci, x:rx-o.dx, y:world.h/2+o.dy,
          hp:ch.tbHp, maxHp:ch.tbHp, angle:Math.PI, speed:170*ch.speedMult,

    function updateAiPlayers(dt) {
      for (const ai of aiPlayers) {
        if (!ai.alive) continue;
        let target=null, bestDist=Infinity;
        if (ai.team!==playerTeam && player.hp>0) {
          const d=Math.hypot(player.x-ai.x,player.y-ai.y);
          if (d<bestDist){bestDist=d; target={x:player.x,y:player.y,isPlayer:true};}
        }
        for (const o of aiPlayers) {
          if (!o.alive||o.team===ai.team) continue;
          const d=Math.hypot(o.x-ai.x,o.y-ai.y);
          if (d<bestDist){bestDist=d; target=o;}
        }
        if (!target) {
          for (const fac of facilities) {
            if (fac.team===ai.team||fac.hp<=0) continue;
            const d=Math.hypot(fac.x+fac.w/2-ai.x,fac.y+fac.h/2-ai.y);
            if (d<bestDist){bestDist=d; target={x:fac.x+fac.w/2,y:fac.y+fac.h/2,isFacility:true,fac};}
          }
        }
        if (!target) continue;
        const tdx=target.x-ai.x, tdy=target.y-ai.y, td=Math.hypot(tdx,tdy)||1;
        ai.angle=Math.atan2(tdy,tdx);
        const stopDist=target.isFacility?160:200;
        if (td>stopDist) {
          ai.x+=tdx/td*ai.speed*dt; ai.y+=tdy/td*ai.speed*dt;
          ai.x=Math.max(60,Math.min(world.w-60,ai.x));
          ai.y=Math.max(60,Math.min(world.h-60,ai.y));
          ai.walkTime=(ai.walkTime||0)+dt; ai.isMoving=true;
        } else {
          ai.isMoving=false;
        }
        ai.shootCd-=dt;
        if (ai.shootCd<=0&&td<650) {
          ai.shootCd=0.75+Math.random()*0.65;
          if (Math.random()<0.65) {
            if (target.isPlayer&&player.invuln<=0) {
              player.hp-=12+Math.round(Math.random()*8);
              if (player.hp<=0){player.hp=0; state="dead";}
            } else if (target.alive!==undefined) {
              target.hp-=20; if (target.hp<=0){target.hp=0;target.alive=false;}
            } else if (target.isFacility) {
              target.fac.hp=Math.max(0,target.fac.hp-22);
            }
          }
        }
      }
    }

    function checkTeamBattleWin() {
      if (teamBattleWon!==null) return;
      // 기지 파괴 시 승패
      for (const fac of facilities) {
        if (fac.hp<=0) { teamBattleWon=(fac.team===playerTeam)?"lose":"win"; return; }
      }
      // 적팀 전원 사망 → 승리
      const eTeam=1-playerTeam;
      const enemyAiAlive=aiPlayers.some(ai=>ai.team===eTeam&&ai.alive);
      if (!enemyAiAlive) { teamBattleWon="win"; return; }
      // 내 팀 전원 사망(플레이어+AI) → 패배
      if (player.hp<=0) {
        const allyAiAlive=aiPlayers.some(ai=>ai.team===playerTeam&&ai.alive);
        if (!allyAiAlive) { teamBattleWon="lose"; }
      }
    }

    function applyTBHit(hit, dmg) {
      if (!hit||gameMode!=="teambattle") return;
      if (hit.aiPlayer) {
        hit.aiPlayer.hp-=dmg; burst(hit.x,hit.y,"#ffaa44",5);
        if (hit.aiPlayer.hp<=0){hit.aiPlayer.hp=0;hit.aiPlayer.alive=false;}
      } else if (hit.facility) {
        hit.facility.hp=Math.max(0,hit.facility.hp-dmg);
        burst(hit.x,hit.y,hit.facility.team===1?"#ff6644":"#4488ff",5);
      } else if (hit.crate) {
        hit.crate.hp-=dmg; burst(hit.x,hit.y,"#c8a030",4);
        if (hit.crate.hp<=0){hit.crate.dead=true; pickups.push({x:hit.crate.x,y:hit.crate.y,r:17,type:"heal",life:8,pulse:0});}
      }
    }

    function drawAiPlayer(ai) {
      const ch=CHAR_DEFS[ai.charIdx||0];
      const isAlly=(ai.team===playerTeam);
      const pc=ch.col;
      ctx.save();
      ctx.translate(ai.x,ai.y);
      ctx.rotate(ai.angle);
      // 팀 글로우
      const grd=ctx.createRadialGradient(0,0,0,0,0,30);
      grd.addColorStop(0,isAlly?"rgba(60,140,255,0.22)":"rgba(255,60,60,0.22)");
      grd.addColorStop(1,"rgba(0,0,0,0)");
      ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(0,0,30,0,Math.PI*2); ctx.fill();
      // 실제 캐릭터 외형 (drawMarineSoldier 재사용)
      const charColors={ dark:pc.body, mid:pc.light, light:pc.light, red:pc.visor };
      drawMarineSoldier(24, ai.walkTime||0, ai.isMoving||false, charColors, false, false, 0);
      // 팀 색상 링 (아군=파랑, 적=빨강)
      ctx.strokeStyle=isAlly?"rgba(80,160,255,0.8)":"rgba(255,60,60,0.8)";
      ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.arc(0,0,27,0,Math.PI*2); ctx.stroke();
      ctx.restore();
      // HP바 + 이름
      const hpFrac=Math.max(0,ai.hp/ai.maxHp), bw=44;
      const ly=ai.y-34;
      ctx.save();
      ctx.fillStyle="rgba(0,0,0,0.75)"; ctx.fillRect(ai.x-bw/2,ly,bw,5);
      ctx.fillStyle=isAlly?"#44ff88":"#ff4444";
      ctx.fillRect(ai.x-bw/2,ly,bw*hpFrac,5);
      ctx.strokeStyle=isAlly?"#88ffcc":"#ff9999"; ctx.lineWidth=0.8;
      ctx.strokeRect(ai.x-bw/2,ly,bw,5);
      ctx.fillStyle=isAlly?"#aaddff":"#ffbbbb"; ctx.font="bold 8px monospace";
      ctx.textAlign="center";
      ctx.fillText(ch.name+(isAlly?" ●":" ◆"),ai.x,ly-3);
      ctx.restore();
    }

        gw.addColorStop(0,isOwn?"rgba(40,80,220,0.2)":"rgba(220,40,40,0.2)");
        gw.addColorStop(1,"rgba(0,0,0,0)");
        ctx.fillStyle=gw; ctx.fillRect(fac.x-50,fac.y-50,fac.w+100,fac.h+100);
        ctx.fillStyle=isOwn?"rgba(12,28,100,0.85)":"rgba(100,12,12,0.85)";
        ctx.fillRect(fac.x,fac.y,fac.w,fac.h);
        const pulse=0.55+Math.sin(now*2.4)*0.35;
        ctx.strokeStyle=isOwn?`rgba(60,120,255,${pulse})`:`rgba(255,60,60,${pulse})`; ctx.lineWidth=3;
        ctx.strokeRect(fac.x,fac.y,fac.w,fac.h);

    function drawCratesWorld() {

        ctx.beginPath(); ctx.moveTo(cr.x-cr.w/2,cr.y); ctx.lineTo(cr.x+cr.w/2,cr.y); ctx.stroke();

    function drawTeamBattleHud() {
      ctx.save();
      ctx.setTransform(scale,0,0,scale,splitPanelOffsetX*scale,0);
      const now=performance.now()*0.001, cx=width/2;
      const blue=facilities.find(f=>f.team===0), red=facilities.find(f=>f.team===1);
      const barW=Math.min(160,width*0.22), barH=14;
      // BLUE bar
      const bx=cx-barW-52;
      if (blue) {
        ctx.fillStyle="rgba(0,0,0,0.75)"; ctx.fillRect(bx,6,barW,barH);
        const bf=Math.max(0,blue.hp/blue.maxHp);
        ctx.fillStyle=`rgba(44,110,255,${0.8+Math.sin(now*3)*0.1})`;
        ctx.fillRect(bx,6,barW*bf,barH);
        ctx.strokeStyle=blue.hp<=0?"#ff4444":"#5588ff"; ctx.lineWidth=1.2; ctx.strokeRect(bx,6,barW,barH);
        ctx.fillStyle="#aaccff"; ctx.font="bold 9px monospace"; ctx.textAlign="center";
        ctx.fillText(`BLUE  ${Math.ceil(blue.hp)}/${blue.maxHp}`,bx+barW/2,4);
      }
      // RED bar
      const rx=cx+52;
      if (red) {
        ctx.fillStyle="rgba(0,0,0,0.75)"; ctx.fillRect(rx,6,barW,barH);
        const rf=Math.max(0,red.hp/red.maxHp);
        ctx.fillStyle=`rgba(255,50,50,${0.8+Math.sin(now*3)*0.1})`;
        ctx.fillRect(rx,6,barW*rf,barH);
        ctx.strokeStyle=red.hp<=0?"#4444ff":"#ff5555"; ctx.lineWidth=1.2; ctx.strokeRect(rx,6,barW,barH);
        ctx.fillStyle="#ffaaaa"; ctx.font="bold 9px monospace"; ctx.textAlign="center";
        ctx.fillText(`RED  ${Math.ceil(red.hp)}/${red.maxHp}`,rx+barW/2,4);
      }
      // Team AI count
      const ba=aiPlayers.filter(a=>a.team===0&&a.alive).length;
      const ra=aiPlayers.filter(a=>a.team===1&&a.alive).length;
      ctx.fillStyle="#6688aa"; ctx.font="8px monospace"; ctx.textAlign="center";
      ctx.fillText(`[BLUE ${playerTeam===0?ba+1:ba}] vs [RED ${playerTeam===1?ra+1:ra}]`,cx,26);

        ctx.shadowBlur=0;
        ctx.fillStyle=teamBattleWon==="win"?"#88ccff":"#ffaaaa";

        ctx.fillText(teamBattleWon==="win"?"Enemy base destroyed!":"Your base was destroyed!",width/2,height*0.545);

        ctx.fillText("Tap / Click to return to menu",width/2,height*0.62);
      }
      ctx.restore();
